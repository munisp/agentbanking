# 54Link POS Shell — dbt Project Configuration
name: 'posshell_analytics'
version: '1.0.0'
config-version: 2

profile: 'posshell'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  posshell_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table
      +schema: analytics
    metrics:
      +materialized: incremental
      +schema: metrics
