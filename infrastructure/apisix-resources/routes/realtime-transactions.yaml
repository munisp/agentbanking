# realtime-transactions — 11 services | ports 9548-9558
# Real-time transactions — cards, receipts, webhooks, transaction history
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-realtime-transactions-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /card-service/*
      backends:
        - serviceName: realtime-transactions
          servicePort: 9548
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/card-service/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-2
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /merchant-service/*
      backends:
