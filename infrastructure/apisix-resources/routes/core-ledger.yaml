# core-ledger — 11 services | ports 9326-9336
# Ledger — TigerBeetle, offline ledger, interest
# Note: /chart-of-accounts/* is handled by 54agent-chart-of-accounts-route (chart-of-accounts:8080)
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-core-ledger-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-2
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /core-banking/*
      backends:
        - serviceName: core-ledger
          servicePort: 9326
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/core-banking/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-3
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /go-ledger-sync/*
