# stablecoin-v2
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-stablecoin-v2-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /stablecoin-v2/*
      backends:
        - serviceName: specialized-finance
          servicePort: 9580
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/stablecoin-v2/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
