# dispute-resolution
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-dispute-resolution-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /dispute-resolution/*
      backends:
        - serviceName: dispute-settlement
          servicePort: 9399
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/dispute-resolution/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
