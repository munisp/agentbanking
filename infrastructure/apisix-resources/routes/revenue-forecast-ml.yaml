# revenue-forecast-ml
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-revenue-forecast-ml-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /revenue-forecast-ml/*
      backends:
        - serviceName: ai-ml
          servicePort: 9159
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/revenue-forecast-ml/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
