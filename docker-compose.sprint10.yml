version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════════
# 54Link Agency Banking — Sprint 10 Docker Compose
# Adds: Email service, SMS service, Rate alert checker, Notification aggregator
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ─── Core Application ─────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - AWS_SES_ACCESS_KEY=${AWS_SES_ACCESS_KEY:-}
      - AWS_SES_SECRET_KEY=${AWS_SES_SECRET_KEY:-}
      - AWS_SES_REGION=${AWS_SES_REGION:-us-east-1}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER:-}
      - AT_API_KEY=${AT_API_KEY:-}
      - AT_USERNAME=${AT_USERNAME:-}
      - AT_SENDER_ID=${AT_SENDER_ID:-54Link}
      - TERMII_API_KEY=${TERMII_API_KEY:-}
      - TERMII_SENDER_ID=${TERMII_SENDER_ID:-54Link}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3000}/api/trpc/system.health?batch=1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"

  # ─── Redis (Rate Limiting, Caching, Session Store) ────────────────────────
  redis:
    image: redis:7.4-alpine
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Rate Alert Checker (Cron Job) ────────────────────────────────────────
  rate-alert-checker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "-e", "
      const check = async () => {
        try {
          const res = await fetch('http://app:${PORT:-3000}/api/trpc/rateAlerts.checkAlerts?batch=1', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({}) });
          console.log('[Rate Alert Checker]', new Date().toISOString(), 'Status:', res.status);
        } catch (e) { console.error('[Rate Alert Checker] Error:', e.message); }
      };
      setInterval(check, 5 * 60 * 1000);
      check();
    "]
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ─── PaddleOCR Service ────────────────────────────────────────────────────
  paddle-ocr:
    build:
      context: ./services/python/paddle-ocr-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - WORKERS=2
      - PORT=8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  # ─── VLM Document Service ─────────────────────────────────────────────────
  vlm-document:
    build:
      context: ./services/python/vlm-document-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - WORKERS=1
      - PORT=8082
      - MODEL_NAME=microsoft/Florence-2-large
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  # ─── Liveness Detection Service ───────────────────────────────────────────
  liveness-detection:
    build:
      context: ./services/python/liveness-detection
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - WORKERS=2
      - PORT=8083
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  # ─── Face Matching Service ────────────────────────────────────────────────
  face-matching:
    build:
      context: ./services/python/face-matching
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      - WORKERS=2
      - PORT=8084
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  # ─── Document Fraud Detection ─────────────────────────────────────────────
  fraud-detection:
    build:
      context: ./services/python/document-fraud-detection
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      - WORKERS=2
      - PORT=8085
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ─── Metrics Collector (Python) ───────────────────────────────────────────
  metrics-collector:
    build:
      context: ./middleware/python/metrics-collector
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
    environment:
      - COLLECTION_INTERVAL=30
      - TARGETS=app:${PORT:-3000},redis:6379,paddle-ocr:8081,vlm-document:8082,liveness-detection:8083
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── Chaos Tester (Python, dev only) ──────────────────────────────────────
  chaos-tester:
    build:
      context: ./middleware/python/chaos-tester
      dockerfile: Dockerfile
    profiles: ["testing"]
    environment:
      - TARGET_SERVICES=app:${PORT:-3000},redis:6379
      - CHAOS_INTERVAL=300
    depends_on:
      app:
        condition: service_healthy

volumes:
  redis-data:
    driver: local

networks:
  default:
    name: pos-54link-network
    driver: bridge
