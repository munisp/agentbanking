# rust-ocr-bridge
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-rust-ocr-bridge-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /rust-ocr-bridge/*
      backends:
        - serviceName: kyc-aml
          servicePort: 9517
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/rust-ocr-bridge/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
