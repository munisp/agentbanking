name: Build Infra Network Consolidated Service

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'services/adaptive-compression/**'
      - 'services/bandwidth-optimizer/**'
      - 'services/circuit-breaker/**'
      - 'services/connection-multiplexer/**'
      - 'services/connection-quality-monitor/**'
      - 'services/connectivity-resilience/**'
      - 'services/edge-computing/**'
      - 'services/edge-deployment/**'
      - 'services/grpc/**'
      - 'services/hybrid-engine/**'
      - 'services/load-balancer/**'
      - 'services/middleware/**'
      - 'services/middleware-integration/**'
      - 'services/optimization/**'
      - 'services/performance-optimization/**'
      - 'services/platform-middleware/**'
      - 'services/redis-cache-layer/**'
      - 'services/resilience-agent/**'
      - 'services/resilience-proxy/**'
      - 'services/rust-middleware-bridge/**'
      - 'docker/Dockerfile.consolidated'
      - 'docker/entrypoint.sh'
      - 'docker/build-services.sh'
      - '.github/workflows/infra-network.yaml'

env:
  TAG: "0.0.1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: docker
          password: ${{ secrets.DO_API_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.consolidated
          push: true
          build-args: |
            SERVICES=adaptive-compression,bandwidth-optimizer,circuit-breaker,connection-multiplexer,connection-quality-monitor,connectivity-resilience,edge-computing,edge-deployment,grpc,hybrid-engine,load-balancer,middleware,middleware-integration,optimization,performance-optimization,platform-middleware,redis-cache-layer,resilience-agent,resilience-proxy,rust-middleware-bridge
            PORT_BASE=9459
          tags: registry.digitalocean.com/talentgraph-auth/54agent-infra-network:${{ env.TAG }}
