global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'remittance-pos'
    environment: 'production'

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics
    scrape_interval: 15s

  # POS Service
  - job_name: 'pos-service'
    static_configs:
      - targets: ['pos-service:8070']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s
    honor_labels: true
    params:
      format: ['prometheus']

  # QR Validation Service
  - job_name: 'qr-validation-service'
    static_configs:
      - targets: ['qr-validation-service:8071']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s

  # Enhanced POS Service
  - job_name: 'enhanced-pos-service'
    static_configs:
      - targets: ['enhanced-pos-service:8072']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s

  # Device Manager Service
  - job_name: 'device-manager-service'
    static_configs:
      - targets: ['device-manager-service:8073']
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 5s

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: /metrics
    scrape_interval: 30s

  # PostgreSQL
  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgres:5432']
    metrics_path: /metrics
    scrape_interval: 30s

  # Nginx Load Balancer
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: /nginx_status
    scrape_interval: 15s

  # Node Exporter (System Metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  # cAdvisor (Container Metrics)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 15s
    metrics_path: /metrics

  # Application-specific metrics
  - job_name: 'pos-application-metrics'
    static_configs:
      - targets: 
        - 'pos-service:8070'
        - 'qr-validation-service:8071'
        - 'enhanced-pos-service:8072'
        - 'device-manager-service:8073'
    metrics_path: /app-metrics
    scrape_interval: 30s
    params:
      format: ['prometheus']

  # Payment Processor Health Checks
  - job_name: 'payment-processors'
    static_configs:
      - targets: ['enhanced-pos-service:8072']
    metrics_path: /payment-processors/health
    scrape_interval: 60s

  # Fraud Detection Metrics
  - job_name: 'fraud-detection'
    static_configs:
      - targets: ['enhanced-pos-service:8072']
    metrics_path: /fraud-detection/metrics
    scrape_interval: 30s

  # Exchange Rate Service
  - job_name: 'exchange-rate-service'
    static_configs:
      - targets: ['enhanced-pos-service:8072']
    metrics_path: /exchange-rate/metrics
    scrape_interval: 300s  # 5 minutes

  # Custom Business Metrics
  - job_name: 'business-metrics'
    static_configs:
      - targets: 
        - 'pos-service:8070'
        - 'enhanced-pos-service:8072'
    metrics_path: /business-metrics
    scrape_interval: 60s
    params:
      include: ['transactions', 'revenue', 'success_rate', 'fraud_rate']

# Remote write configuration for long-term storage
remote_write:
  - url: "http://prometheus-remote-storage:9201/write"
    queue_config:
      max_samples_per_send: 1000
      max_shards: 200
      capacity: 2500

# Remote read configuration
remote_read:
  - url: "http://prometheus-remote-storage:9201/read"
    read_recent: true
