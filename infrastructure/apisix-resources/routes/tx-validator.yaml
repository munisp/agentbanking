# tx-validator
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-tx-validator-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /tx-validator/*
      backends:
        - serviceName: fraud-risk
          servicePort: 9443
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/tx-validator/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
