  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /background-check/*
      backends:
        - serviceName: kyc-aml
          servicePort: 9493
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/background-check/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

