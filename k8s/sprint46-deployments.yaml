# Sprint 46: Kubernetes Deployments for Production Features
# Apply: kubectl apply -f k8s/sprint46-deployments.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pos-notification-worker
  namespace: pos-shell
  labels:
    app: pos-shell
    component: notification-worker
    sprint: "46"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pos-notification-worker
  template:
    metadata:
      labels:
        app: pos-notification-worker
    spec:
      containers:
        - name: notification-worker
          image: pos-shell:latest
          command: ["node", "scripts/notification-worker.mjs"]
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          envFrom:
            - secretRef:
                name: pos-shell-secrets
          livenessProbe:
            exec:
              command: ["node", "-e", "process.exit(0)"]
            initialDelaySeconds: 10
            periodSeconds: 30
---
