# fraud-risk — 14 services | ports 9430-9443
# Fraud & risk — detection, AML, sanctions, scoring, rules engine
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-fraud-risk-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /aml-case-manager-go/*
      backends:
        - serviceName: fraud-risk
          servicePort: 9430
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/aml-case-manager-go/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-2
      priority: 10
