# instant-reversal-engine
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-instant-reversal-engine-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /instant-reversal-engine/*
      backends:
        - serviceName: core-payments
          servicePort: 9347
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/instant-reversal-engine/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
