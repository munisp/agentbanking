# channels-social — 16 services | ports 9238-9253
# Social channels — WhatsApp, Telegram, social media bots
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-channels-social-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /at-sms-sender/*
      backends:
        - serviceName: channels-social
          servicePort: 9238
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/at-sms-sender/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-2
      priority: 10
