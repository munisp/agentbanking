# temporal-access → pbac-engine (auth-identity:9194)
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-temporal-access-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /temporal-access/*
      backends:
        - serviceName: pbac-engine
          servicePort: 8091
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/temporal-access/api/v1/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
