# remitly-integration
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-remitly-integration-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /remitly-integration/*
      backends:
        - serviceName: third-party-integrations
          servicePort: 9596
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/remitly-integration/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
