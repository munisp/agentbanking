version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: remittance-postgres
    environment:
      POSTGRES_DB: remittance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./agent-performance/migrations:/docker-entrypoint-initdb.d
    networks:
      - remittance-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7.4-alpine
    container_name: remittance-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - remittance-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Temporal Server
  temporal:
    image: temporalio/auto-setup:latest
    container_name: remittance-temporal
    ports:
      - "7233:7233"
      - "8088:8088"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    networks:
      - remittance-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Enhanced Agent Performance Service
  agent-performance:
    build:
      context: ./agent-performance
      dockerfile: Dockerfile
    container_name: agent-performance-service
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=remittance
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_URL=redis://redis:6379
      - PORT=8050
    ports:
      - "8050:8050"
    networks:
      - remittance-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Enhanced Workflow Orchestration Service
  workflow-orchestration:
    build:
      context: ./workflow-orchestration
      dockerfile: Dockerfile
    container_name: workflow-orchestration-service
    environment:
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - TEMPORAL_TASK_QUEUE=remittance-workflows
      - FRAUD_DETECTION_URL=http://fraud-detection:8010
      - KYC_SERVICE_URL=http://kyc-service:8011
      - LEDGER_SERVICE_URL=http://ledger-service:8005
      - NOTIFICATION_SERVICE_URL=http://notification-service:8012
      - COMMISSION_SERVICE_URL=http://commission-service:8013
      - CREDIT_SCORING_URL=http://credit-scoring:8014
      - LOAN_SERVICE_URL=http://loan-service:8015
      - PORT=8023
    ports:
      - "8023:8023"
    networks:
      - remittance-network
    depends_on:
      temporal:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8023/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Temporal Web UI
  temporal-web:
    image: temporalio/ui:latest
    container_name: remittance-temporal-web
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8088
    ports:
      - "8088:8088"
    networks:
      - remittance-network
    depends_on:
      - temporal

networks:
  remittance-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

