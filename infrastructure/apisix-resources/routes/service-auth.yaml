# service-auth
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-service-auth-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /service-auth/*
      backends:
        - serviceName: service-auth
          servicePort: 8140
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/service-auth/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
