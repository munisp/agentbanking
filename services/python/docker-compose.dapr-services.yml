version: '3.8'

services:
  # Transaction Service with Dapr Sidecar
  transaction-service:
    build:
      context: .
      dockerfile: Dockerfile.transaction
    container_name: transaction-service
    ports:
      - "8000:8000"
    environment:
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - PERMIFY_ENDPOINT=http://permify:3478
      - KEYCLOAK_SERVER_URL=http://keycloak:8080
    networks:
      - remittance-network
    depends_on:
      - dapr-placement
      - permify
      - keycloak
  
  transaction-service-dapr:
    image: "daprio/daprd:1.12.0"
    command: [
      "./daprd",
      "-app-id", "transaction-service",
      "-app-port", "8000",
      "-dapr-http-port", "3500",
      "-dapr-grpc-port", "50001",
      "-placement-host-address", "dapr-placement:50006",
      "-components-path", "/components"
    ]
    volumes:
      - ../middleware/dapr/components:/components
    network_mode: "service:transaction-service"
    depends_on:
      - transaction-service
  
  # Wallet Service with Dapr Sidecar
  wallet-service:
    build:
      context: .
      dockerfile: Dockerfile.wallet
    container_name: wallet-service
    ports:
      - "8001:8001"
    environment:
      - DAPR_HTTP_PORT=3501
      - DAPR_GRPC_PORT=50002
      - PERMIFY_ENDPOINT=http://permify:3478
      - KEYCLOAK_SERVER_URL=http://keycloak:8080
    networks:
      - remittance-network
    depends_on:
      - dapr-placement
      - permify
      - keycloak
  
  wallet-service-dapr:
    image: "daprio/daprd:1.12.0"
    command: [
      "./daprd",
      "-app-id", "wallet-service",
      "-app-port", "8001",
      "-dapr-http-port", "3501",
      "-dapr-grpc-port", "50002",
      "-placement-host-address", "dapr-placement:50006",
      "-components-path", "/components"
    ]
    volumes:
      - ../middleware/dapr/components:/components
    network_mode: "service:wallet-service"
    depends_on:
      - wallet-service
  
  # Analytics Service with Dapr Sidecar
  analytics-service:
    build:
      context: .
      dockerfile: Dockerfile.analytics
    container_name: analytics-service
    ports:
      - "8002:8002"
    environment:
      - DAPR_HTTP_PORT=3502
      - DAPR_GRPC_PORT=50003
      - PERMIFY_ENDPOINT=http://permify:3478
      - KEYCLOAK_SERVER_URL=http://keycloak:8080
    networks:
      - remittance-network
    depends_on:
      - dapr-placement
      - permify
      - keycloak
  
  analytics-service-dapr:
    image: "daprio/daprd:1.12.0"
    command: [
      "./daprd",
      "-app-id", "analytics-service",
      "-app-port", "8002",
      "-dapr-http-port", "3502",
      "-dapr-grpc-port", "50003",
      "-placement-host-address", "dapr-placement:50006",
      "-components-path", "/components"
    ]
    volumes:
      - ../middleware/dapr/components:/components
    network_mode: "service:analytics-service"
    depends_on:
      - analytics-service

networks:
  remittance-network:
    external: true
