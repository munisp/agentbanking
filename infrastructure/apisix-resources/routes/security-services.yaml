# security-services
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-security-services-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /security-services/*
      backends:
        - serviceName: security
          servicePort: 9567
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/security-services/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
