---
# Sprint 47: Rust Middleware Bridge Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pos-rust-bridge
  namespace: pos-shell
  labels:
    app: pos-rust-bridge
    sprint: "47"
    tier: sidecar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pos-rust-bridge
  template:
    metadata:
      labels:
        app: pos-rust-bridge
        tier: sidecar
    spec:
      containers:
        - name: rust-bridge
          image: 54link/pos-rust-bridge:1.0.0
          ports:
            - containerPort: 9100
          env:
            - name: RUST_LOG
              value: "info"
            - name: RUST_BRIDGE_PORT
              value: "9100"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 9100
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 9100
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: pos-rust-bridge
  namespace: pos-shell
spec:
  selector:
    app: pos-rust-bridge
  ports:
    - port: 9100
      targetPort: 9100
  type: ClusterIP
---
