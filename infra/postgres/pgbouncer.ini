; ==============================================================================
; PgBouncer — Connection Pooling for Millions of TPS
; Sits between application servers and PostgreSQL
; ==============================================================================

[databases]
; Transaction-mode pooling: connections returned to pool after each transaction
54link = host=postgres-primary port=5432 dbname=54link pool_size=200 pool_mode=transaction
54link_ro = host=postgres-replica port=5432 dbname=54link pool_size=300 pool_mode=transaction
54link_readonly = host=postgres-replica port=5432 dbname=54link pool_size=100 pool_mode=session

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; ── Connection Limits ────────────────────────────────────────────────────────
max_client_conn = 20000               ; Accept 20K application connections
default_pool_size = 200                ; Active PG connections per pool
reserve_pool_size = 50                 ; Emergency connections
reserve_pool_timeout = 3               ; Wait 3s before using reserve
min_pool_size = 50                     ; Keep 50 warm connections

; ── Timeouts ─────────────────────────────────────────────────────────────────
server_idle_timeout = 60               ; Close idle PG connections after 60s
server_lifetime = 3600                 ; Reconnect to PG every hour
server_connect_timeout = 5             ; Fail fast on PG connect
server_login_retry = 1                 ; Retry PG login after 1s
client_idle_timeout = 300              ; Drop idle clients after 5 min
client_login_timeout = 15              ; Client must authenticate in 15s
idle_transaction_timeout = 60          ; Kill idle-in-transaction sessions after 60s
query_timeout = 30                     ; Kill queries running > 30s
query_wait_timeout = 10                ; Client waits max 10s for a connection

; ── Performance ──────────────────────────────────────────────────────────────
pool_mode = transaction                ; Return connection after each TX
server_reset_query = DISCARD ALL       ; Clean state between transactions
server_check_query = SELECT 1          ; Fast health check
server_check_delay = 10                ; Check every 10s
tcp_defer_accept = 45
tcp_keepalive = 1
tcp_keepcnt = 3
tcp_keepidle = 30
tcp_keepintvl = 10
pkt_buf = 8192                         ; Packet buffer size
max_packet_size = 2147483647           ; Max packet (2GB)
so_reuseport = 1                       ; Kernel-level load balancing
application_name_add_host = 1          ; Track which app server connects

; ── Logging ──────────────────────────────────────────────────────────────────
log_connections = 0                    ; Don't log every connect (too noisy)
log_disconnections = 0
log_pooler_errors = 1
stats_period = 30                      ; Stats every 30s
verbose = 0

; ── Admin ────────────────────────────────────────────────────────────────────
admin_users = pgbouncer_admin
stats_users = pgbouncer_stats

; ── TLS (require encrypted connections) ───────────────────────────────────────────────
client_tls_sslmode = require           ; Require TLS for all client connections
client_tls_ca_file = /etc/pgbouncer/ca.crt
client_tls_cert_file = /etc/pgbouncer/server.crt
client_tls_key_file = /etc/pgbouncer/server.key
server_tls_sslmode = require           ; Require TLS to PostgreSQL backend
