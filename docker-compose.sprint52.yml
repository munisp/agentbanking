version: "3.9"
# Sprint 52: Final Production Docker Compose
# Adds server middleware, RBAC, health endpoints, API versioning, and all Sprint 52 services

services:
  # ── Core Application ──────────────────────────────────────────────────
  pos-shell-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_URL=${POSTGRES_URL}
      - JWT_SECRET=${JWT_SECRET:-pos-shell-jwt-secret-2026}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ── Database ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: posshell
      POSTGRES_USER: posadmin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-posadmin123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U posadmin -d posshell"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis Cache ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Sprint 52: Server Middleware (Rate Limiting, Request Logging) ────
  middleware-proxy:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - pos-shell-app
    restart: unless-stopped

  # ── Sprint 52: RBAC Service ──────────────────────────────────────────
  rbac-service:
    build:
      context: .
      dockerfile: Dockerfile
    command: node dist/server/_core/index.js
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - RBAC_ENABLED=true
      - ADMIN_ROLES=admin,super_admin
      - SENSITIVE_ROUTES=/api/trpc/fraudMlScoring,/api/trpc/complianceFiling,/api/trpc/generalLedger,/api/trpc/backupDisasterRecovery
    depends_on:
      - postgres
    restart: unless-stopped

  # ── Sprint 52: Health Check Aggregator ───────────────────────────────
  health-aggregator:
    image: louislam/uptime-kuma:1
    ports:
      - "3001:3001"
    volumes:
      - uptimedata:/app/data
    restart: unless-stopped

  # ── Sprint 52: API Gateway with Versioning ───────────────────────────
  api-gateway:
    image: kong:3.4-alpine
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      - pos-shell-app
    restart: unless-stopped

  # ── Sprint 52: Executive Dashboard Metrics Collector ─────────────────
  metrics-collector:
    build:
      context: .
      dockerfile: Dockerfile
    command: node dist/server/_core/index.js
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - METRICS_COLLECTION_INTERVAL=60000
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # ── Sprint 52: Audit Log Processor ──────────────────────────────────
  audit-processor:
    build:
      context: .
      dockerfile: Dockerfile
    command: node dist/server/_core/index.js
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - AUDIT_RETENTION_DAYS=365
      - AUDIT_BATCH_SIZE=100
    depends_on:
      - postgres
    restart: unless-stopped

  # ── Sprint 52: Float Management Worker ──────────────────────────────
  float-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: node dist/server/_core/index.js
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - FLOAT_CHECK_INTERVAL=300000
      - LOW_FLOAT_THRESHOLD=50000
    depends_on:
      - postgres
    restart: unless-stopped

  # ── Sprint 52: Dispute Resolution Worker ────────────────────────────
  dispute-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: node dist/server/_core/index.js
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - DISPUTE_SLA_HOURS=48
      - AUTO_ESCALATION_ENABLED=true
    depends_on:
      - postgres
    restart: unless-stopped

  # ── Sprint 52: Leaderboard Calculator ───────────────────────────────
  leaderboard-calc:
    build:
      context: .
      dockerfile: Dockerfile
    command: node dist/server/_core/index.js
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - LEADERBOARD_CALC_INTERVAL=3600000
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # ── Monitoring Stack ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
    volumes:
      - grafanadata:/var/lib/grafana
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  uptimedata:
  promdata:
  grafanadata:

networks:
  default:
    name: pos-shell-network
