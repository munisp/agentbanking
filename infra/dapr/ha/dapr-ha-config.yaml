###############################################################################
# Dapr HA Configuration — POS-54Link Production
# Sidecar injection, mTLS, distributed tracing, resiliency policies
###############################################################################
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: pos54-dapr-config
spec:
  # ── mTLS ────────────────────────────────────────────────────────────────────
  mtls:
    enabled: true
    workloadCertTTL: "24h"
    allowedClockSkew: "15m"

  # ── Tracing (reduced sampling for high throughput) ───────────────────────────
  tracing:
    samplingRate: "0.01"                 # 1% sampling for millions of TPS
    otel:
      endpointAddress: "otel-collector:4317"
      isSecure: false
      protocol: grpc                     # gRPC is faster than HTTP for traces

  # ── Metrics ─────────────────────────────────────────────────────────────────
  metric:
    enabled: true
    rules:
      - name: pos54_transaction_latency
        labels:
          - name: method
            regex:
              "^/v1/transactions.*": "transactions"
              "^/v1/agents.*": "agents"
              "^/v1/kyc.*": "kyc"

  # ── Access Control ──────────────────────────────────────────────────────────
  accessControl:
    defaultAction: deny
    trustDomain: "pos54.local"
    policies:
      - appId: api-gateway
        defaultAction: allow
        trustDomain: "pos54.local"
        namespace: "production"
      - appId: transaction-service
        defaultAction: allow
        trustDomain: "pos54.local"
        namespace: "production"
        operations:
          - name: /v1/transactions/*
            httpVerb: ["POST", "GET"]
            action: allow
      - appId: kyc-service
        defaultAction: allow
        trustDomain: "pos54.local"
        namespace: "production"

  # ── Features (high-throughput bulk operations) ──────────────────────────────
  features:
    - name: PubSub.BulkPublish
      enabled: true
    - name: PubSub.BulkSubscribe
      enabled: true
    - name: Actor.TypeMetadata
      enabled: true

  # ── API (gRPC for throughput) ──────────────────────────────────────────────
  api:
    allowed:
      - name: state
        version: v1.0
        protocol: grpc
      - name: publish
        version: v1.0
        protocol: grpc
      - name: bindings
        version: v1.0
        protocol: grpc
      - name: invoke
        version: v1.0
        protocol: grpc
      - name: secrets
        version: v1.0
        protocol: grpc

---
###############################################################################
# Resiliency Policy
###############################################################################
apiVersion: dapr.io/v1alpha1
kind: Resiliency
metadata:
  name: pos54-resiliency
spec:
  policies:
    timeouts:
      fast: 3s
      standard: 10s
      slow: 30s
    retries:
      retryForever:
        policy: constant
        duration: 5s
        maxRetries: -1
      important:
        policy: exponential
        maxInterval: 15s
        maxRetries: 5
      critical:
        policy: exponential
        maxInterval: 30s
        maxRetries: 10
    circuitBreakers:
      simpleCB:
        maxRequests: 1
        interval: 30s
        timeout: 60s
        trip: consecutiveFailures > 3
      strictCB:
        maxRequests: 1
        interval: 60s
        timeout: 120s
        trip: consecutiveFailures > 2

  targets:
    apps:
      transaction-service:
        timeout: standard
        retry: important
        circuitBreaker: simpleCB
      kyc-service:
        timeout: slow
        retry: critical
        circuitBreaker: strictCB
      settlement-service:
        timeout: slow
        retry: critical
        circuitBreaker: strictCB
    components:
      statestore:
        outbound:
          timeout: fast
          retry: important
          circuitBreaker: simpleCB
      pubsub:
        outbound:
          timeout: standard
          retry: critical
      secretstore:
        outbound:
          timeout: fast
          retry: important
