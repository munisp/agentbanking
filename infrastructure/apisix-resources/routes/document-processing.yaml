# document-processing
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-document-processing-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /document-processing/*
      backends:
        - serviceName: kyc-aml
          servicePort: 9500
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/document-processing/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
