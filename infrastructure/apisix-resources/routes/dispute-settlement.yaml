          enable: true
          config:
            regex_uri:
              - "^/reconciliation-service/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-4
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /recurring-payments/*
      backends:
        - serviceName: dispute-settlement
          servicePort: 9402
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/recurring-payments/(.*)"
