# marketplace-integrations-go
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-marketplace-integrations-go-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /marketplace-integrations/*
      backends:
        - serviceName: ecommerce-marketplace
          servicePort: 9425
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/marketplace-integrations/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
