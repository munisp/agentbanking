# digital-identity-layer
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-digital-identity-layer-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /digital-identity-layer/*
      backends:
        - serviceName: digital-identity-layer
          servicePort: 8275
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/digital-identity-layer/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
