# cross-border
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-cross-border-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /cross-border/*
      backends:
        - serviceName: core-payments
          servicePort: 9342
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/cross-border/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
