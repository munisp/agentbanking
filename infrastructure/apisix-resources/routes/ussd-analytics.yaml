# ussd-analytics
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-ussd-analytics-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /ussd-analytics/*
      backends:
        - serviceName: analytics-data
          servicePort: 9180
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/ussd-analytics/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
