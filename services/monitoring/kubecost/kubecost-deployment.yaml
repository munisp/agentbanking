apiVersion: v1
kind: Namespace
metadata:
  name: kubecost
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubecost
  namespace: kubecost
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubecost
  namespace: kubecost
  labels:
    app: kubecost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubecost
  template:
    metadata:
      labels:
        app: kubecost
    spec:
      serviceAccountName: kubecost
      containers:
      - name: kubecost-frontend
        image: gcr.io/kubecost1/frontend:latest
        ports:
        - containerPort: 9090
          name: http
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      - name: kubecost-cost-model
        image: gcr.io/kubecost1/cost-model:latest
        ports:
        - containerPort: 9003
          name: http-model
        env:
        - name: PROMETHEUS_SERVER_ENDPOINT
          value: "http://prometheus-service.monitoring.svc.cluster.local:9090"
        - name: CLOUD_PROVIDER_API_KEY
          value: "AIzaSyDXQPG_MHUEy9neR7stolq97_l99JbV-Fo"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: kubecost-service
  namespace: kubecost
spec:
  selector:
    app: kubecost
  ports:
  - name: http
    protocol: TCP
    port: 9090
    targetPort: 9090
  type: LoadBalancer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubecost
rules:
- apiGroups: [""]
  resources: ["pods", "nodes", "namespaces", "persistentvolumes", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubecost
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubecost
subjects:
- kind: ServiceAccount
  name: kubecost
  namespace: kubecost
