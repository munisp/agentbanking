# lending-credit — 5 services | ports 9521-9525
# Lending & credit — loans, BNPL, credit scoring, carbon credit marketplace
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-lending-credit-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /bnpl-engine/*
      backends:
        - serviceName: lending-credit
          servicePort: 9521
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/bnpl-engine/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-2
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /carbon-credit-marketplace/*
      backends:
        - serviceName: lending-credit
          servicePort: 9522
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/carbon-credit-marketplace/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-3
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /credit-scoring/*
      backends:
        - serviceName: lending-credit
          servicePort: 9523
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/credit-scoring/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-4
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /loan-management/*
      backends:
        - serviceName: lending-credit
          servicePort: 9524
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/loan-management/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-5
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /loan-service/*
      backends:
        - serviceName: lending-credit
          servicePort: 9525
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/loan-service/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
