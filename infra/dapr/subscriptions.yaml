# Dapr Pub/Sub Subscriptions — 54Link Platform
# Declarative subscriptions route Kafka/Redis events to HTTP endpoints
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: transaction-events
spec:
  pubsubname: kafka-pubsub
  topic: pos.transactions
  routes:
    default: /api/events/transaction
  scopes:
    - pos-shell
    - settlement-engine
    - fraud-detection
---
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: agent-events
spec:
  pubsubname: kafka-pubsub
  topic: pos.agents
  routes:
    default: /api/events/agent
  scopes:
    - pos-shell
    - agent-management
---
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: fraud-alerts
spec:
  pubsubname: kafka-pubsub
  topic: pos.fraud-alerts
  routes:
    rules:
      - match: event.data.severity == "critical"
        path: /api/events/fraud/critical
      - match: event.data.severity == "high"
        path: /api/events/fraud/high
    default: /api/events/fraud
  scopes:
    - pos-shell
    - fraud-detection
    - risk-engine
---
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: settlement-events
spec:
  pubsubname: kafka-pubsub
  topic: pos.settlements
  routes:
    default: /api/events/settlement
  scopes:
    - pos-shell
    - settlement-engine
---
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: kyc-events
spec:
  pubsubname: kafka-pubsub
  topic: pos.kyc
  routes:
    default: /api/events/kyc
  scopes:
    - pos-shell
