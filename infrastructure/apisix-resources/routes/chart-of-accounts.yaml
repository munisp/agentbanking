# chart-of-accounts
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-chart-of-accounts-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /chart-of-accounts/*
      backends:
        - serviceName: chart-of-accounts
          servicePort: 8080
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/chart-of-accounts/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
