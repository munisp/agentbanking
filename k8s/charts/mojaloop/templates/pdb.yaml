{{- range $component, $config := dict "central-ledger" .Values.centralLedger "ml-api-adapter" .Values.mlApiAdapter "account-lookup" .Values.accountLookup "quoting-service" .Values.quotingService }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $.Release.Name }}-{{ $component }}
  labels:
    app.kubernetes.io/name: {{ $component }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $component }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
{{- end }}
