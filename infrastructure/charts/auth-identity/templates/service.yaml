apiVersion: v1
kind: Service
metadata:
  name: {{ include "auth-identity.fullname" . }}
  labels:
    {{- include "auth-identity.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    {{- range .Values.service.ports }}
    - port: {{ .port }}
      targetPort: {{ .port }}
      protocol: TCP
      name: port-{{ .port }}
    {{- end }}
  selector:
    {{- include "auth-identity.selectorLabels" . | nindent 4 }}
