apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "fluvio.fullname" . }}-spu
  labels:
    app.kubernetes.io/name: {{ include "fluvio.name" . }}
    helm.sh/chart: {{ include "fluvio.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: spu
spec:
  serviceName: {{ include "fluvio.fullname" . }}-spu
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "fluvio.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: spu
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "fluvio.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: spu
    spec:
      serviceAccountName: {{ include "fluvio.serviceAccountName" . }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: {{ include "fluvio.name" . }}
                  app.kubernetes.io/instance: {{ .Release.Name }}
                  app.kubernetes.io/component: spu
              topologyKey: kubernetes.io/hostname
      containers:
        - name: spu
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/fluvio"]
          args: ["run", "spu"]
          ports:
            - name: public
              containerPort: {{ .Values.service.spuPublicPort }}
              protocol: TCP
            - name: private
              containerPort: {{ .Values.service.spuPrivatePort }}
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: public
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: public
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/fluvio/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- range .Values.persistence.accessModes }}
          - {{ . | quote }}
          {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
        {{- if .Values.persistence.storageClass }}
        {{- if (eq "-" .Values.persistence.storageClass) }}
        storageClassName: ""
        {{- else }}
        storageClassName: "{{ .Values.persistence.storageClass }}"
        {{- end }}
        {{- end }}
