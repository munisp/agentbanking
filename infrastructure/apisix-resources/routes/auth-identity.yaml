# auth-identity — 19 services | ports 9183-9201
# Identity & auth — Keycloak, MFA, biometric, PBAC, RBAC, face match, liveness
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-auth-identity-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /auth-service/*
      backends:
        - serviceName: auth-identity
          servicePort: 9183
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/auth-service/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-2
      priority: 10
