---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pos-compliance-report
  namespace: pos-shell
  labels:
    app: pos-shell
    component: compliance-cron
    sprint: "46"
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: compliance-report
              image: pos-shell:latest
              command: ["node", "scripts/compliance-report-generator.mjs"]
              envFrom:
                - secretRef:
                    name: pos-shell-secrets
          restartPolicy: OnFailure
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pos-exchange-rate-updater
  namespace: pos-shell
  labels:
    app: pos-shell
    component: exchange-rate-updater
    sprint: "46"
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: exchange-rate-updater
              image: pos-shell:latest
              command: ["node", "scripts/exchange-rate-updater.mjs"]
              envFrom:
                - secretRef:
                    name: pos-shell-secrets
          restartPolicy: OnFailure
---
apiVersion: v1
kind: Service
metadata:
  name: pos-notification-worker
  namespace: pos-shell
spec:
  selector:
    app: pos-notification-worker
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pos-notification-worker-hpa
  namespace: pos-shell
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pos-notification-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pos-bulk-payment-worker-hpa
  namespace: pos-shell
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pos-bulk-payment-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
