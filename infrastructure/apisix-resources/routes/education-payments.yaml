# education-payments
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-education-payments-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /education-payments/*
      backends:
        - serviceName: core-payments
          servicePort: 9344
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/education-payments/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
