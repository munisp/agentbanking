name: CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # ────────────────────────────────────────────────────────────────────────────────
  # 0. Secret scanning (Gitleaks) — MUST pass before any other job
  # ────────────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history needed for Gitleaks commit scanning

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # Optional: for org-level scanning
        with:
          args: >
            --redact
            --verbose
            --exit-code=1
            --config=.gitleaks.toml

  # ────────────────────────────────────────────────────────────────────────────────
  # 1. Type-check
  # ────────────────────────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm exec tsc --noEmit

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Lint
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ESLint + Prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm exec prettier --check .

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Unit tests
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      # Minimal env vars needed for tests (no real DB/secrets required)
      JWT_SECRET: ci-test-secret-32-chars-minimum!!
      POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/pos_shell_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pos_shell_test
      KEYCLOAK_URL: https://auth.test.54link.io
      KEYCLOAK_REALM: pos-shell
      KEYCLOAK_CLIENT_ID: pos-shell-app
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pos_shell_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────────
  # 3b. Snyk CVE Scanning
  # Scans npm dependencies for known CVEs beyond what npm audit catches.
  # Runs in parallel with the Vitest test job. Requires SNYK_TOKEN secret.
  # ───────────────────────────────────────────────────────────────────────────────
  snyk-scan:
    name: Snyk CVE Scan
    runs-on: ubuntu-latest
    needs: [secret-scan]
    # Skip if SNYK_TOKEN is not configured (optional in forks)
    if: ${{ secrets.SNYK_TOKEN != '' }}
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: false
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >
            --severity-threshold=high
            --fail-on=upgradable
            --json-file-output=snyk-report.json

      - name: Upload Snyk SARIF report to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif
        continue-on-error: true

      - name: Upload Snyk JSON report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-vulnerability-report
          path: snyk-report.json
          retention-days: 30

      - name: Run Snyk IaC scan (Docker + Kubernetes configs)
        uses: snyk/actions/iac@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >
            --severity-threshold=high
            --report

  # ───────────────────────────────────────────────────────────────────────────────
  # 4. Build
  # ───────────────────────────────────────────────────────────────────────────────
  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test]
    env:
      NODE_ENV: production
      VITE_APP_ID: ci-build
      JWT_SECRET: ci-build-secret-32-chars-minimum!!
      POSTGRES_URL: postgresql://localhost/placeholder
      DATABASE_URL: postgresql://localhost/placeholder
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. Docker build (verify Dockerfile is valid)
  # ─────────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: 54link/pos-shell:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # 6. k6 smoke test — validates server health after build
  # Runs against the built server started in CI to confirm all API endpoints
  # are reachable, security headers are present, and auth flows respond correctly.
  # ─────────────────────────────────────────────────────────────────────────────
  k6-smoke:
    name: k6 smoke test
    runs-on: ubuntu-latest
    needs: build
    env:
      NODE_ENV: production
      JWT_SECRET: ci-smoke-secret-32-chars-minimum!!
      POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/pos_shell_smoke
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pos_shell_smoke
      VITE_APP_ID: ci-smoke
      KEYCLOAK_URL: https://auth.test.54link.io
      KEYCLOAK_REALM: pos-shell
      KEYCLOAK_CLIENT_ID: pos-shell-app
      PLATFORM_BASE_URL: https://platform.staging.54link.io
      PLATFORM_API_KEY: ci-smoke-platform-key
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pos_shell_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Run database migrations
        run: pnpm db:push
        continue-on-error: true

      - name: Start server in background
        run: |
          node dist/index.js &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg \
            --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq
          sudo apt-get install -y k6

      - name: Run k6 smoke test
        run: |
          k6 run \
            -e BASE_URL=http://localhost:3000 \
            -e AGENT_CODE=AGT001 \
            -e AGENT_PIN=1234 \
            --summary-export=k6-smoke-summary.json \
            tests/load/smoke-test.js

      - name: Upload k6 smoke summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-smoke-summary
          path: k6-smoke-summary.json
          retention-days: 7

      - name: Stop server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────────────────────
  # 7. Playwright E2E tests — 3 parallel shards (~3 min wall-clock vs ~8 min)
  # Covers: agent login/cash-in, admin fraud alerts, float top-up, SIM coverage,
  #         offline queue sync, MDM device management, CBN compliance reporting.
  # ─────────────────────────────────────────────────────────────────────────────
  playwright:
    name: Playwright E2E (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]
    env:
      NODE_ENV: production
      JWT_SECRET: ci-e2e-secret-32-chars-minimum!!!
      POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/pos_shell_e2e
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pos_shell_e2e
      VITE_APP_ID: ci-e2e
      BASE_URL: http://localhost:3000
      TEST_ADMIN_EMAIL: admin@54link.ng
      TEST_ADMIN_PASS: TestAdmin123!
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pos_shell_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Run database migrations
        run: pnpm db:push
        continue-on-error: true

      - name: Start server in background
        run: |
          node dist/index.js &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run Playwright E2E tests (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
        run: |
          pnpm exec playwright test \
            --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} \
            --reporter=html,github
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report (shard ${{ matrix.shardIndex }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shardIndex }}
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright test results (shard ${{ matrix.shardIndex }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-shard-${{ matrix.shardIndex }}
          path: test-results/
          retention-days: 7

      - name: Stop server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────────────────────
  # 7b. Merge Playwright shard reports into a single HTML report
  # ─────────────────────────────────────────────────────────────────────────────
  playwright-merge-reports:
    name: Playwright — merge shard reports
    runs-on: ubuntu-latest
    needs: playwright
    if: always()
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download all shard reports
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-report-shard-*
          path: all-playwright-reports
          merge-multiple: true

      - name: Merge reports
        run: |
          pnpm exec playwright merge-reports \
            --reporter html \
            ./all-playwright-reports

      - name: Upload merged Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-merged
          path: playwright-report/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # 7c. Go microservice tests
  # Tests all Go services: MDM compliance engine, geofence service, OTA service
  # ─────────────────────────────────────────────────────────────────────────────
  go-tests:
    name: Go microservice tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run MDM compliance engine tests
        run: |
          if [ -f services/go/mdm-compliance-engine/go.mod ]; then
            cd services/go/mdm-compliance-engine
            go test ./... -v -timeout 60s 2>&1 | tee /tmp/go-mdm-test.log
            echo "MDM compliance engine tests complete"
          else
            echo "MDM compliance engine go.mod not found — skipping"
          fi
        continue-on-error: true

      - name: Run MDM geofence service tests
        run: |
          if [ -f services/go/mdm-geofence-service/go.mod ]; then
            cd services/go/mdm-geofence-service
            go test ./... -v -timeout 60s 2>&1 | tee /tmp/go-geofence-test.log
            echo "MDM geofence service tests complete"
          else
            echo "MDM geofence service go.mod not found — skipping"
          fi
        continue-on-error: true

      - name: Run OTA service tests
        run: |
          if [ -f server/ota-service/go.mod ]; then
            cd server/ota-service
            go test ./... -v -timeout 60s 2>&1 | tee /tmp/go-ota-test.log
            echo "OTA service tests complete"
          else
            echo "OTA service go.mod not found — skipping"
          fi
        continue-on-error: true

      - name: Upload Go test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-test-logs
          path: /tmp/go-*-test.log
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # 7d. Python microservice tests
  # Tests all Python services: CBN reporting engine, KYC service, fraud engine
  # ─────────────────────────────────────────────────────────────────────────────
  python-tests:
    name: Python microservice tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python test dependencies
        run: |
          pip install pytest pytest-asyncio pytest-cov
          # Install service-specific requirements where available
          for req in services/python/*/requirements.txt; do
            echo "Installing $req"
            pip install -r "$req" 2>/dev/null || true
          done

      - name: Run CBN reporting engine tests
        run: |
          if [ -d services/python/cbn-reporting-engine/tests ]; then
            cd services/python/cbn-reporting-engine
            python -m pytest tests/ -v --tb=short 2>&1 | tee /tmp/py-cbn-test.log
          else
            echo "CBN reporting engine tests not found — skipping"
          fi
        continue-on-error: true

      - name: Run KYC service tests
        run: |
          if [ -d services/python/kyc-service/tests ]; then
            cd services/python/kyc-service
            python -m pytest tests/ -v --tb=short 2>&1 | tee /tmp/py-kyc-test.log
          else
            echo "KYC service tests not found — skipping"
          fi
        continue-on-error: true

      - name: Run fraud engine tests
        run: |
          if [ -d services/python/fraud-engine/tests ]; then
            cd services/python/fraud-engine
            python -m pytest tests/ -v --tb=short 2>&1 | tee /tmp/py-fraud-test.log
          else
            echo "Fraud engine tests not found — skipping"
          fi
        continue-on-error: true

      - name: Upload Python test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-logs
          path: /tmp/py-*-test.log
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # 8. k6 OTA load test (runs on main branch only to avoid excessive CI time)
  # Simulates a fleet of 200 POS devices polling for OTA firmware updates.
  # ─────────────────────────────────────────────────────────────────────────────
  k6-ota-load:
    name: k6 OTA load test
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    env:
      NODE_ENV: production
      JWT_SECRET: ci-ota-secret-32-chars-minimum!!!
      POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/pos_shell_ota
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pos_shell_ota
      VITE_APP_ID: ci-ota
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT: http://localhost:9000
      S3_BUCKET: 54link-firmware
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pos_shell_ota
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      minio:
        image: minio/minio:latest
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "curl -sf http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create MinIO firmware bucket
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:9000/minio/health/live; then break; fi
            sleep 2
          done
          curl -sf https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc
          mc alias set myminio http://localhost:9000 minioadmin minioadmin
          mc mb myminio/54link-firmware --ignore-existing

      - name: Run database migrations
        run: pnpm db:push
        continue-on-error: true

      - name: Start main server in background
        run: |
          node dist/index.js &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Main server ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Build and start OTA service
        run: |
          if [ -f server/ota-service/main.go ]; then
            cd server/ota-service
            go build -o ota-service . 2>/dev/null || echo "OTA service build skipped"
            if [ -f ota-service ]; then
              ./ota-service &
              echo "OTA_PID=$!" >> $GITHUB_ENV
              sleep 3
            fi
          fi
        continue-on-error: true

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg \
            --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq
          sudo apt-get install -y k6

      - name: Run k6 OTA load test
        run: |
          mkdir -p k6/results
          k6 run \
            -e BASE_URL=http://localhost:3000 \
            -e OTA_SERVICE_URL=http://localhost:8081 \
            -e DEVICE_COUNT=200 \
            --summary-export=k6/results/mdm-ota-update.json \
            k6/mdm-ota-update.js
        continue-on-error: true

      - name: Upload k6 OTA load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-ota-results
          path: k6/results/
          retention-days: 30

      - name: Stop services
        if: always()
        run: |
          kill $SERVER_PID 2>/dev/null || true
          kill $OTA_PID 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────────────────────
  # 9. Prometheus alert rule validation
  # Validates all Prometheus alert rule YAML files for syntax correctness.
  # ─────────────────────────────────────────────────────────────────────────────
  prometheus-lint:
    name: Prometheus alert rule validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install promtool
        run: |
          PROM_VERSION="2.51.0"
          curl -sfL "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-amd64.tar.gz" \
            | tar -xz --strip-components=1 -C /usr/local/bin \
            "prometheus-${PROM_VERSION}.linux-amd64/promtool"
          promtool --version

      - name: Validate alert rules
        run: |
          echo "Validating Prometheus alert rules..."
          promtool check rules monitoring/prometheus/alerts.yml
          for f in monitoring/prometheus/alerts/*.yml; do
            echo "  Checking $f"
            promtool check rules "$f"
          done
          echo "All alert rules are valid."

  # ─────────────────────────────────────────────────────────────────────────────
  # 10. OWASP ZAP Dynamic Application Security Testing (DAST)
  # Runs after Playwright E2E to scan the live staging URL for HTTP-layer
  # vulnerabilities: missing security headers, open redirects, XSS, CSRF, etc.
  # Only runs on push to main/develop (not on feature branches or PRs).
  # ─────────────────────────────────────────────────────────────────────────────
  zap-dast:
    name: OWASP ZAP DAST Scan
    runs-on: ubuntu-latest
    needs: [playwright-merge-reports]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      issues: write
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start application server for ZAP scan
        env:
          NODE_ENV: production
          JWT_SECRET: zap-scan-jwt-secret-not-real
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'mysql://localhost/test' }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL || '' }}
        run: |
          pnpm build
          node dist/index.js &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: >
            -a
            -j
            -l WARN
            -I
          fail_action: true
          allow_issue_writing: true
          artifact_name: 'zap-baseline-report'
        continue-on-error: false

      - name: Run OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.10.0
        with:
          target: 'http://localhost:3000/api/trpc'
          format: openapi
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j -l WARN'
          artifact_name: 'zap-api-report'
        continue-on-error: true

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-security-reports
          path: |
            report_html.html
            report_json.json
            report_md.md
          retention-days: 30

      - name: Stop application server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true
