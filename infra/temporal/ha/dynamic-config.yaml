###############################################################################
# Temporal Dynamic Configuration — POS-54Link Production
###############################################################################

# ── Frontend ──────────────────────────────────────────────────────────────────
frontend.rps:
  - value: 10000
    constraints: {}
frontend.namespaceRPS:
  - value: 5000
    constraints: {}
frontend.globalNamespaceRPS:
  - value: 50000
    constraints: {}
frontend.maxNamespaceVisibilityRPSPerInstance:
  - value: 500
    constraints: {}
frontend.enableClientVersionCheck:
  - value: true
    constraints: {}

# ── History ───────────────────────────────────────────────────────────────────
history.defaultActivityRetryPolicy.InitialInterval:
  - value: "1s"
    constraints: {}
history.defaultActivityRetryPolicy.MaximumInterval:
  - value: "100s"
    constraints: {}
history.defaultActivityRetryPolicy.BackoffCoefficient:
  - value: 2.0
    constraints: {}
history.defaultActivityRetryPolicy.MaximumAttempts:
  - value: 0
    constraints: {}
history.maximumBufferedEvents:
  - value: 200
    constraints: {}
history.rps:
  - value: 10000
    constraints: {}
history.cacheMaxSize:
  - value: 65536
    constraints: {}
history.cacheTTL:
  - value: "1h"
    constraints: {}
history.maxWorkflowTaskTimeoutSeconds:
  - value: 120
    constraints: {}
history.longPollExpirationInterval:
  - value: "60s"
    constraints: {}

# ── Matching ──────────────────────────────────────────────────────────────────
matching.numTaskqueueReadPartitions:
  - value: 16
    constraints: {}
matching.numTaskqueueWritePartitions:
  - value: 16
    constraints: {}
matching.forwarderMaxOutstandingPolls:
  - value: 40
    constraints: {}
matching.forwarderMaxRatePerSecond:
  - value: 10000
    constraints: {}
matching.forwarderMaxChildrenPerNode:
  - value: 20
    constraints: {}
matching.rps:
  - value: 10000
    constraints: {}

# ── Worker ────────────────────────────────────────────────────────────────────
worker.replicatorConcurrency:
  - value: 1024
    constraints: {}

# ── Archival ──────────────────────────────────────────────────────────────────
system.archivalStatus:
  - value: enabled
    constraints: {}

# ── Persistence ───────────────────────────────────────────────────────────────
system.enableEagerNamespaceRefresher:
  - value: true
    constraints: {}
system.visibilityPersistenceMaxReadQPS:
  - value: 10000
    constraints: {}
system.visibilityPersistenceMaxWriteQPS:
  - value: 10000
    constraints: {}
system.historyPersistenceMaxReadQPS:
  - value: 30000
    constraints: {}
system.historyPersistenceMaxWriteQPS:
  - value: 30000
    constraints: {}
