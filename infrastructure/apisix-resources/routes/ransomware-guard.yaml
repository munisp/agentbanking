# ransomware-guard
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-ransomware-guard-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /ransomware-guard/*
      backends:
        - serviceName: security
          servicePort: 9562
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/ransomware-guard/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
