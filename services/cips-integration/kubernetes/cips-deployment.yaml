---
# CIPS Integration Service - Kubernetes Deployment
# Nigerian Remittance Platform
# Version: 1.0.0

apiVersion: v1
kind: Namespace
metadata:
  name: cips-integration
  labels:
    app: cips
    environment: production

---
# ConfigMap for CIPS Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: cips-config
  namespace: cips-integration
data:
  CIPS_ENVIRONMENT: "production"
  CIPS_ENDPOINT: "https://api.cips.com.cn/v1"
  CIPS_TIMEOUT: "30"
  CIPS_MAX_RETRIES: "3"
  CIPS_CONNECTION_POOL_SIZE: "10"
  CIPS_MAX_MESSAGE_SIZE: "1048576"
  CIPS_PROMETHEUS_ENABLED: "true"
  CIPS_PROMETHEUS_PORT: "9090"
  CIPS_LOG_LEVEL: "INFO"
  CIPS_AUDIT_LOG_ENABLED: "true"
  CIPS_AML_CHECK_ENABLED: "true"
  CIPS_SANCTIONS_SCREENING_ENABLED: "true"
  CIPS_TRANSACTION_LIMIT_USD: "1000000"
  CIPS_DAILY_LIMIT_USD: "10000000"
  CIPS_POSTGRES_PORT: "5432"
  CIPS_POSTGRES_DATABASE: "cips_remittance"
  CIPS_DB_POOL_SIZE: "20"
  TIGERBEETLE_CLUSTER_ID: "0"

---
# Secret for CIPS Credentials
apiVersion: v1
kind: Secret
metadata:
  name: cips-credentials
  namespace: cips-integration
type: Opaque
stringData:
  CIPS_PARTICIPANT_ID: "PARTICIPANT123456"  # Replace with actual
  CIPS_API_KEY: "your-api-key-here"  # Replace with actual
  CIPS_API_SECRET: "your-api-secret-here"  # Replace with actual
  CIPS_SWIFT_BIC: "CITIUS33"  # Replace with actual
  CIPS_POSTGRES_USER: "cips_user"
  CIPS_POSTGRES_PASSWORD: "secure-password-here"  # Replace with actual

---
# Secret for TLS Certificates
apiVersion: v1
kind: Secret
metadata:
  name: cips-tls-certs
  namespace: cips-integration
type: kubernetes.io/tls
data:
  tls.crt: LS0tLS1CRUdJTi... # Base64 encoded client certificate
  tls.key: LS0tLS1CRUdJTi... # Base64 encoded client key
  ca.crt: LS0tLS1CRUdJTi...  # Base64 encoded CA certificate

---
# PersistentVolumeClaim for Logs
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cips-logs-pvc
  namespace: cips-integration
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: fast-ssd

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cips-service
  namespace: cips-integration
  labels:
    app: cips-service
    version: v1.0.0
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: cips-service
  template:
    metadata:
      labels:
        app: cips-service
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: cips-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      initContainers:
      - name: wait-for-postgres
        image: postgres:15-alpine
        command:
          - sh
          - -c
          - |
            until pg_isready -h ${CIPS_POSTGRES_HOST} -p ${CIPS_POSTGRES_PORT} -U ${CIPS_POSTGRES_USER}; do
              echo "Waiting for PostgreSQL..."
              sleep 2
            done
        env:
        - name: CIPS_POSTGRES_HOST
          value: "postgres-service.database.svc.cluster.local"
        - name: CIPS_POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: cips-config
              key: CIPS_POSTGRES_PORT
        - name: CIPS_POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: cips-credentials
              key: CIPS_POSTGRES_USER
      
      - name: wait-for-tigerbeetle
        image: busybox:latest
        command:
          - sh
          - -c
          - |
            until nc -z tigerbeetle-service.tigerbeetle.svc.cluster.local 3000; do
              echo "Waiting for TigerBeetle..."
              sleep 2
            done
      
      containers:
      - name: cips-service
        image: nigerian-remittance/cips-service:v1.0.0
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        
        env:
        # ConfigMap values
        - name: CIPS_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: cips-config
              key: CIPS_ENVIRONMENT
        - name: CIPS_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: cips-config
              key: CIPS_ENDPOINT
        - name: CIPS_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: cips-config
              key: CIPS_TIMEOUT
        - name: CIPS_LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: cips-config
              key: CIPS_LOG_LEVEL
        
        # Secret values
        - name: CIPS_PARTICIPANT_ID
          valueFrom:
            secretKeyRef:
              name: cips-credentials
              key: CIPS_PARTICIPANT_ID
        - name: CIPS_API_KEY
          valueFrom:
            secretKeyRef:
              name: cips-credentials
              key: CIPS_API_KEY
        - name: CIPS_API_SECRET
          valueFrom:
            secretKeyRef:
              name: cips-credentials
              key: CIPS_API_SECRET
        - name: CIPS_SWIFT_BIC
          valueFrom:
            secretKeyRef:
              name: cips-credentials
              key: CIPS_SWIFT_BIC
        - name: CIPS_POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: cips-credentials
              key: CIPS_POSTGRES_USER
        - name: CIPS_POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cips-credentials
              key: CIPS_POSTGRES_PASSWORD
        
        # Service discovery
        - name: CIPS_POSTGRES_HOST
          value: "postgres-service.database.svc.cluster.local"
        - name: TIGERBEETLE_REPLICA_ADDRESSES
          value: "tigerbeetle-service.tigerbeetle.svc.cluster.local:3000"
        
        # TLS certificates
        - name: CIPS_CLIENT_CERT_PATH
          value: "/etc/cips/certs/tls.crt"
        - name: CIPS_CLIENT_KEY_PATH
          value: "/etc/cips/certs/tls.key"
        - name: CIPS_CA_CERT_PATH
          value: "/etc/cips/certs/ca.crt"
        
        volumeMounts:
        - name: tls-certs
          mountPath: /etc/cips/certs
          readOnly: true
        - name: logs
          mountPath: /var/log/cips
        
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        startupProbe:
          httpGet:
            path: /health/startup
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL
      
      volumes:
      - name: tls-certs
        secret:
          secretName: cips-tls-certs
      - name: logs
        persistentVolumeClaim:
          claimName: cips-logs-pvc
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - cips-service
              topologyKey: kubernetes.io/hostname

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: cips-service
  namespace: cips-integration
  labels:
    app: cips-service
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: cips-service

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cips-service-account
  namespace: cips-integration

---
# Role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cips-service-role
  namespace: cips-integration
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cips-service-rolebinding
  namespace: cips-integration
subjects:
- kind: ServiceAccount
  name: cips-service-account
  namespace: cips-integration
roleRef:
  kind: Role
  name: cips-service-role
  apiGroup: rbac.authorization.k8s.io

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cips-service-hpa
  namespace: cips-integration
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cips-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---
# PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cips-service-pdb
  namespace: cips-integration
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: cips-service

---
# NetworkPolicy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cips-service-netpol
  namespace: cips-integration
spec:
  podSelector:
    matchLabels:
      app: cips-service
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: api-gateway
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 9090
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: database
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - namespaceSelector:
        matchLabels:
          name: tigerbeetle
    ports:
    - protocol: TCP
      port: 3000
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 443

---
# ServiceMonitor for Prometheus
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cips-service-monitor
  namespace: cips-integration
  labels:
    app: cips-service
spec:
  selector:
    matchLabels:
      app: cips-service
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics

---
# PrometheusRule for Alerts
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cips-service-alerts
  namespace: cips-integration
spec:
  groups:
  - name: cips-service
    interval: 30s
    rules:
    - alert: CIPSServiceDown
      expr: up{job="cips-service"} == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "CIPS service is down"
        description: "CIPS service has been down for more than 5 minutes"
    
    - alert: CIPSHighErrorRate
      expr: rate(cips_errors_total[5m]) > 0.05
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "CIPS high error rate"
        description: "CIPS error rate is above 5% for 5 minutes"
    
    - alert: CIPSHighLatency
      expr: histogram_quantile(0.95, rate(cips_request_duration_seconds_bucket[5m])) > 2
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "CIPS high latency"
        description: "95th percentile latency is above 2 seconds"
    
    - alert: CIPSLowThroughput
      expr: rate(cips_requests_total[5m]) < 1
      for: 15m
      labels:
        severity: info
      annotations:
        summary: "CIPS low throughput"
        description: "CIPS throughput is below 1 TPS for 15 minutes"

