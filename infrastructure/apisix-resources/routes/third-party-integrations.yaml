# third-party-integrations — 5 services | ports 9594-9598
# Third-party integrations — ERPNext, Remitly, Zapier, additional connectors
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-third-party-integrations-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /additional-services/*
      backends:
        - serviceName: third-party-integrations
          servicePort: 9594
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/additional-services/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-2
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /erpnext-integration/*
      backends:
        - serviceName: third-party-integrations
          servicePort: 9595
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/erpnext-integration/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-3
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /remitly-integration/*
      backends:
        - serviceName: third-party-integrations
          servicePort: 9596
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/remitly-integration/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-4
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /zapier-integration/*
      backends:
        - serviceName: third-party-integrations
          servicePort: 9597
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/zapier-integration/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-5
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /zapier-service/*
      backends:
        - serviceName: third-party-integrations
          servicePort: 9598
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/zapier-service/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
