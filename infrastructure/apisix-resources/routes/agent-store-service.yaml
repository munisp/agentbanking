# agent-store-service
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-agent-store-service-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /agent-store/*
      backends:
        - serviceName: ecommerce-marketplace
          servicePort: 9412
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/agent-store/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
