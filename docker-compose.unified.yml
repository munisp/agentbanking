# Sprint 69: Unified Docker Compose — All 54Link POS Shell Services
# Usage: docker-compose -f docker-compose.unified.yml up -d
version: '3.9'

x-common-env: &common-env
  NODE_ENV: production
  DATABASE_URL: postgres://postgres:postgres@postgres:5432/pos_shell
  REDIS_URL: redis://redis:6379
  KAFKA_BROKERS: kafka:9092
  JWT_SECRET: ${JWT_SECRET:-default-jwt-secret-change-in-production}

services:
  # ============================================================
  # INFRASTRUCTURE
  # ============================================================
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pos_shell
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.9.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.9.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  temporal:
    image: temporalio/auto-setup:1.27.2
    depends_on:
      - postgres
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"

  # ============================================================
  # CORE APPLICATION
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      <<: *common-env
      PORT: 3000
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================
  # GO MICROSERVICES
  # ============================================================
  tb-sidecar:
    build:
      context: ./services/go/tb-sidecar
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - kafka
    environment:
      <<: *common-env
      SERVICE_PORT: 8081
    ports:
      - "8081:8081"

  go-gateway:
    build:
      context: ./services/go
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - redis
    environment:
      <<: *common-env
      SERVICE_PORT: 8080
    ports:
      - "8080:8080"

  # ============================================================
  # RUST MICROSERVICES
  # ============================================================
  fraud-engine:
    build:
      context: ./services/rust/fraud-engine
      dockerfile: Dockerfile
    depends_on:
      - redis
      - kafka
    environment:
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      SERVICE_PORT: 8082
    ports:
      - "8082:8082"

  rate-limiter:
    build:
      context: ./middleware/rust/rate-limiter
      dockerfile: Dockerfile
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
      SERVICE_PORT: 8083
    ports:
      - "8083:8083"

  rust-middleware-bridge:
    build:
      context: ./rust-middleware-bridge
      dockerfile: Dockerfile
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
      SERVICE_PORT: 8084
    ports:
      - "8084:8084"

  fluvio-producer:
    build:
      context: ./fluvio-producer
      dockerfile: Dockerfile
    depends_on:
      - kafka
    environment:
      KAFKA_BROKERS: kafka:9092
      SERVICE_PORT: 8085
    ports:
      - "8085:8085"

  # ============================================================
  # SECURITY MICROSERVICES (Sprint 71)
  # ============================================================
  ddos-shield:
    build:
      context: ./services/rust/ddos-shield
      dockerfile: Dockerfile
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
      SERVICE_PORT: 8086
      MAX_REQUESTS_PER_SECOND: 100
      BLOCK_DURATION_SECS: 300
    ports:
      - "8086:8086"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  pbac-engine:
    build:
      context: ./services/go/pbac-engine
      dockerfile: Dockerfile
    depends_on:
      - redis
      - postgres
    environment:
      <<: *common-env
      SERVICE_PORT: 8087
      REDIS_URL: redis://redis:6379
    ports:
      - "8087:8087"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  fraud-ml:
    build:
      context: ./services/python/fraud-ml-service
      dockerfile: Dockerfile
    depends_on:
      - redis
      - postgres
    environment:
      <<: *common-env
      SERVICE_PORT: 8088
      REDIS_URL: redis://redis:6379
      MODEL_PATH: /app/models
    ports:
      - "8088:8088"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ============================================================
  # PYTHON MICROSERVICES
  # ============================================================
  ml-service:
    build:
      context: ./services/python/ml-service
      dockerfile: Dockerfile
    depends_on:
      - redis
      - postgres
    environment:
      <<: *common-env
      SERVICE_PORT: 8090
      MODEL_PATH: /app/models
    ports:
      - "8090:8090"

  # ============================================================
  # TEMPORAL WORKER
  # ============================================================
  temporal-worker:
    build:
      context: .
      dockerfile: Dockerfile.temporal-worker
    depends_on:
      - temporal
      - postgres
      - redis
    environment:
      <<: *common-env
      TEMPORAL_ADDRESS: temporal:7233

  # ============================================================
  # MONITORING
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - promdata:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

  grafana:
    image: grafana/grafana:11.6.1
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clock-panel
    ports:
      - "3001:3000"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources

volumes:
  pgdata:
  redisdata:
  miniodata:
  promdata:
  grafanadata:

networks:
  default:
    name: pos-shell-network
