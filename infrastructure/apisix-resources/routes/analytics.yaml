# analytics
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-analytics-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /analytics/*
      backends:
        - serviceName: analytics-data
          servicePort: 9162
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/analytics/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
    - name: rule-3
      priority: 12
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /api/v1/analytics/*
      backends:
        - serviceName: analytics-data
          servicePort: 9164
      plugins:
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
    - name: rule-5
      priority: 13
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /api/v1/transaction-map-viz/*
      backends:
        - serviceName: analytics-data
          servicePort: 9164
      plugins:
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
    - name: rule-4
      priority: 13
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /api/v1/agent-performance-scorecard
      backends:
        - serviceName: analytics-data
          servicePort: 9164
      plugins:
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
    - name: rule-2
      priority: 11
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /api/analytics/revenue-forecast
      backends:
        - serviceName: analytics-data
          servicePort: 9175
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/api/analytics/revenue-forecast(.*)"
              - "/api/v1/projections/forecast$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
