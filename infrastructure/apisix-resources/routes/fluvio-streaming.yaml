# fluvio-streaming
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-fluvio-streaming-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /fluvio-streaming/*
      backends:
        - serviceName: infra-messaging
          servicePort: 9450
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/fluvio-streaming/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
