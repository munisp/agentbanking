name: Build Cbn Regulatory Consolidated Service

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'services/audit-chain/**'
      - 'services/audit-service/**'
      - 'services/cbn-compliance-comprehensive/**'
      - 'services/cbn-reporting-engine/**'
      - 'services/cbn-tiered-kyc/**'
      - 'services/compliance/**'
      - 'services/compliance-kyc/**'
      - 'services/compliance-reporting/**'
      - 'services/compliance-service/**'
      - 'services/compliance-workflows/**'
      - 'services/gdpr-service/**'
      - 'services/goaml-integration-go/**'
      - 'docker/Dockerfile.consolidated'
      - 'docker/build-services.sh'
      - '.github/workflows/cbn-regulatory.yaml'

env:
  TAG: "0.0.6"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: docker
          password: ${{ secrets.DO_API_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.consolidated
          push: true
          build-args: |
            SERVICES=audit-chain,audit-service,cbn-compliance-comprehensive,cbn-reporting-engine,cbn-tiered-kyc,compliance,compliance-kyc,compliance-reporting,compliance-service,compliance-workflows,gdpr-service,goaml-integration-go
            PORT_BASE=9224
          tags: registry.digitalocean.com/talentgraph-auth/54agent-cbn-regulatory:${{ env.TAG }}
