version: 2

updates:
  # ── Node.js / npm (main web app) ─────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Africa/Lagos"
    open-pull-requests-limit: 10
    reviewers:
      - "54link-platform"
    labels:
      - "dependencies"
      - "javascript"
      - "security"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
      include: "scope"
    groups:
      # Group all Radix UI updates together
      radix-ui:
        patterns:
          - "@radix-ui/*"
      # Group all tRPC updates together
      trpc:
        patterns:
          - "@trpc/*"
      # Group all AWS SDK updates together
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
      # Group all Drizzle ORM updates together
      drizzle:
        patterns:
          - "drizzle-*"
      # Group all Vitest/testing updates together
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "playwright"
          - "@playwright/*"
    ignore:
      # Pin major versions manually to avoid breaking changes
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  # ── Go (MDM compliance engine) ────────────────────────────────────────────
  - package-ecosystem: "gomod"
    directory: "/services/go/mdm-compliance-engine"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Africa/Lagos"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "go"
      - "security"
    commit-message:
      prefix: "chore(go-deps)"

