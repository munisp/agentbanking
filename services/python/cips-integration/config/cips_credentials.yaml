# CIPS Credentials Configuration
# Nigerian Remittance Platform - CIPS Integration
# Version: 1.0.0

environments:
  production:
    name: "CIPS Production"
    cips_endpoint: "https://api.cips.com.cn/v1"
    timeout_seconds: 30
    max_retries: 3
    
  sandbox:
    name: "CIPS Sandbox"
    cips_endpoint: "https://api-sandbox.cips.com.cn/v1"
    timeout_seconds: 30
    max_retries: 3

credentials:
  participant_id:
    env_var: "CIPS_PARTICIPANT_ID"
    description: "CIPS participant identification number"
    required: true
    example: "PARTICIPANT123456"
    
  api_key:
    env_var: "CIPS_API_KEY"
    description: "CIPS API authentication key"
    required: true
    sensitive: true
    
  api_secret:
    env_var: "CIPS_API_SECRET"
    description: "CIPS API secret for HMAC-SHA256 signatures"
    required: true
    sensitive: true
    
  swift_bic:
    env_var: "CIPS_SWIFT_BIC"
    description: "Institution SWIFT BIC code"
    required: true
    example: "CITIUS33"
    format: "^[A-Z]{6}[A-Z0-9]{2}([A-Z0-9]{3})?$"
    
  institution_name:
    env_var: "CIPS_INSTITUTION_NAME"
    description: "Legal name of the financial institution"
    required: true
    
  country_code:
    env_var: "CIPS_COUNTRY_CODE"
    description: "ISO 3166-1 alpha-2 country code"
    required: true
    example: "NG"
    
tls_certificates:
  client_cert:
    env_var: "CIPS_CLIENT_CERT_PATH"
    description: "Path to client TLS certificate (PEM format)"
    required: true
    example: "/etc/cips/certs/client.crt"
    
  client_key:
    env_var: "CIPS_CLIENT_KEY_PATH"
    description: "Path to client TLS private key (PEM format)"
    required: true
    example: "/etc/cips/certs/client.key"
    permissions: "400"
    
  ca_cert:
    env_var: "CIPS_CA_CERT_PATH"
    description: "Path to CIPS CA certificate (PEM format)"
    required: true
    example: "/etc/cips/certs/ca.crt"

network_settings:
  connection_pool_size:
    env_var: "CIPS_CONNECTION_POOL_SIZE"
    description: "Maximum number of concurrent connections"
    default: 10
    
  request_timeout:
    env_var: "CIPS_REQUEST_TIMEOUT"
    description: "Request timeout in seconds"
    default: 30
    
  retry_backoff:
    env_var: "CIPS_RETRY_BACKOFF"
    description: "Exponential backoff multiplier for retries"
    default: 2
    
  max_message_size:
    env_var: "CIPS_MAX_MESSAGE_SIZE"
    description: "Maximum ISO 20022 message size in bytes"
    default: 1048576  # 1MB

security:
  signature_algorithm:
    value: "HMAC-SHA256"
    description: "Message signature algorithm"
    
  encryption_algorithm:
    value: "AES-256-GCM"
    description: "Data encryption algorithm"
    
  tls_version:
    value: "TLSv1.3"
    description: "Minimum TLS version"
    
  ip_whitelist:
    env_var: "CIPS_IP_WHITELIST"
    description: "Comma-separated list of allowed IP addresses"
    example: "203.0.113.0/24,198.51.100.0/24"

compliance:
  aml_check_enabled:
    env_var: "CIPS_AML_CHECK_ENABLED"
    description: "Enable AML compliance checks"
    default: true
    
  sanctions_screening_enabled:
    env_var: "CIPS_SANCTIONS_SCREENING_ENABLED"
    description: "Enable sanctions screening"
    default: true
    
  transaction_limit_usd:
    env_var: "CIPS_TRANSACTION_LIMIT_USD"
    description: "Maximum transaction amount in USD"
    default: 1000000
    
  daily_limit_usd:
    env_var: "CIPS_DAILY_LIMIT_USD"
    description: "Maximum daily transaction volume in USD"
    default: 10000000

monitoring:
  prometheus_enabled:
    env_var: "CIPS_PROMETHEUS_ENABLED"
    description: "Enable Prometheus metrics export"
    default: true
    
  prometheus_port:
    env_var: "CIPS_PROMETHEUS_PORT"
    description: "Prometheus metrics port"
    default: 9090
    
  log_level:
    env_var: "CIPS_LOG_LEVEL"
    description: "Logging level"
    default: "INFO"
    options: ["DEBUG", "INFO", "WARNING", "ERROR", "CRITICAL"]
    
  audit_log_enabled:
    env_var: "CIPS_AUDIT_LOG_ENABLED"
    description: "Enable audit logging"
    default: true

database:
  postgres_host:
    env_var: "CIPS_POSTGRES_HOST"
    description: "PostgreSQL host"
    required: true
    
  postgres_port:
    env_var: "CIPS_POSTGRES_PORT"
    description: "PostgreSQL port"
    default: 5432
    
  postgres_database:
    env_var: "CIPS_POSTGRES_DATABASE"
    description: "PostgreSQL database name"
    default: "cips_remittance"
    
  postgres_user:
    env_var: "CIPS_POSTGRES_USER"
    description: "PostgreSQL username"
    required: true
    
  postgres_password:
    env_var: "CIPS_POSTGRES_PASSWORD"
    description: "PostgreSQL password"
    required: true
    sensitive: true
    
  connection_pool_size:
    env_var: "CIPS_DB_POOL_SIZE"
    description: "Database connection pool size"
    default: 20

tigerbeetle:
  cluster_id:
    env_var: "TIGERBEETLE_CLUSTER_ID"
    description: "TigerBeetle cluster ID"
    required: true
    default: 0
    
  replica_addresses:
    env_var: "TIGERBEETLE_REPLICA_ADDRESSES"
    description: "Comma-separated list of TigerBeetle replica addresses"
    required: true
    example: "3000,3001,3002"

# Setup Instructions
setup_instructions: |
  1. Register with CIPS:
     - Visit https://www.cips.com.cn
     - Complete participant registration form
     - Provide institution details and documentation
     - Wait for approval (typically 4-6 weeks)
  
  2. Obtain Credentials:
     - Receive participant ID from CIPS
     - Generate API key and secret in CIPS portal
     - Download TLS certificates
     - Configure SWIFT BIC code
  
  3. Configure Environment Variables:
     export CIPS_PARTICIPANT_ID="your-participant-id"
     export CIPS_API_KEY="your-api-key"
     export CIPS_API_SECRET="your-api-secret"
     export CIPS_SWIFT_BIC="your-bic-code"
     export CIPS_CLIENT_CERT_PATH="/path/to/client.crt"
     export CIPS_CLIENT_KEY_PATH="/path/to/client.key"
     export CIPS_CA_CERT_PATH="/path/to/ca.crt"
  
  4. Test Sandbox Connection:
     python3 -m cips_integration.network.cips_network_client
  
  5. Deploy to Production:
     - Update environment to 'production'
     - Configure monitoring and alerts
     - Enable audit logging
     - Start service

# Troubleshooting
troubleshooting:
  connection_failed:
    issue: "Cannot connect to CIPS network"
    solutions:
      - "Verify participant ID and API credentials"
      - "Check TLS certificates are valid and not expired"
      - "Ensure IP address is whitelisted"
      - "Verify network connectivity to CIPS endpoint"
      - "Check firewall rules allow outbound HTTPS"
  
  authentication_failed:
    issue: "Authentication failed (401/403)"
    solutions:
      - "Verify API key and secret are correct"
      - "Check HMAC signature generation"
      - "Ensure timestamp is within 5 minutes of server time"
      - "Verify BIC code matches registered institution"
  
  message_rejected:
    issue: "ISO 20022 message rejected"
    solutions:
      - "Validate XML against ISO 20022 schema"
      - "Check all required fields are populated"
      - "Verify BIC codes are valid"
      - "Ensure amounts and currencies are correct"
      - "Check message size is within limits"

