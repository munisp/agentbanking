apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencti
  namespace: security
  labels:
    app: opencti
spec:
  replicas: 2
  selector:
    matchLabels:
      app: opencti
  template:
    metadata:
      labels:
        app: opencti
    spec:
      containers:
      - name: opencti
        image: opencti/platform:latest
        ports:
        - containerPort: 8080
        env:
        - name: APP__PORT
          value: "8080"
        - name: APP__BASE_URL
          value: "http://opencti.security.svc.cluster.local:8080"
        - name: REDIS__HOSTNAME
          value: "redis-service"
        - name: ELASTICSEARCH__URL
          value: "http://elasticsearch-service:9200"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
---
apiVersion: v1
kind: Service
metadata:
  name: opencti-service
  namespace: security
spec:
  selector:
    app: opencti
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
  type: ClusterIP
