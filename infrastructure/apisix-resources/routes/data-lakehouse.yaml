# data-lakehouse — 13 services | ports 9384-9396
# Data & lakehouse — ETL, lakehouse, FalkorDB, Ollama, backups, sync
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-data-lakehouse-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /backup-manager/*
      backends:
        - serviceName: data-lakehouse
          servicePort: 9384
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/backup-manager/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-2
      priority: 10
