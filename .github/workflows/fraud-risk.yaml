name: Build Fraud Risk Consolidated Service

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'services/aml-case-manager-go/**'
      - 'services/aml-monitoring/**'
      - 'services/fraud-detection/**'
      - 'services/fraud-ml-pipeline/**'
      - 'services/fraud-ml-service/**'
      - 'services/risk-assessment/**'
      - 'services/risk-management/**'
      - 'services/rule-engine/**'
      - 'services/sanctions-batch-rescreener/**'
      - 'services/sanctions-etl/**'
      - 'services/transaction-scoring/**'
      - 'services/tx-monitor-alerter/**'
      - 'services/tx-validator/**'
      - 'docker/Dockerfile.consolidated'
      - 'docker/entrypoint.sh'
      - 'docker/build-services.sh'
      - '.github/workflows/fraud-risk.yaml'

env:
  TAG: "0.0.1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: docker
          password: ${{ secrets.DO_API_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.consolidated
          push: true
          build-args: |
            SERVICES=aml-case-manager-go,aml-monitoring,fraud-detection,fraud-ml-pipeline,fraud-ml-service,risk-assessment,risk-management,rule-engine,sanctions-batch-rescreener,sanctions-etl,transaction-scoring,tx-monitor-alerter,tx-validator
            PORT_BASE=9430
          tags: registry.digitalocean.com/talentgraph-auth/54agent-fraud-risk:${{ env.TAG }}
