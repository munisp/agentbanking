name: Build Open Banking Api

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'services/open-banking-api/**'
      - '.github/workflows/open-banking-api.yaml'

env:
  TAG: "0.0.13"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: docker
          password: ${{ secrets.DO_API_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./services/open-banking-api
          file: ./services/open-banking-api/Dockerfile
          push: true
          tags: registry.digitalocean.com/talentgraph-auth/54agent-open-banking-api:${{ env.TAG }}
