# ==============================================================================
# Redis 7.2 — High-Throughput Configuration (Millions of ops/sec)
# Target: 16 vCPU / 64 GB RAM / NVMe SSD
# Deploy as Redis Cluster (6 nodes: 3 primary + 3 replica) for horizontal scale
# ==============================================================================

# ── Memory ───────────────────────────────────────────────────────────────────
maxmemory 48gb
maxmemory-policy allkeys-lfu           # LFU eviction (better than LRU for hot keys)
maxmemory-samples 10
active-expire-enabled yes
active-expire-effort 50                # 50% CPU for expiry (aggressive)

# ── Persistence — Tuned for Throughput ───────────────────────────────────────
# RDB: snapshot less frequently to reduce I/O
save 3600 1                            # Snapshot every hour if >= 1 change
save 300 100                           # Every 5 min if >= 100 changes
save 60 100000                         # Every minute if >= 100K changes

# AOF: everysec fsync (1-second data loss window, 10x faster than always)
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite yes          # Don't fsync during BGSAVE/BGREWRITE
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 512mb        # Larger min for less frequent rewrites
aof-use-rdb-preamble yes               # Hybrid AOF (RDB header + AOF tail)

# ── Networking — High Connection Throughput ──────────────────────────────────
bind 0.0.0.0
port 6379
tcp-backlog 65535                      # Large backlog for burst connections
timeout 0                             # No idle timeout (let PgBouncer/app handle)
tcp-keepalive 60
maxclients 65535                       # Max concurrent connections

# ── I/O Threading (Redis 7.x) ───────────────────────────────────────────────
io-threads 8                           # Use 8 I/O threads for network processing
io-threads-do-reads yes                # Threaded reads (major throughput boost)

# ── Pipelining & Multi-Exec ─────────────────────────────────────────────────
# No config needed — pipelining is client-side. Use PIPELINE/MULTI for batching.
# Recommended: batch 100-1000 commands per pipeline for optimal throughput.

# ── Lazy Freeing (Non-blocking deletes) ──────────────────────────────────────
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
lazyfree-lazy-user-del yes
lazyfree-lazy-user-flush yes

# ── Active Defragmentation ───────────────────────────────────────────────────
activedefrag yes
active-defrag-enabled yes
active-defrag-cycle-min 5
active-defrag-cycle-max 50
active-defrag-threshold-lower 10       # Start defrag at 10% fragmentation
active-defrag-threshold-upper 100

# ── Cluster Mode ─────────────────────────────────────────────────────────────
# Uncomment for Redis Cluster deployment:
# cluster-enabled yes
# cluster-config-file nodes.conf
# cluster-node-timeout 5000
# cluster-migration-barrier 1
# cluster-require-full-coverage no     # Allow partial availability

# ── Slow Query Logging ───────────────────────────────────────────────────────
slowlog-log-slower-than 5000           # Log commands > 5ms
slowlog-max-len 256

# ── Replication ──────────────────────────────────────────────────────────────
replica-serve-stale-data yes
replica-read-only yes
repl-diskless-sync yes
repl-diskless-sync-delay 0            # Start sync immediately
repl-diskless-sync-period 0
repl-backlog-size 512mb               # Larger backlog for burst replication

# ── Keyspace Notifications ───────────────────────────────────────────────────
notify-keyspace-events Ex

# ── Logging ──────────────────────────────────────────────────────────────────
loglevel warning                       # Reduce log volume in production
logfile /var/log/redis/redis-server.log

# ── Security ─────────────────────────────────────────────────────────────────
# requirepass <set-via-env>
# tls-port 6380
# tls-cert-file /etc/redis/tls/redis.crt
# tls-key-file /etc/redis/tls/redis.key
# tls-ca-cert-file /etc/redis/tls/ca.crt
