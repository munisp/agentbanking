    metadata:
      labels:
        app: billing-stream-processor
        language: rust
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "billing-stream-processor"
        dapr.io/app-port: "8080"
        dapr.io/app-protocol: "grpc"
