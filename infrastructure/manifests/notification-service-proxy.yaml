apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: 54agent
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8091
      targetPort: 8091
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: notification-service
  namespace: 54agent
subsets:
  - addresses:
      - ip: NOTIFICATION_SERVICE_CLUSTER_IP
    ports:
      - name: http
        port: 8091
        protocol: TCP
