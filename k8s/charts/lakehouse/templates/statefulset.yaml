---
# MinIO StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-minio
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  serviceName: {{ .Release.Name }}-minio-headless
  replicas: {{ .Values.minio.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - minio
              topologyKey: "kubernetes.io/hostname"
      containers:
        - name: minio
          image: "{{ .Values.minio.image.repository }}:{{ .Values.minio.image.tag }}"
          imagePullPolicy: {{ .Values.minio.image.pullPolicy }}
          command:
            - "minio"
            - "server"
            - "http://{{ .Release.Name }}-minio-{0...3}.{{ .Release.Name }}-minio-headless.{{ .Release.Namespace }}.svc.cluster.local/data"
            - "--console-address"
            - ":9001"
          ports:
            - name: http
              containerPort: 9000
              protocol: TCP
            - name: console
              containerPort: 9001
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        {{- if .Values.minio.persistence.storageClass }}
        storageClassName: "{{ .Values.minio.persistence.storageClass }}"
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.minio.persistence.size }}
---
# Spark Master Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-spark-master
  labels:
    app.kubernetes.io/name: spark-master
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.spark.master.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: spark-master
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spark-master
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: spark-master
          image: "{{ .Values.spark.master.image.repository }}:{{ .Values.spark.master.image.tag }}"
          imagePullPolicy: {{ .Values.spark.master.image.pullPolicy }}
          env:
            - name: SPARK_MODE
              value: master
          ports:
            - name: cluster
              containerPort: 7077
              protocol: TCP
            - name: webui
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: 7077
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 7077
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.spark.master.resources | nindent 12 }}
---
# Spark Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-spark-worker
  labels:
    app.kubernetes.io/name: spark-worker
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.spark.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: spark-worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spark-worker
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - spark-worker
              topologyKey: "kubernetes.io/hostname"
      containers:
        - name: spark-worker
          image: "{{ .Values.spark.worker.image.repository }}:{{ .Values.spark.worker.image.tag }}"
          imagePullPolicy: {{ .Values.spark.worker.image.pullPolicy }}
          env:
            - name: SPARK_MODE
              value: worker
            - name: SPARK_MASTER_URL
              value: spark://{{ .Release.Name }}-spark-master:7077
          ports:
            - name: webui
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.spark.worker.resources | nindent 12 }}
---
# Hive Metastore Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-hive-metastore
  labels:
    app.kubernetes.io/name: hive-metastore
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.hive.metastore.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: hive-metastore
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hive-metastore
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: hive-metastore
          image: "{{ .Values.hive.metastore.image.repository }}:{{ .Values.hive.metastore.image.tag }}"
          imagePullPolicy: {{ .Values.hive.metastore.image.pullPolicy }}
          ports:
            - name: metastore
              containerPort: 9083
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: 9083
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 9083
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.hive.metastore.resources | nindent 12 }}
