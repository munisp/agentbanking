# carbon-credit-marketplace
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-carbon-credit-marketplace-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /carbon-credit-marketplace/*
      backends:
        - serviceName: lending-credit
          servicePort: 9522
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/carbon-credit-marketplace/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
