# realtime-fee-splitter
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-realtime-fee-splitter-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /realtime-fee-splitter/*
      backends:
        - serviceName: realtime-transactions
          servicePort: 9550
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/realtime-fee-splitter/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
