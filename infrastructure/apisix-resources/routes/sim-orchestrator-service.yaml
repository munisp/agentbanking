# sim-orchestrator-service
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-sim-orchestrator-service-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /sim-orchestrator/*
      backends:
        - serviceName: sim-orchestrator-service
          servicePort: 9200
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/sim-orchestrator/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
