version: '3.8'

services:
  postgres-metadata-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: postgres-metadata-service
    ports:
      - "5433:5433"
    environment:
      - FLASK_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5433/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
