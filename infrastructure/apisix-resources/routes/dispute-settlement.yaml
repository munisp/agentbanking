          enable: true
          config:
            regex_uri:
              - "^/settlement-ledger-sync/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-9
      priority: 10
      match:
        hosts:
