# GitHub Secret Scanning Configuration
# Docs: https://docs.github.com/en/code-security/secret-scanning/configuring-secret-scanning-for-your-repositories
#
# This file configures which paths to exclude from GitHub's built-in secret scanning.
# GitHub Secret Scanning runs automatically on all repositories with GitHub Advanced Security.
#
# NOTE: Exclusions should be minimal — only exclude paths that are known to contain
# test fixtures, example values, or non-sensitive placeholders.

paths-ignore:
  # Test fixtures — contain intentionally fake secrets for unit tests
  - "server/**/*.test.ts"
  - "server/**/*.spec.ts"
  - "e2e/**/*.spec.ts"
  - "services/python/**/tests/**"
  - "services/go/**/*_test.go"

  # Documentation — contain example values and placeholders
  - "docs/**"
  - "**/*.md"
  - "README.md"
  - "RUNBOOK.md"
  - "DEPLOYMENT.md"
  - "SECURITY_AUDIT_REPORT.md"
  - "SECURITY_POSTURE.md"

  # Example/template env files — contain placeholder values
  - ".env.production.example"
  - ".env.*.example"

  # Gitleaks config — contains regex patterns that look like secrets
  - ".gitleaks.toml"

  # Snyk policy — contains CVE IDs that may trigger false positives
  - ".snyk"
