# supply-chain-govt — 7 services | ports 9585-9591
# Supply chain & government — agritech, inventory, government integration
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-supply-chain-govt-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /agritech-payments/*
      backends:
        - serviceName: supply-chain-govt
          servicePort: 9585
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/agritech-payments/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-2
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /government-integration/*
      backends:
        - serviceName: supply-chain-govt
          servicePort: 9586
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/government-integration/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-3
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /i18n-currency/*
      backends:
        - serviceName: supply-chain-govt
          servicePort: 9587
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/i18n-currency/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-4
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /inventory-management/*
      backends:
        - serviceName: supply-chain-govt
          servicePort: 9588
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/inventory-management/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-5
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /inventory-service/*
      backends:
        - serviceName: supply-chain-govt
          servicePort: 9589
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/inventory-service/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-6
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /supply-chain/*
      backends:
        - serviceName: supply-chain-govt
          servicePort: 9590
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/supply-chain/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-7
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /supply-chain-go/*
      backends:
        - serviceName: supply-chain-govt
          servicePort: 9591
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/supply-chain-go/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
