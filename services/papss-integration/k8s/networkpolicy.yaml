apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: papss-integration-network-policy
  namespace: remittance-platform
  labels:
    app: papss-integration
spec:
  podSelector:
    matchLabels:
      app: papss-integration
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from API Gateway
  - from:
    - namespaceSelector:
        matchLabels:
          name: remittance-platform
      podSelector:
        matchLabels:
          app: api-gateway
    ports:
    - protocol: TCP
      port: 8080
  # Allow traffic from other payment services
  - from:
    - namespaceSelector:
        matchLabels:
          name: remittance-platform
      podSelector:
        matchLabels:
          tier: backend
    ports:
    - protocol: TCP
      port: 8080
  # Allow Prometheus scraping
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
      podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 8081
  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  # Allow TigerBeetle connections
  - to:
    - podSelector:
        matchLabels:
          app: tigerbeetle
    ports:
    - protocol: TCP
      port: 3000
  # Allow PostgreSQL connections
  - to:
    - podSelector:
        matchLabels:
          app: postgresql
    ports:
    - protocol: TCP
      port: 5432
  # Allow Redis connections
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  # Allow external PAPSS API
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
  # Allow mobile money operator APIs
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443

