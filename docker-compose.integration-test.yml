# Integration test suite for 20 future-proofing features
# Verifies all Go, Rust, and Python microservices can start and respond to health checks
#
# Usage:
#   docker compose -f docker-compose.integration-test.yml up --build -d
#   docker compose -f docker-compose.integration-test.yml run --rm test-runner
#   docker compose -f docker-compose.integration-test.yml down -v

services:
  # --- Infrastructure ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fiftyfourlink
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports: ["9092:9092"]
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 5s
      timeout: 5s
      retries: 15

  # --- Go Services (ports 8230-8269, step 3) ---
  go-open-banking-api:
    build: ./services/go/open-banking-api
    ports: ["8230:8230"]
    environment: &go-env
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/fiftyfourlink
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://redis:6379
      DAPR_HTTP_PORT: "3500"
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck: &health-check
      test: ["CMD-SHELL", "wget -qO- http://localhost:8230/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  go-bnpl-engine:
    build: ./services/go/bnpl-engine
    ports: ["8233:8233"]
    environment: *go-env
    depends_on: { postgres: { condition: service_healthy }, kafka: { condition: service_healthy } }
    healthcheck: { <<: *health-check, test: ["CMD-SHELL", "wget -qO- http://localhost:8233/health || exit 1"] }

