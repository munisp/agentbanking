replicaCount: 1
image:
  repository: registry.digitalocean.com/talentgraph-auth/54agent-channels-social
  pullPolicy: IfNotPresent
  tag: "0.0.1"
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  create: false
  name: 54agent
podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}
service:
  type: ClusterIP
  ports:
    - port: 9238
    - port: 9239
    - port: 9240
    - port: 9241
    - port: 9242
    - port: 9243
    - port: 9244
    - port: 9245
    - port: 9246
    - port: 9247
    - port: 9248
    - port: 9249
    - port: 9250
    - port: 9251
    - port: 9252
    - port: 9253
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    ephemeral-storage: 512Mi
    cpu: 1000m
    memory: 1024Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
volumes: []
volumeMounts: []
nodeSelector: {}
tolerations: []
affinity: {}
dapr:
  appId: channels-social
  appPort: 9238
  enableMetrics: true
  enabled: true
  metricsPort: 9099
  sidecarListenAddresses: "0.0.0.0"
  cpu-request: 100m
  cpu-limit: 300m
  memory-request: 250Mi
  memory-limit: 1000Mi
secrets:
  APP_PORT: "9238"
  PORT_BASE: "9238"
  SERVICE_GROUP: channels-social
  SERVICES: "at-sms-sender,at-sms-webhook,discord-service,email-service,google-assistant-service,instagram-service,messenger-service,rcs-service,snapchat-service,telegram-service,tiktok-service,twitter-service,wechat-service,whatsapp-ai-bot,whatsapp-order-service,whatsapp-service"
