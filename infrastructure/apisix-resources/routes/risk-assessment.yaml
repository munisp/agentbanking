# risk-assessment
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-risk-assessment-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /risk-assessment/*
      backends:
        - serviceName: fraud-risk
          servicePort: 9436
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/risk-assessment/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
