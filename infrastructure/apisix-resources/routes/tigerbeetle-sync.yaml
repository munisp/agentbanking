# tigerbeetle-sync
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-tigerbeetle-sync-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /tigerbeetle-sync/*
      backends:
        - serviceName: core-ledger
          servicePort: 9335
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/tigerbeetle-sync/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
