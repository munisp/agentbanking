  # --- Integration Test Runner ---
  test-runner:
    image: curlimages/curl:8.4.0
    depends_on:
      go-open-banking-api: { condition: service_healthy }
      go-bnpl-engine: { condition: service_healthy }
      rust-open-banking-api: { condition: service_healthy }
      rust-bnpl-engine: { condition: service_healthy }
      python-open-banking-api: { condition: service_healthy }
      python-bnpl-engine: { condition: service_healthy }
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== Integration Test Suite: 20 Future-Proofing Features ==="
        PASS=0; FAIL=0

        check_health() {
          local name="$$1" url="$$2"
          if wget -qO- "$$url" 2>/dev/null | grep -qi "healthy\|ok\|running"; then
            echo "  PASS $$name"
            PASS=$$((PASS + 1))
          else
            echo "  FAIL $$name ($$url)"
            FAIL=$$((FAIL + 1))
          fi
        }

        echo ""
        echo "--- Go Services ---"
