# network-quality-predictor
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-network-quality-predictor-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /network-quality-predictor/*
      backends:
        - serviceName: connectivity-sim
          servicePort: 9307
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/network-quality-predictor/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
