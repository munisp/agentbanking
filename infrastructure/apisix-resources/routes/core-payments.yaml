# core-payments — 30 services | ports 9339-9368
# Payments — NIBSS, cross-border, NFC, QR, Mojaloop, PAPSS, SWIFT, UPI
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-core-payments-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /bill-payment-gateway/*
      backends:
        - serviceName: core-payments
          servicePort: 9339
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/bill-payment-gateway/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-2
