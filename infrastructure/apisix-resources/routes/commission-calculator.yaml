# commission-calculator
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-commission-calculator-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /commission-calculator/*
      backends:
        - serviceName: agent-core
          servicePort: 9115
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/commission-calculator/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
