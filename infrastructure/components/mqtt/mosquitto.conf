# Mosquitto MQTT broker — 54agent POS bridge

listener 1883
protocol mqtt

listener 9001
protocol websockets

# TLS listener (requires certs)
# listener 8883
# certfile /mosquitto/config/certs/server.crt
# keyfile  /mosquitto/config/certs/server.key
# cafile   /mosquitto/config/certs/ca.crt
# tls_version tlsv1.2

# Authentication (use password_file or auth_plugin in production)
allow_anonymous true
# password_file /mosquitto/config/passwd

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# Topic ACL examples (uncomment to enforce)
# topic read  pos/+/status
# topic write pos/+/transactions
# topic readwrite agent/+/#
