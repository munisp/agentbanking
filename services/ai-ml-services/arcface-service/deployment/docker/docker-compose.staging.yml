# ArcFace Face Matching Service - Docker Compose (Staging)
# Complete stack with service, Redis, monitoring

version: '3.8'

services:
  # ============================================================================
  # ArcFace Face Matching Service
  # ============================================================================
  arcface-service:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    image: arcface-service:1.0.0-staging
    container_name: arcface-service-staging
    restart: unless-stopped
    
    # GPU support (comment out for CPU-only)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    
    ports:
      - "8004:8004"
    
    environment:
      - SERVICE_ENV=staging
      - DEVICE=cuda
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=INFO
      - WORKERS=4
    
    env_file:
      - ../.env.staging
    
    volumes:
      - ./models:/app/models:ro
      - ./logs:/var/log/arcface-service
      - ./cache:/app/cache
    
    depends_on:
      - redis
    
    networks:
      - arcface-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/api/v1/face-matching/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # ============================================================================
  # Redis Cache
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: arcface-redis-staging
    restart: unless-stopped
    
    ports:
      - "6379:6379"
    
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    
    volumes:
      - redis-data:/data
    
    networks:
      - arcface-network
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================================================
  # Prometheus Monitoring
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: arcface-prometheus-staging
    restart: unless-stopped
    
    ports:
      - "9090:9090"
    
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    
    networks:
      - arcface-network
    
    depends_on:
      - arcface-service
    
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================================================
  # Grafana Dashboard
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: arcface-grafana-staging
    restart: unless-stopped
    
    ports:
      - "3000:3000"
    
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin_change_in_production
      - GF_USERS_ALLOW_SIGN_UP=false
    
    volumes:
      - ../monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana-data:/var/lib/grafana
    
    networks:
      - arcface-network
    
    depends_on:
      - prometheus
    
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================================================
  # Nginx Reverse Proxy
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: arcface-nginx-staging
    restart: unless-stopped
    
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    
    networks:
      - arcface-network
    
    depends_on:
      - arcface-service
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

# ============================================================================
# Networks
# ============================================================================
networks:
  arcface-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

# ============================================================================
# Volumes
# ============================================================================
volumes:
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  nginx-logs:
    driver: local

# ============================================================================
# Usage Instructions:
# ============================================================================
# Start all services:
#   docker-compose -f deployment/docker/docker-compose.staging.yml up -d
#
# View logs:
#   docker-compose -f deployment/docker/docker-compose.staging.yml logs -f arcface-service
#
# Stop all services:
#   docker-compose -f deployment/docker/docker-compose.staging.yml down
#
# Stop and remove volumes:
#   docker-compose -f deployment/docker/docker-compose.staging.yml down -v
#
# Scale service:
#   docker-compose -f deployment/docker/docker-compose.staging.yml up -d --scale arcface-service=3
#
# Access services:
#   - ArcFace API: http://localhost:8004
#   - API Docs: http://localhost:8004/docs
#   - Prometheus: http://localhost:9090
#   - Grafana: http://localhost:3000 (admin/admin_change_in_production)
#   - Redis: localhost:6379
# ============================================================================
