version: "3.8"

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=staging
      - DATABASE_URL=postgres://agentbanking:staging_pass@db:5432/agentbanking_staging
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=debug
      - OTEL_ENABLED=true
      - FEATURE_FLAGS_OVERRIDE=all_enabled
    depends_on:
      - db
      - redis
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentbanking_staging
      POSTGRES_USER: agentbanking
      POSTGRES_PASSWORD: staging_pass
    volumes:
      - staging_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

volumes:
  staging_pgdata:
