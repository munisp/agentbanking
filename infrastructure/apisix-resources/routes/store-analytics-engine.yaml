# store-analytics-engine
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-store-analytics-engine-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /store-analytics-engine/*
      backends:
        - serviceName: analytics-data
          servicePort: 9178
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/store-analytics-engine/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
