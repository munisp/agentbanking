apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-metadata-service
  namespace: pix-integration
spec:
  replicas: 2
  selector:
    matchLabels:
      app: postgres-metadata-service
  template:
    metadata:
      labels:
        app: postgres-metadata-service
    spec:
      containers:
      - name: postgres-metadata-service
        image: postgres-metadata-service:2.0.0
        ports:
        - containerPort: 5433
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-metadata-service
  namespace: pix-integration
spec:
  selector:
    app: postgres-metadata-service
  ports:
  - port: 5433
    targetPort: 5433
  type: ClusterIP
