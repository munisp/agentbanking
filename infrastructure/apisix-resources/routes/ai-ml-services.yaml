# ai-ml-services
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-ai-ml-services-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /ai-ml-services/*
      backends:
        - serviceName: ai-ml
          servicePort: 9150
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/ai-ml-services/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-2
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /ai-ml/*
      backends:
        - serviceName: ai-ml
          servicePort: 9150
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/ai-ml/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
