# business-service
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-business-service-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54link-dev.upi.dev
          - 54agent.upi.dev
        paths:
          - /business/*
      backends:
        - serviceName: business-service
          servicePort: 8086
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/business/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
