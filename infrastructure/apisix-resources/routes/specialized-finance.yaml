# specialized-finance — 13 services | ports 9570-9582
# Specialized finance — insurance, blockchain, stablecoins, wealth, metaverse
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-specialized-finance-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /blockchain/*
      backends:
        - serviceName: specialized-finance
          servicePort: 9570
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/blockchain/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-2
      priority: 10
