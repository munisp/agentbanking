# channels-messaging — 17 services | ports 9256-9272
# Messaging — SMS, push, notifications, translation, omnichannel
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-channels-messaging-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /communication-gateway/*
      backends:
        - serviceName: channels-messaging
          servicePort: 9256
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/communication-gateway/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-2
      priority: 10
