# kyc-aml — 26 services | ports 9493-9518
# KYC/AML — document verification, biometric OCR, KYB, sanctions screening
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-kyc-aml-route
  namespace: 54agent
