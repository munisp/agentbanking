# tx-monitor-alerter
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-tx-monitor-alerter-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /tx-monitor-alerter/*
      backends:
        - serviceName: fraud-risk
          servicePort: 9442
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/tx-monitor-alerter/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
