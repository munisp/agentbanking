# financial-services
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-financial-services-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /financial-services/*
      backends:
        - serviceName: billing
          servicePort: 9214
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/financial-services/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
