version: "3.9"
# Sprint 51: Production-Grade Docker Compose
# Includes all Sprint 50 + Sprint 51 services

x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ── Core Application ──
  app:
    <<: *common
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_URL=${POSTGRES_URL}
      - JWT_SECRET=${JWT_SECRET:-pos-shell-jwt-secret-2026}
      - REDIS_URL=redis://redis:6379
      - VITE_APP_ID=${VITE_APP_ID:-pos-shell-demo}
      - OAUTH_SERVER_URL=${OAUTH_SERVER_URL:-https://auth.manus.space}
      - VITE_OAUTH_PORTAL_URL=${VITE_OAUTH_PORTAL_URL:-https://auth.manus.space/login}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - VITE_STRIPE_PUBLISHABLE_KEY=${VITE_STRIPE_PUBLISHABLE_KEY}
      - BUILT_IN_FORGE_API_URL=${BUILT_IN_FORGE_API_URL}
      - BUILT_IN_FORGE_API_KEY=${BUILT_IN_FORGE_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Database ──
  postgres:
    <<: *common
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: posshell
      POSTGRES_USER: posadmin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-posadmin123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U posadmin -d posshell"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache & Sessions ──
  redis:
    <<: *common
    image: redis:7.4-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Sprint 50 Services ──
  realtime-tx-monitor:
    <<: *common
    build: .
    command: node dist/services/realtimeTxMonitor.js
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - ALERT_THRESHOLD_AMOUNT=5000000
      - VELOCITY_WINDOW_MINUTES=5
    depends_on:
      - postgres
      - redis

  fraud-ml-engine:
    <<: *common
    build: .
    command: node dist/services/fraudMlEngine.js
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ML_MODEL_PATH=/app/models/fraud-detection-v3.onnx
      - SCORING_THRESHOLD=0.75
      - BATCH_SIZE=100
    depends_on:
      - postgres
      - redis

  notification-orchestrator:
    <<: *common
    build: .
    command: node dist/services/notificationOrchestrator.js
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - SMS_PROVIDER=termii
      - SMS_API_KEY=${TERMII_API_KEY:-termii-test-key}
      - EMAIL_PROVIDER=sendgrid
      - EMAIL_API_KEY=${SENDGRID_API_KEY:-sendgrid-test-key}
      - WHATSAPP_PROVIDER=twilio
      - WHATSAPP_SID=${TWILIO_SID:-twilio-test-sid}
    depends_on:
      - postgres
      - redis

  dynamic-fee-engine:
    <<: *common
    build: .
    command: node dist/services/dynamicFeeEngine.js
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - FEE_CACHE_TTL_SECONDS=300
      - DEFAULT_FEE_PERCENTAGE=1.5
    depends_on:
      - postgres
      - redis

  reconciliation-engine:
    <<: *common
    build: .
    command: node dist/services/reconciliationEngine.js
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NIBSS_API_URL=${NIBSS_API_URL:-https://api.nibss-plc.com.ng/v2}
      - NIBSS_API_KEY=${NIBSS_API_KEY:-nibss-test-key}
      - RECONCILIATION_SCHEDULE=0 2 * * *
    depends_on:
      - postgres

  workflow-engine:
    <<: *common
    build: .
    command: node dist/services/workflowEngine.js
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - MAX_CONCURRENT_WORKFLOWS=50
      - STEP_TIMEOUT_SECONDS=300
    depends_on:
      - postgres
      - redis

  general-ledger:
    <<: *common
    build: .
    command: node dist/services/generalLedger.js
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - LEDGER_CURRENCY=NGN
      - DOUBLE_ENTRY_STRICT=true
    depends_on:
      - postgres

  webhook-dispatcher:
    <<: *common
    build: .
    command: node dist/services/webhookDispatcher.js
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - WEBHOOK_TIMEOUT_MS=10000
      - MAX_RETRY_ATTEMPTS=5
      - RETRY_BACKOFF_MULTIPLIER=2
    depends_on:
      - postgres
      - redis

  sla-monitor:
    <<: *common
    build: .
    command: node dist/services/slaMonitor.js
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - SLA_CHECK_INTERVAL_SECONDS=60
      - BREACH_NOTIFICATION_CHANNEL=slack
    depends_on:
      - postgres
      - redis

  platform-health:
    <<: *common
    build: .
    command: node dist/services/platformHealth.js
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - HEALTH_CHECK_INTERVAL_SECONDS=30
      - INCIDENT_AUTO_RESOLVE_MINUTES=60
    depends_on:
      - postgres
      - redis

  # ── Sprint 51 Services ──
  agent-loan-facility:
    <<: *common
    build: .
    command: node dist/services/agentLoanFacility.js
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MAX_LOAN_AMOUNT_NGN=5000000
      - DEFAULT_INTEREST_RATE=2.5
      - LOAN_TENURE_DAYS_MAX=90
      - CREDIT_SCORE_MIN=500
    depends_on:
      - postgres

  merchant-kyc-onboarding:
    <<: *common
    build: .
    command: node dist/services/merchantKycOnboarding.js
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - KYC_PROVIDER=youverify
      - KYC_API_KEY=${YOUVERIFY_API_KEY:-youverify-test-key}
      - BVN_VERIFICATION_URL=https://api.youverify.co/v2/api/identity/ng/bvn
      - NIN_VERIFICATION_URL=https://api.youverify.co/v2/api/identity/ng/nin
    depends_on:
      - postgres

  merchant-payout-settlement:
    <<: *common
    build: .
    command: node dist/services/merchantPayoutSettlement.js
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SETTLEMENT_BANK=providus
      - SETTLEMENT_ACCOUNT=${SETTLEMENT_ACCOUNT:-0012345678}
      - NIBSS_INSTANT_PAY_URL=${NIBSS_IP_URL:-https://api.nibss-plc.com.ng/v2/instant-pay}
      - SETTLEMENT_SCHEDULE=0 18 * * 1-5
    depends_on:
      - postgres

  compliance-filing:
    <<: *common
    build: .
    command: node dist/services/complianceFiling.js
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CBN_REPORTING_URL=${CBN_URL:-https://reporting.cbn.gov.ng/api/v1}
      - CBN_API_KEY=${CBN_API_KEY:-cbn-test-key}
      - NFIU_REPORTING_URL=${NFIU_URL:-https://api.nfiu.gov.ng/v1}
      - FILING_SCHEDULE=0 6 1 * *
    depends_on:
      - postgres

  agent-gamification:
    <<: *common
    build: .
    command: node dist/services/agentGamification.js
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - LEADERBOARD_REFRESH_MINUTES=15
      - BADGE_CHECK_INTERVAL_MINUTES=60
    depends_on:
      - postgres
      - redis

  tenant-feature-toggle:
    <<: *common
    build: .
    command: node dist/services/tenantFeatureToggle.js
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - FEATURE_CACHE_TTL_SECONDS=60
    depends_on:
      - postgres
      - redis

  customer-journey-analytics:
    <<: *common
    build: .
    command: node dist/services/customerJourneyAnalytics.js
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - EVENT_BATCH_SIZE=500
      - ANALYTICS_WINDOW_DAYS=90
    depends_on:
      - postgres
      - redis

  rate-limit-engine:
    <<: *common
    build: .
    command: node dist/services/rateLimitEngine.js
    environment:
      - REDIS_URL=redis://redis:6379
      - DEFAULT_RATE_LIMIT=100
      - RATE_WINDOW_SECONDS=60
      - BURST_MULTIPLIER=2
    depends_on:
      - redis

  backup-disaster-recovery:
    <<: *common
    build: .
    command: node dist/services/backupDR.js
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - BACKUP_S3_BUCKET=${BACKUP_S3_BUCKET:-pos-shell-backups}
      - BACKUP_SCHEDULE=0 3 * * *
      - RETENTION_DAYS=30
      - ENCRYPTION_KEY=${BACKUP_ENCRYPTION_KEY:-backup-enc-key-2026}
    depends_on:
      - postgres

  data-export-hub:
    <<: *common
    build: .
    command: node dist/services/dataExportHub.js
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - EXPORT_S3_BUCKET=${EXPORT_S3_BUCKET:-pos-shell-exports}
      - MAX_EXPORT_ROWS=1000000
      - EXPORT_EXPIRY_HOURS=72
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  default:
    name: pos-shell-network
    driver: bridge
