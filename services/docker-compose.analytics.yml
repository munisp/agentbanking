# 54Link POS Shell — Analytics Pipeline (Sprint 89)
# Fluvio → OpenSearch Indexer → OpenSearch
#
# Usage: docker compose -f services/docker-compose.analytics.yml up -d

services:
  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: 54link-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Admin@54Link2024
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - analytics

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.18.0
    container_name: 54link-opensearch-dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      - opensearch
    networks:
      - analytics

  opensearch-indexer:
    build:
      context: ./python/opensearch-indexer
      dockerfile: Dockerfile
    container_name: 54link-opensearch-indexer
    environment:
      - OPENSEARCH_URL=http://opensearch:9200
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASS=Admin@54Link2024
      - PORT=8092
    ports:
      - "8092:8092"
    depends_on:
      - opensearch
    networks:
      - analytics
    restart: unless-stopped

  fluvio-consumer:
    build:
      context: ./rust/fluvio-consumer
      dockerfile: Dockerfile
    container_name: 54link-fluvio-consumer
    environment:
      - FLUVIO_ENDPOINT=fluvio:9003
      - OPENSEARCH_INDEXER_URL=http://opensearch-indexer:8092/index
      - HEALTH_PORT=8093
    ports:
      - "8093:8093"
    depends_on:
      - opensearch-indexer
    networks:
      - analytics
    restart: unless-stopped

volumes:
  opensearch-data:
    driver: local

networks:
  analytics:
    driver: bridge
