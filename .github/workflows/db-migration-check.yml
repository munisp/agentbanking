# Item 9: Database migration validation in CI
name: DB Migration Check

on:
  pull_request:
    paths:
      - 'drizzle/**'
      - 'db/**'
      - 'server/db/**'

env:
  NODE_VERSION: 22

jobs:
  migration-check:
    name: Validate DB Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pos_migration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run schema push (dry-run validation)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pos_migration_test
          POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/pos_migration_test
        run: |
          echo "Validating Drizzle schema can be pushed..."
          pnpm db:push 2>&1
          echo "Schema push successful — migrations are valid"

      - name: Check for uncommitted schema changes
        run: |
          if [ -n "$(git diff --name-only drizzle/)" ]; then
            echo "::error::Uncommitted schema changes detected. Run 'pnpm db:generate' and commit."
            git diff drizzle/
            exit 1
          fi
          echo "No uncommitted schema changes"
