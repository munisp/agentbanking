# voice-assistant-service
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-voice-assistant-service-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /voice-assistant/*
      backends:
        - serviceName: channels-ussd-voice
          servicePort: 9287
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/voice-assistant/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
