# unified-communication-service
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-unified-communication-service-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /unified-communication/*
      backends:
        - serviceName: channels-messaging
          servicePort: 9272
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/unified-communication/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
