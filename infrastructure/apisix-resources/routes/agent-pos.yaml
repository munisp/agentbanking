# agent-pos — 21 services | ports 9125-9145
# POS/hardware — MDM, device management, terminals, geofencing, OTA
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-agent-pos-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /android-native/*
      backends:
        - serviceName: agent-pos
          servicePort: 9125
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/android-native/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-2
