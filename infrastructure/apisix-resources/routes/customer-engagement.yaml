# customer-engagement — 11 services | ports 9371-9381
# Customer engagement — CRM, loyalty, gamification, support, rewards
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-customer-engagement-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /coalition-loyalty/*
      backends:
        - serviceName: customer-engagement
          servicePort: 9371
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/coalition-loyalty/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-2
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /customer-service/*
