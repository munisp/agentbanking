# admin-services
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-admin-services-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /admin-services/*
      backends:
        - serviceName: open-banking-api
          servicePort: 9529
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/admin-services/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
