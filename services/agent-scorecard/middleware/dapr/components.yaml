# ── Dapr Components for Agent Scorecard Service ────────────────────────────────
# These components are deployed as Dapr sidecar configurations.

---
# Pub/Sub component — uses Kafka as the message broker
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: agent-scorecard-pubsub
  namespace: 54agent
spec:
  type: pubsub.kafka
  version: v1
  metadata:
    - name: brokers
      value: "kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092"
    - name: consumerGroup
      value: "dapr-agent-scorecard-group"
    - name: authType
      value: "scram"
    - name: scramSHA512Auth
      value: "true"
    - name: username
      secretKeyRef:
        name: kafka-credentials
        key: username
    - name: password
      secretKeyRef:
        name: kafka-credentials
        key: password
    - name: initialOffset
      value: "oldest"
    - name: maxMessageBytes
      value: "1048576"
    - name: ackWaitTime
      value: "30s"

---
# State Store component — uses Redis Cluster for scorecard caching
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: agent-scorecard-statestore
  namespace: 54agent
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: "redis-cluster:6379"
    - name: redisPassword
      secretKeyRef:
        name: redis-credentials
        key: password
    - name: enableTLS
      value: "true"
    - name: failover
      value: "false"
    - name: replicaCount
      value: "2"
    - name: ttlInSeconds
      value: "3600"
    - name: keyPrefix
      value: "scorecard"
    - name: actorStateStore
      value: "false"

---
# Binding — scheduled trigger for daily scorecard batch recomputation
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: scorecard-daily-recompute
  namespace: 54agent
spec:
  type: bindings.cron
  version: v1
  metadata:
    - name: schedule
      value: "0 2 * * *"  # 2 AM UTC daily

---
# Resiliency policy for Agent Scorecard service
apiVersion: dapr.io/v1alpha1
kind: Resiliency
metadata:
  name: agent-scorecard-resiliency
  namespace: 54agent
spec:
  policies:
    timeouts:
      defaultTimeout: 30s
      scorecardComputeTimeout: 60s
    retries:
      defaultRetry:
        policy: constant
        duration: 1s
        maxRetries: 3
      criticalRetry:
        policy: exponential
        maxInterval: 30s
        maxRetries: 5
    circuitBreakers:
      defaultCircuitBreaker:
        maxRequests: 1
        interval: 10s
        timeout: 30s
        trip: consecutiveFailures >= 5
  targets:
    apps:
      agent-embedded-finance:
        timeout: scorecardComputeTimeout
        retry: criticalRetry
        circuitBreaker: defaultCircuitBreaker
      commission-settlement:
        timeout: defaultTimeout
        retry: defaultRetry
      agent-management:
        timeout: defaultTimeout
        retry: defaultRetry
