# ==============================================================================
# Kafka Broker — High-Throughput Configuration (Millions of msg/sec)
# Target: 16 vCPU / 64 GB RAM / NVMe RAID-10 per broker, 5-broker cluster
# KRaft mode (no ZooKeeper)
# ==============================================================================

# ── Broker Identity ──────────────────────────────────────────────────────────
# Set per broker: node.id=1..5
process.roles=broker,controller
controller.quorum.voters=1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093,4@kafka-4:9093,5@kafka-5:9093
controller.listener.names=CONTROLLER
inter.broker.listener.name=INTERNAL
listener.security.protocol.map=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:SSL

# ── Thread Model ─────────────────────────────────────────────────────────────
num.network.threads=16                 # Network I/O threads (1 per CPU core)
num.io.threads=32                      # Disk I/O threads (2x CPU cores)
num.replica.fetchers=8                 # Parallel replica fetching
num.recovery.threads.per.data.dir=4    # Parallel log recovery on startup

# ── Socket Buffers ───────────────────────────────────────────────────────────
socket.send.buffer.bytes=4194304       # 4 MB send buffer
socket.receive.buffer.bytes=4194304    # 4 MB receive buffer
socket.request.max.bytes=209715200     # 200 MB max request (for large batches)

# ── Log / Partition Settings ────────────────────────────────────────────────
num.partitions=24                      # Default 24 partitions (for parallelism)
default.replication.factor=3           # 3 replicas for durability
min.insync.replicas=2                  # At least 2 in-sync for acks=all
unclean.leader.election.enable=false   # Never lose data
auto.create.topics.enable=false        # Explicit topic creation only

# ── Log Segments ─────────────────────────────────────────────────────────────
log.segment.bytes=1073741824           # 1 GB segments
log.retention.hours=72                 # 3 days (financial audit requires backup, not Kafka retention)
log.retention.check.interval.ms=60000
log.cleaner.threads=4                  # Parallel log cleaning
log.cleaner.dedupe.buffer.size=536870912 # 512 MB dedup buffer

# ── Batch / Producer Optimization ────────────────────────────────────────────
message.max.bytes=10485760             # 10 MB max message
replica.fetch.max.bytes=10485760
fetch.max.bytes=104857600              # 100 MB max fetch

# ── Compression ──────────────────────────────────────────────────────────────
compression.type=zstd                  # zstd: best ratio at acceptable CPU cost
log.message.timestamp.type=LogAppendTime  # Broker timestamp (consistent ordering)

# ── Transaction Support (for exactly-once) ───────────────────────────────────
transaction.state.log.replication.factor=3
transaction.state.log.min.isr=2
transaction.state.log.num.partitions=50
transactional.id.expiration.ms=604800000  # 7 days

# ── Consumer Group ───────────────────────────────────────────────────────────
offsets.topic.replication.factor=3
offsets.topic.num.partitions=50
group.initial.rebalance.delay.ms=5000  # Wait for consumers before rebalancing

# ── Rack Awareness ──────────────────────────────────────────────────────────
# Set per broker: broker.rack=rack-a, rack-b, etc.
replica.selector.class=org.apache.kafka.common.replica.RackAwareReplicaSelector

# ── JVM (set in KAFKA_HEAP_OPTS) ────────────────────────────────────────────
# KAFKA_HEAP_OPTS="-Xmx12g -Xms12g"
# KAFKA_JVM_PERFORMANCE_OPTS="-XX:+UseZGC -XX:MaxGCPauseMillis=10 -XX:+ExplicitGCInvokesConcurrent -Djava.awt.headless=true"

# ── Metrics ──────────────────────────────────────────────────────────────────
metric.reporters=io.confluent.metrics.reporter.ConfluentMetricsReporter
confluent.metrics.reporter.bootstrap.servers=kafka-1:9092,kafka-2:9092,kafka-3:9092
