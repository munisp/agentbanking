# fido2-service
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-fido2-service-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /fido2/*
      backends:
        - serviceName: fido2-service
          servicePort: 8083
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/fido2/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
