# payroll-disbursement
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-payroll-disbursement-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /payroll-disbursement/*
      backends:
        - serviceName: billing
          servicePort: 9217
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/payroll-disbursement/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
