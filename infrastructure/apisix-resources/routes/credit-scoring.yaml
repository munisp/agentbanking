# credit-scoring
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-credit-scoring-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /credit-scoring/*
      backends:
        - serviceName: lending-credit
          servicePort: 9523
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/credit-scoring/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
