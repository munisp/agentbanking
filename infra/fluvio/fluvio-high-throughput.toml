# ==============================================================================
# Fluvio SPU — High-Throughput Configuration (Millions of events/sec)
# Target: 5 SPU nodes, 8 vCPU / 16 GB RAM each
# ==============================================================================

# ── SPU Performance ──────────────────────────────────────────────────────────
[spu]
# Batch size for producer writes (larger = higher throughput)
batch_max_bytes = 16777216              # 16 MB max batch (default 1MB)
batch_max_wait_ms = 10                  # Wait max 10ms to fill batch

# Internal buffer sizes
send_buffer_size = 8388608              # 8 MB send buffer
receive_buffer_size = 8388608           # 8 MB receive buffer

# Replication
replication_factor = 3                  # 3 replicas per partition
min_in_sync_replicas = 2                # At least 2 ISR for acks

# ── Topic Defaults ───────────────────────────────────────────────────────────
[topic]
# Partition count per topic (parallelism = partitions * consumers)
default_partitions = 12
# Retention: 72 hours for real-time events
retention_secs = 259200
# Segment size
segment_max_bytes = 1073741824          # 1 GB segments
# Compression
compression = "zstd"                    # zstd for best ratio

# ── SmartModule (WASM) ───────────────────────────────────────────────────────
[smartmodule]
# Max WASM module size
max_module_size = 10485760              # 10 MB
# Execution timeout
timeout_ms = 5000                       # 5s per record processing
# Memory limit
max_memory = 134217728                  # 128 MB per module instance

# ── Consumer ─────────────────────────────────────────────────────────────────
[consumer]
# Fetch tuning
max_fetch_bytes = 67108864              # 64 MB max fetch
fetch_wait_ms = 100                     # Wait 100ms for data
isolation_level = "read_committed"      # Only read committed records

# ── Producer ─────────────────────────────────────────────────────────────────
[producer]
# Linger: wait to batch records
linger_ms = 5                           # 5ms linger for batching
# Max in-flight requests
max_in_flight = 16                      # 16 concurrent requests
# Acks
acks = "all"                            # Wait for all replicas
# Retry
max_retries = 3
retry_backoff_ms = 100
