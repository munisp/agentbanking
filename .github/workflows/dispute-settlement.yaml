name: Build Dispute Settlement Consolidated Service

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'services/dispute-resolution/**'
      - 'services/dispute-service/**'
      - 'services/reconciliation-service/**'
      - 'services/recurring-payments/**'
      - 'services/refund-service/**'
      - 'services/settlement-batch-processor/**'
      - 'services/settlement-gateway/**'
      - 'services/settlement-ledger-sync/**'
      - 'services/settlement-service/**'
      - 'docker/Dockerfile.consolidated'
      - 'docker/build-services.sh'
      - '.github/workflows/dispute-settlement.yaml'

env:
  TAG: "0.0.1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: docker
          password: ${{ secrets.DO_API_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.consolidated
          push: true
          build-args: |
            SERVICES=dispute-resolution,dispute-service,reconciliation-service,recurring-payments,refund-service,settlement-batch-processor,settlement-gateway,settlement-ledger-sync,settlement-service
            PORT_BASE=9399
          tags: registry.digitalocean.com/talentgraph-auth/54agent-dispute-settlement:${{ env.TAG }}
