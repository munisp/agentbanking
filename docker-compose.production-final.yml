###############################################################################
# 54Link Agency Banking Platform — Production Docker Compose
# All services: web, DB, Redis, TigerBeetle, Kafka, monitoring, sidecars
###############################################################################
version: "3.9"

x-common-env: &common-env
  NODE_ENV: production
  TZ: Africa/Lagos

services:
  # ── Core Application ─────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      <<: *common-env
      DATABASE_URL: ${DATABASE_URL:-postgresql://pos_user:pos_secret@postgres:5432/pos_shell}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-64-char-minimum-secret-key-here-now}
      TIGERBEETLE_CLUSTER_ID: ${TIGERBEETLE_CLUSTER_ID:-0}
      TIGERBEETLE_ADDRESSES: ${TIGERBEETLE_ADDRESSES:-tigerbeetle:3001}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:?STRIPE_SECRET_KEY is required}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:?STRIPE_WEBHOOK_SECRET is required}
      VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:?VITE_STRIPE_PUBLISHABLE_KEY is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-CHANGE_ME}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      VITE_APP_ID: ${VITE_APP_ID:-pos-shell-demo}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://keycloak:8080}
      VITE_APP_ID: ${VITE_APP_ID:-54link-production}
      OWNER_NAME: ${OWNER_NAME:-Admin}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - pos-network

  # ── PostgreSQL ───────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pos_shell
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pos_secret}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos_user -d pos_shell"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    networks:
      - pos-network

  # ── Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - pos-network

  # ── TigerBeetle ─────────────────────────────────────────────────────
  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.16.43
    command: start --addresses=0.0.0.0:3001 /data/0_0.tigerbeetle
    ports:
      - "${TB_PORT:-3001}:3001"
    volumes:
      - tigerbeetle-data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    networks:
      - pos-network

  # ── Kafka (Redpanda — Kafka-compatible, lighter) ─────────────────────
  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.14
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://kafka:9092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr kafka:8082
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "8082:8082"
    volumes:
      - kafka-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    networks:
      - pos-network

  # ── Prometheus (Metrics) ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - pos-network

  # ── Grafana (Dashboards) ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.6.1
    ports:
      - "${GRAFANA_PORT:-3100}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - pos-network

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    networks:
      - pos-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  tigerbeetle-data:
    driver: local
  kafka-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  pos-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
