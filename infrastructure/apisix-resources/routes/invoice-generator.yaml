# invoice-generator
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-invoice-generator-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /invoice-generator/*
      backends:
        - serviceName: billing
          servicePort: 9215
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/invoice-generator/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
