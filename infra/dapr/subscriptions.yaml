---
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: commission-events
spec:
  pubsubname: kafka-pubsub
  topic: pos.commissions
  routes:
    default: /api/events/commission
  scopes:
    - pos-shell
    - commission-engine
