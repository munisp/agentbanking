apiVersion: v1
kind: Service
metadata:
  name: {{ include "opensearch.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "opensearch.name" . }}
    helm.sh/chart: {{ include "opensearch.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.transportPort }}
      targetPort: transport
      protocol: TCP
      name: transport
  selector:
    app.kubernetes.io/name: {{ include "opensearch.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opensearch.fullname" . }}-headless
  labels:
    app.kubernetes.io/name: {{ include "opensearch.name" . }}
    helm.sh/chart: {{ include "opensearch.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.transportPort }}
      targetPort: transport
      protocol: TCP
      name: transport
  selector:
    app.kubernetes.io/name: {{ include "opensearch.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
---
{{- if .Values.dashboards.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opensearch.fullname" . }}-dashboards
  labels:
    app.kubernetes.io/name: {{ include "opensearch.name" . }}-dashboards
    helm.sh/chart: {{ include "opensearch.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: {{ .Values.dashboards.service.type }}
  ports:
    - port: {{ .Values.dashboards.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "opensearch.name" . }}-dashboards
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
