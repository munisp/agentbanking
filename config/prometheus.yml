###############################################################################
# Prometheus Configuration — 54Link Agency Banking Platform
###############################################################################
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: "pos-shell-web"
    metrics_path: "/api/metrics"
    static_configs:
      - targets: ["web:3000"]
        labels:
          service: "pos-shell"
          environment: "production"

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []
