# pbac-engine
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-pbac-engine-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /pbac-engine/*
      backends:
        - serviceName: auth-identity
          servicePort: 9194
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/pbac-engine/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
