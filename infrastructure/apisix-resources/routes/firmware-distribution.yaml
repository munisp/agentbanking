# firmware-distribution
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-firmware-distribution-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /firmware-distribution/*
      backends:
        - serviceName: agent-pos
          servicePort: 9127
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/firmware-distribution/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
