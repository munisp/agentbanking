version: "3.8"

services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=staging
      - DATABASE_URL=postgres://postgres:postgres@db:5432/agentbanking_staging
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-staging-secret-change-in-production}
      - PII_ENCRYPTION_KEY=${PII_ENCRYPTION_KEY:-}
      - OTEL_ENABLED=true
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=agentbanking_staging
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  pgdata_staging:
