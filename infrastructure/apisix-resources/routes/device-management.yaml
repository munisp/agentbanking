# device-management
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-device-management-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /device-management/*
      backends:
        - serviceName: agent-pos
          servicePort: 9126
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/device-management/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
