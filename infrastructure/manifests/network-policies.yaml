# NetworkPolicy manifests for 54agent Agency Banking Platform
# Namespace: 54agent
#
# These policies implement default-deny for all ingress and egress,
# then explicitly allow only required traffic paths.
# The APISIX ingress controller lives in the "ingress-apisix" namespace.

---
# 1. settlement-service
#    Ingress : apisix (ingress-apisix ns), commission-settlement
#    Egress  : commission-settlement (:8080), payment-processing-service (:8080), postgres (:25060), DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: settlement-service-netpol
  namespace: 54agent
spec:
  podSelector:
    matchLabels:
      app: settlement-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-apisix
    - from:
        - podSelector:
            matchLabels:
              app: commission-settlement
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: commission-settlement
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - podSelector:
            matchLabels:
              app: payment-processing-service
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 25060
    - to: []   # DNS
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

