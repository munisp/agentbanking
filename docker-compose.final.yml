version: "3.9"

# 54Link POS Shell — Final Production Docker Compose
# Sprint 65 F18: Unified Docker Compose with all services

services:
  # ============================================================
  # Core Application
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pos-shell-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://pos:pos_secret@postgres:5432/pos_shell}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
      - JWT_SECRET=${JWT_SECRET:-default-jwt-secret-change-in-production}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_default}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-whsec_default}
      - VITE_STRIPE_PUBLISHABLE_KEY=${VITE_STRIPE_PUBLISHABLE_KEY:-pk_test_default}
      - VITE_APP_ID=${VITE_APP_ID:-pos-shell-demo}
      - VITE_APP_TITLE=${VITE_APP_TITLE:-54Link POS Shell}
      - OWNER_OPEN_ID=${OWNER_OPEN_ID:-owner-default}
      - OWNER_NAME=${OWNER_NAME:-Admin}
      - BUILT_IN_FORGE_API_URL=${BUILT_IN_FORGE_API_URL:-http://localhost:8080}
      - BUILT_IN_FORGE_API_KEY=${BUILT_IN_FORGE_API_KEY:-default-forge-key}
      - OAUTH_SERVER_URL=${OAUTH_SERVER_URL:-http://localhost:8081}
      - VITE_OAUTH_PORTAL_URL=${VITE_OAUTH_PORTAL_URL:-http://localhost:8082}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - pos-network
    volumes:
      - app-logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ============================================================
  # Database
  # ============================================================
  postgres:
    image: postgres:17-alpine
    container_name: pos-shell-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: pos_shell
      POSTGRES_USER: pos
      POSTGRES_PASSWORD: pos_secret
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=en_US.utf8 --lc-ctype=en_US.utf8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos -d pos_shell"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pos-network
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================================
  # Cache & Pub/Sub
  # ============================================================
  redis:
    image: redis:7.4-alpine
    container_name: pos-shell-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --tcp-backlog 511
      --timeout 300
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pos-network
    deploy:
      resources:
        limits:
          memory: 256M

  # ============================================================
  # Message Broker
  # ============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.9.0
    container_name: pos-shell-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - pos-network
    deploy:
      resources:
        limits:
          memory: 256M

  kafka:
    image: confluentinc/cp-kafka:7.9.0
    container_name: pos-shell-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 3
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - pos-network
    deploy:
      resources:
        limits:
          memory: 1G

  # ============================================================
  # TigerBeetle (Financial Ledger)
  # ============================================================
  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.16.43
    container_name: pos-shell-tigerbeetle
    restart: unless-stopped
    ports:
      - "${TB_PORT:-3001}:3001"
    command: start --addresses=0.0.0.0:3001 /data/0_0.tigerbeetle
    volumes:
      - tigerbeetle-data:/data
    networks:
      - pos-network
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================================
  # Monitoring
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: pos-shell-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=5GB"
    networks:
      - pos-network
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:11.6.1
    container_name: pos-shell-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3100}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - pos-network
    deploy:
      resources:
        limits:
          memory: 256M

  # ============================================================
  # Reverse Proxy
  # ============================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: pos-shell-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf
      - ./config/ssl:/etc/nginx/ssl
      - nginx-logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - pos-network
    deploy:
      resources:
        limits:
          memory: 128M

# ============================================================
# Networks & Volumes
# ============================================================
networks:
  pos-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  tigerbeetle-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  app-logs:
    driver: local
  nginx-logs:
    driver: local
