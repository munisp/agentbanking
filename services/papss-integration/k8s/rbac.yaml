apiVersion: v1
kind: ServiceAccount
metadata:
  name: papss-service-account
  namespace: remittance-platform
  labels:
    app: papss-integration
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: papss-role
  namespace: remittance-platform
  labels:
    app: papss-integration
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: papss-role-binding
  namespace: remittance-platform
  labels:
    app: papss-integration
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: papss-role
subjects:
- kind: ServiceAccount
  name: papss-service-account
  namespace: remittance-platform

