# ==============================================================================
# Permify — High-Throughput Configuration (100K+ permission checks/sec)
# Target: 4 nodes, 4 vCPU / 8 GB RAM each
# ==============================================================================

# Deploy via environment variables on the Permify container:

# ── Database Connection Pool ────────────────────────────────────────────────
# PERMIFY_DATABASE_ENGINE=postgres
# PERMIFY_DATABASE_URI=postgres://permify:$PASSWORD@pgbouncer:6432/permify?sslmode=require
# PERMIFY_DATABASE_MAX_OPEN_CONNECTIONS=200       # Large pool for high throughput
# PERMIFY_DATABASE_MAX_IDLE_CONNECTIONS=50         # Keep 50 warm connections
# PERMIFY_DATABASE_MAX_CONNECTION_LIFETIME=1800s   # 30 min lifetime
# PERMIFY_DATABASE_MAX_CONNECTION_IDLE_TIME=300s   # 5 min idle timeout
# PERMIFY_DATABASE_GARBAGE_COLLECTION_WINDOW=200s  # GC window for old tuples

# ── Cache — In-Memory Permission Cache ──────────────────────────────────────
# PERMIFY_CACHE_ENABLED=true
# PERMIFY_CACHE_ENGINE=redis
# PERMIFY_CACHE_REDIS_ADDRESS=redis-cluster:6379
# PERMIFY_CACHE_MAX_SIZE=100000                    # Cache 100K permission results
# PERMIFY_CACHE_TTL=300s                           # 5 min TTL
# PERMIFY_CACHE_NUMBER_OF_COUNTERS=1000000         # 1M counters for TinyLFU

# ── gRPC Server Tuning ──────────────────────────────────────────────────────
# PERMIFY_SERVER_GRPC_PORT=3478
# PERMIFY_SERVER_GRPC_MAX_CONNECTIONS=10000
# PERMIFY_SERVER_GRPC_MAX_CONCURRENT_STREAMS=1000
# PERMIFY_SERVER_GRPC_MAX_RECV_MSG_SIZE=67108864    # 64 MB
# PERMIFY_SERVER_GRPC_MAX_SEND_MSG_SIZE=67108864

# ── Batch Permission Checks ─────────────────────────────────────────────────
# Use Permify's SubjectPermission/LookupEntity batch APIs for bulk checks:
#   - SubjectPermission: check multiple permissions for one subject in 1 call
#   - LookupEntity: find all entities a subject can access in 1 call
#   - BulkCheck: check permissions for multiple subject-resource pairs

# ── Circuit Breaker ─────────────────────────────────────────────────────────
# PERMIFY_SERVICE_CIRCUIT_BREAKER=true
# PERMIFY_SERVICE_CIRCUIT_BREAKER_TIMEOUT=5s
# PERMIFY_SERVICE_CIRCUIT_BREAKER_MAX_REQUESTS=100
# PERMIFY_SERVICE_CIRCUIT_BREAKER_INTERVAL=30s

# ── Profiling ────────────────────────────────────────────────────────────────
# PERMIFY_PROFILER_ENABLED=true
# PERMIFY_PROFILER_PORT=6060

# ── Horizontal Scaling ──────────────────────────────────────────────────────
# Permify is stateless (DB + cache) — scale horizontally behind a load balancer
# Use K8s HPA with CPU target 70% or custom metrics (permission check latency)

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: permify-ht
  namespace: default
spec:
  replicas: 4
  selector:
    matchLabels:
      app: permify
  template:
    metadata:
      labels:
        app: permify
    spec:
      containers:
        - name: permify
          image: ghcr.io/permify/permify:v1.2.2
          command: ["serve"]
          ports:
            - containerPort: 3476
              name: http
            - containerPort: 3478
              name: grpc
          env:
            - name: PERMIFY_DATABASE_ENGINE
              value: "postgres"
            - name: PERMIFY_DATABASE_URI
              valueFrom:
                secretKeyRef:
                  name: permify-db-secret
                  key: uri
            - name: PERMIFY_DATABASE_MAX_OPEN_CONNECTIONS
              value: "200"
            - name: PERMIFY_DATABASE_MAX_IDLE_CONNECTIONS
              value: "50"
            - name: PERMIFY_DATABASE_MAX_CONNECTION_LIFETIME
              value: "1800s"
            - name: PERMIFY_SERVICE_CIRCUIT_BREAKER
              value: "true"
            - name: PERMIFY_LOG_LEVEL
              value: "warn"
            - name: PERMIFY_AUTHN_ENABLED
              value: "true"
            - name: PERMIFY_AUTHN_METHOD
              value: "preshared"
            - name: PERMIFY_AUTHN_PRESHARED_KEYS
              valueFrom:
                secretKeyRef:
                  name: permify-api-secret
                  key: key
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          readinessProbe:
            grpc:
              port: 3478
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 3478
            initialDelaySeconds: 10
            periodSeconds: 30
