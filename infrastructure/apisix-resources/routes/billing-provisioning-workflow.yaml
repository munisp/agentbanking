# billing-provisioning-workflow
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-billing-provisioning-workflow-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /billing-provisioning-workflow/*
      backends:
        - serviceName: billing
          servicePort: 9208
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/billing-provisioning-workflow/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
