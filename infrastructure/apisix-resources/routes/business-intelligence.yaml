# business-intelligence
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-business-intelligence-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /business-intelligence/*
      backends:
        - serviceName: analytics-data
          servicePort: 9166
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/business-intelligence/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
