# ddos-shield
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-ddos-shield-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /ddos-shield/*
      backends:
        - serviceName: security
          servicePort: 9561
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/ddos-shield/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
