# core-accounts — 10 services | ports 9313-9322
# Account management — accounts, multi-currency, onboarding, open banking
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-core-accounts-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /account-service/*
      backends:
        - serviceName: core-accounts
          servicePort: 9313
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/account-service/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-2
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /beneficiary-service/*
