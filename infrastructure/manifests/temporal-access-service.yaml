apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-access-service
  namespace: banking
  labels:
    app: temporal-access-service
    tier: security
spec:
  replicas: 3
  selector:
    matchLabels:
      app: temporal-access-service
  template:
    metadata:
      labels:
        app: temporal-access-service
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "temporal-access-service"
        dapr.io/app-port: "8080"
        dapr.io/log-level: "info"
        dapr.io/config: "daprConfig"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: temporal-access-service
      containers:
        - name: temporal-access-service
          image: 54agent/temporal-access-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: REDIS_ADDR
              value: "redis-master.banking.svc.cluster.local:6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            - name: PERMIFY_URL
              value: "http://permify.banking.svc.cluster.local:3476"
            - name: DAPR_HTTP_PORT
              value: "3500"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-access-service
  namespace: banking
  labels:
    app: temporal-access-service
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: temporal-access-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: temporal-access-service
  namespace: banking
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: temporal-access-service-hpa
  namespace: banking
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: temporal-access-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: temporal-access-service-pdb
  namespace: banking
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: temporal-access-service
