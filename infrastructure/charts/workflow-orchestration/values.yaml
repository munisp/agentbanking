replicaCount: 1
image:
  repository: registry.digitalocean.com/talentgraph-auth/54agent-workflow-orchestration
  pullPolicy: IfNotPresent
  tag: "0.0.4"
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  create: false
  name: 54agent
podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}
service:
  type: ClusterIP
  ports:
    - port: 9601
    - port: 9602
    - port: 9603
    - port: 9604
    - port: 9605
    - port: 9606
    - port: 9607
    - port: 9608
    - port: 9609
    - port: 9610
    - port: 9611
    - port: 9612
resources:
  requests:
    cpu: 200m
    memory: 192Mi
  limits:
    ephemeral-storage: 512Mi
    cpu: 1000m
    memory: 768Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
volumes: []
volumeMounts: []
nodeSelector: {}
tolerations: []
affinity: {}
dapr:
  appId: workflow-orchestration
  appPort: 9603
  enableMetrics: true
  enabled: true
  metricsPort: 9099
  sidecarListenAddresses: "0.0.0.0"
  cpu-request: 100m
  cpu-limit: 300m
  memory-request: 250Mi
  memory-limit: 1000Mi
secrets:
  APP_PORT: "9601"
  PORT_BASE: "9601"
  SERVICE_GROUP: workflow-orchestration
  SERVICES: "compensating-actions,integration-layer,integration-service,integrations,orchestrator-service,scheduler-service,temporal,workflow-integration,workflow-orchestration,workflow-orchestrator,workflow-orchestrator-enhanced,workflow-service"
