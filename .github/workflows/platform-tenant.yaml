name: Build Platform Tenant Consolidated Service

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'services/config-service/**'
      - 'services/enhanced-platform/**'
      - 'services/enterprise-services/**'
      - 'services/super-app-framework/**'
      - 'services/tenant-management/**'
      - 'docker/Dockerfile.consolidated'
      - 'docker/entrypoint.sh'
      - 'docker/build-services.sh'
      - '.github/workflows/platform-tenant.yaml'

env:
  TAG: "0.0.7"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v4
        with:
          registry: registry.digitalocean.com
          username: docker
          password: ${{ secrets.DO_API_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.consolidated
          push: true
          build-args: |
            SERVICES=config-service,enhanced-platform,enterprise-services,super-app-framework,tenant-management
            PORT_BASE=9541
          tags: registry.digitalocean.com/talentgraph-auth/54agent-platform-tenant:${{ env.TAG }}
