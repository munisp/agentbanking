# circuit-breaker
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-circuit-breaker-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /circuit-breaker/*
      backends:
        - serviceName: infra-network
          servicePort: 9461
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/circuit-breaker/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
