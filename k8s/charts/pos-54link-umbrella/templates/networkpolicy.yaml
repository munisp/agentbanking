{{- if .Values.global.monitoring.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-allow-monitoring
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: pos-54link
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .Values.global.monitoring.namespace }}
      ports:
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 9100
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-default-deny-external
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: pos-54link
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
{{- end }}
