# inventory-management
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-inventory-management-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /inventory-management/*
      backends:
        - serviceName: supply-chain-govt
          servicePort: 9588
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/inventory-management/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
