replicaCount: 1
image:
  repository: registry.digitalocean.com/talentgraph-auth/54agent-billing
  pullPolicy: IfNotPresent
  tag: "0.0.4"
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  create: false
  name: 54agent
podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}
service:
  type: ClusterIP
  ports:
    - port: 9204
    - port: 9205
    - port: 9206
    - port: 9207
    - port: 9208
    - port: 9209
    - port: 9210
    - port: 9211
    - port: 9212
    - port: 9213
    - port: 9214
    - port: 9215
    - port: 9216
    - port: 9217
    - port: 9218
    - port: 9219
    - port: 9220
    - port: 9221
resources:
  requests:
    cpu: 200m
    memory: 288Mi
  limits:
    ephemeral-storage: 512Mi
    cpu: 1000m
    memory: 1152Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
volumes: []
volumeMounts: []
nodeSelector: {}
tolerations: []
affinity: {}
dapr:
  appId: billing
  appPort: 9204
  enableMetrics: true
  enabled: true
  metricsPort: 9099
  sidecarListenAddresses: "0.0.0.0"
  cpu-request: 100m
  cpu-limit: 300m
  memory-request: 250Mi
  memory-limit: 1000Mi
secrets:
  NODE_ENV: "production"
  DB_DATABASE: "link_core_banking"
  DB_DATABASE_TYPE: "postgres"
  DAPR_HOST: "localhost"
  APP_PORT: "9204"
  PORT_BASE: "9204"
  SERVICE_GROUP: billing
  SERVICES: "billing-aggregator,billing-analytics-pipeline,billing-anomaly-detector,billing-event-processor,billing-provisioning-workflow,billing-reconciliation-engine,billing-sla-monitor,billing-stream-processor,billing-webhook-dispatcher,fee-splitter-realtime,financial-services,invoice-generator,nigeria-vat-service,payroll-disbursement,revenue-reconciler,sla-billing-reporter,tb-commission-sidecar,tb-sidecar"
