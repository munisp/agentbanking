apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: papss-integration-metrics
  namespace: remittance-platform
  labels:
    app: papss-integration
    prometheus: kube-prometheus
spec:
  selector:
    matchLabels:
      app: papss-integration
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
    scheme: http
    scrapeTimeout: 10s
    relabelings:
    - sourceLabels: [__meta_kubernetes_pod_name]
      targetLabel: pod
    - sourceLabels: [__meta_kubernetes_pod_node_name]
      targetLabel: node
    - sourceLabels: [__meta_kubernetes_namespace]
      targetLabel: namespace
  namespaceSelector:
    matchNames:
    - remittance-platform

