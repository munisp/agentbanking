name: Build Agent Pos Consolidated Service

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'services/android-native/**'
      - 'services/device-management/**'
      - 'services/firmware-distribution/**'
      - 'services/ios-native/**'
      - 'services/iot-smart-pos/**'
      - 'services/mdm-compliance-engine/**'
      - 'services/mdm-geofence-service/**'
      - 'services/mdm-service/**'
      - 'services/ota-service/**'
      - 'services/pos-fluvio-consumer/**'
      - 'services/pos-geofencing/**'
      - 'services/pos-hardware-management/**'
      - 'services/pos-integration/**'
      - 'services/pos-management/**'
      - 'services/pos-printer/**'
      - 'services/pos-shell-config/**'
      - 'services/pos-terminal-management/**'
      - 'services/power-management/**'
      - 'services/terminal-heartbeat/**'
      - 'services/terminal-ownership/**'
      - 'services/territory-management/**'
      - 'docker/Dockerfile.consolidated'
      - 'docker/build-services.sh'
      - '.github/workflows/agent-pos.yaml'

env:
  TAG: "0.0.2"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: docker
          password: ${{ secrets.DO_API_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.consolidated
          push: true
          build-args: |
            SERVICES=android-native,device-management,firmware-distribution,ios-native,iot-smart-pos,mdm-compliance-engine,mdm-geofence-service,mdm-service,ota-service,pos-fluvio-consumer,pos-geofencing,pos-hardware-management,pos-integration,pos-management,pos-printer,pos-shell-config,pos-terminal-management,power-management,terminal-heartbeat,terminal-ownership,territory-management
            PORT_BASE=9125
          tags: registry.digitalocean.com/talentgraph-auth/54agent-agent-pos:${{ env.TAG }}
