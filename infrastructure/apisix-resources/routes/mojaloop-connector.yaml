# mojaloop-connector
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-mojaloop-connector-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /mojaloop-connector/*
      backends:
        - serviceName: core-payments
          servicePort: 9348
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/mojaloop-connector/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
