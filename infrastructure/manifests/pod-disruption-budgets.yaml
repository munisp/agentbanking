# PodDisruptionBudget manifests for 54agent Agency Banking Platform
# Namespace: 54agent
#
# Every service listed here runs with minReplicas: 2.
# minAvailable: 1 guarantees at least one pod remains schedulable during
# voluntary disruptions (node drains, rolling upgrades, cluster maintenance).

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: agent-service-pdb
  namespace: 54agent
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: agent-service

