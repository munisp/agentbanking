name: Build Core Ledger Consolidated Service

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'services/chart-of-accounts/**'
      - 'services/core-banking/**'
      - 'services/go-ledger-sync/**'
      - 'services/interest-calculation/**'
      - 'services/ledger-bridge/**'
      - 'services/ledger-integrity-validator/**'
      - 'services/offline-ledger/**'
      - 'services/tigerbeetle-core/**'
      - 'services/tigerbeetle-edge/**'
      - 'services/tigerbeetle-integrated/**'
      - 'services/tigerbeetle-sync/**'
      - 'services/tigerbeetle-zig/**'
      - 'docker/Dockerfile.consolidated'
      - 'docker/entrypoint.sh'
      - 'docker/build-services.sh'
      - '.github/workflows/core-ledger.yaml'

env:
  TAG: "0.0.1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: docker
          password: ${{ secrets.DO_API_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.consolidated
          push: true
          build-args: |
            SERVICES=chart-of-accounts,core-banking,go-ledger-sync,interest-calculation,ledger-bridge,ledger-integrity-validator,offline-ledger,tigerbeetle-core,tigerbeetle-edge,tigerbeetle-integrated,tigerbeetle-sync,tigerbeetle-zig
            PORT_BASE=9325
          tags: registry.digitalocean.com/talentgraph-auth/54agent-core-ledger:${{ env.TAG }}
