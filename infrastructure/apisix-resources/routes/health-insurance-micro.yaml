# health-insurance-micro
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-health-insurance-micro-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /health-insurance-micro/*
      backends:
        - serviceName: specialized-finance
          servicePort: 9571
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/health-insurance-micro/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
