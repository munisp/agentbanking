name: Build Analytics Data Consolidated Service

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'services/analytics/**'
      - 'services/analytics-dashboard/**'
      - 'services/analytics-service/**'
      - 'services/analytics-service-ts/**'
      - 'services/business-intelligence/**'
      - 'services/cdp-service/**'
      - 'services/cocoindex-service/**'
      - 'services/connectivity-analytics/**'
      - 'services/customer-analytics/**'
      - 'services/dashboard-service/**'
      - 'services/epr-kgqa-service/**'
      - 'services/opensearch-analytics/**'
      - 'services/opensearch-indexer/**'
      - 'services/projections-targets/**'
      - 'services/reporting-engine/**'
      - 'services/reporting-service/**'
      - 'services/store-analytics-engine/**'
      - 'services/unified-analytics/**'
      - 'services/ussd-analytics/**'
      - 'docker/Dockerfile.consolidated'
      - 'docker/entrypoint.sh'
      - 'docker/build-services.sh'
      - '.github/workflows/analytics-data.yaml'

env:
  TAG: "0.0.4"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: docker
          password: ${{ secrets.DO_API_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.consolidated
          push: true
          build-args: |
            SERVICES=analytics,analytics-dashboard,analytics-service,analytics-service-ts,business-intelligence,cdp-service,cocoindex-service,connectivity-analytics,customer-analytics,dashboard-service,epr-kgqa-service,opensearch-analytics,opensearch-indexer,projections-targets,reporting-engine,reporting-service,store-analytics-engine,unified-analytics,ussd-analytics
            PORT_BASE=9162
          tags: registry.digitalocean.com/talentgraph-auth/54agent-analytics-data:${{ env.TAG }}
