###############################################################################
# docker-compose.sprint50.yml — Sprint 50: 20 Production Features
# Usage: docker compose -f docker-compose.yml -f docker-compose.sprint50.yml up
###############################################################################
version: "3.9"

x-common-env: &common-env
  NODE_ENV: production
  DATABASE_URL: ${DATABASE_URL:-postgresql://posadmin:posadmin123@postgres:5432/pos54link}
  POSTGRES_URL: ${POSTGRES_URL:-postgresql://posadmin:posadmin123@postgres:5432/pos54link}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  JWT_SECRET: ${JWT_SECRET:-sprint50-jwt-secret-change-in-production}
  LOG_LEVEL: ${LOG_LEVEL:-info}

x-healthcheck: &healthcheck
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 15s

services:
  # ── F01: Real-Time Transaction Monitor ──────────────────────────────────
  realtime-tx-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      SERVICE_NAME: realtime-tx-monitor
      ALERT_THRESHOLD_AMOUNT: "500000"
      VELOCITY_WINDOW_SECONDS: "300"
      GEO_ANOMALY_RADIUS_KM: "50"
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512M }
        reservations: { cpus: "0.25", memory: 256M }
    restart: unless-stopped

  # ── F02: Fraud ML Scoring Engine ────────────────────────────────────────
  fraud-ml-engine:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      SERVICE_NAME: fraud-ml-engine
      ML_MODEL_VERSION: "v2.3.1"
      SCORE_THRESHOLD_HIGH: "80"
      SCORE_THRESHOLD_CRITICAL: "95"
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1G }
        reservations: { cpus: "0.5", memory: 512M }
    restart: unless-stopped

  # ── F03: Notification Orchestrator ──────────────────────────────────────
  notification-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      SERVICE_NAME: notification-orchestrator
      SMS_PROVIDER: ${SMS_PROVIDER:-termii}
      SMS_API_KEY: ${SMS_API_KEY:-}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-ses}
      PUSH_PROVIDER: ${PUSH_PROVIDER:-firebase}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-}
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512M }
    restart: unless-stopped

  # ── F04: Agent Loan Facility ────────────────────────────────────────────
  agent-loan-service:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      SERVICE_NAME: agent-loan-service
      MAX_LOAN_AMOUNT: "5000000"
      DEFAULT_INTEREST_RATE: "12.5"
      CREDIT_SCORE_MIN: "350"
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }
    restart: unless-stopped

  # ── F05: Dynamic Fee Engine ─────────────────────────────────────────────
  dynamic-fee-engine:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      SERVICE_NAME: dynamic-fee-engine
      FEE_CACHE_TTL_SECONDS: "300"
      PROMO_ENGINE_ENABLED: "true"
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
    deploy:
      resources:
        limits: { cpus: "0.25", memory: 256M }
    restart: unless-stopped

  # ── F06: Merchant KYC Onboarding ────────────────────────────────────────
  merchant-kyc-service:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      SERVICE_NAME: merchant-kyc-service
      KYC_PROVIDER: ${KYC_PROVIDER:-youverify}
      KYC_API_KEY: ${KYC_API_KEY:-}
      BVN_VERIFICATION_URL: ${BVN_VERIFICATION_URL:-https://api.nibss-plc.com.ng/bvn}
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }
    restart: unless-stopped

  # ── F07: Merchant Payout Settlement ─────────────────────────────────────
  merchant-payout-service:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      SERVICE_NAME: merchant-payout-service
      SETTLEMENT_BANK_CODE: ${SETTLEMENT_BANK_CODE:-044}
      NIBSS_API_URL: ${NIBSS_API_URL:-https://api.nibss-plc.com.ng}
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }
    restart: unless-stopped

  # ── F08: Compliance Filing ──────────────────────────────────────────────
  compliance-filing-service:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      SERVICE_NAME: compliance-filing-service
      CBN_REPORTING_URL: ${CBN_REPORTING_URL:-https://reporting.cbn.gov.ng/api}
      NDIC_REPORTING_URL: ${NDIC_REPORTING_URL:-https://api.ndic.gov.ng}
      NFIU_REPORTING_URL: ${NFIU_REPORTING_URL:-https://api.nfiu.gov.ng}
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512M }
    restart: unless-stopped

  # ── F09: Agent Gamification ─────────────────────────────────────────────
  gamification-engine:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      SERVICE_NAME: gamification-engine
      LEADERBOARD_REFRESH_INTERVAL: "300"
      BADGE_CHECK_INTERVAL: "3600"
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
    deploy:
      resources:
        limits: { cpus: "0.25", memory: 256M }
    restart: unless-stopped

  # ── F10: Tenant Feature Toggle ──────────────────────────────────────────
  feature-toggle-service:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      SERVICE_NAME: feature-toggle-service
      TOGGLE_CACHE_TTL: "60"
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
    deploy:
      resources:
        limits: { cpus: "0.25", memory: 128M }
    restart: unless-stopped

  # ── F11: Reconciliation Engine ──────────────────────────────────────────
  reconciliation-engine:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      SERVICE_NAME: reconciliation-engine
      RECON_BATCH_SIZE: "1000"
      MATCH_TOLERANCE_AMOUNT: "0.01"
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1G }
    restart: unless-stopped

  # ── F12: Customer Journey Analytics ─────────────────────────────────────
  customer-journey-analytics:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      SERVICE_NAME: customer-journey-analytics
      FUNNEL_REFRESH_INTERVAL: "600"
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512M }
    restart: unless-stopped

  # ── F13: Rate Limiting Engine ───────────────────────────────────────────
  rate-limit-engine:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      SERVICE_NAME: rate-limit-engine
      GLOBAL_RATE_LIMIT: "1000"
      RATE_LIMIT_WINDOW: "60"
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
    deploy:
      resources:
        limits: { cpus: "0.25", memory: 256M }
    restart: unless-stopped

  # ── F14: Backup & Disaster Recovery ─────────────────────────────────────
  backup-dr-service:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      SERVICE_NAME: backup-dr-service
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-pos54link-backups}
      BACKUP_RETENTION_DAYS: "90"
      FULL_BACKUP_SCHEDULE: "0 2 * * 0"
      INCREMENTAL_BACKUP_SCHEDULE: "0 2 * * 1-6"
    volumes:
      - backup-data:/var/backups
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512M }
    restart: unless-stopped

  # ── F15: Workflow Engine ────────────────────────────────────────────────
  workflow-engine:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      SERVICE_NAME: workflow-engine
      WORKFLOW_POLL_INTERVAL: "30"
      SLA_CHECK_INTERVAL: "300"
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512M }
    restart: unless-stopped

  # ── F16: General Ledger ─────────────────────────────────────────────────
  general-ledger-service:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      SERVICE_NAME: general-ledger-service
      GL_CURRENCY: "NGN"
      FISCAL_YEAR_START: "01-01"
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }
    restart: unless-stopped

  # ── F17: Webhook Management ─────────────────────────────────────────────
  webhook-management:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      SERVICE_NAME: webhook-management
      WEBHOOK_RETRY_MAX: "5"
      WEBHOOK_RETRY_DELAY_MS: "5000"
      WEBHOOK_TIMEOUT_MS: "10000"
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }
    restart: unless-stopped

  # ── F18: SLA Monitoring ─────────────────────────────────────────────────
  sla-monitoring:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      SERVICE_NAME: sla-monitoring
      SLA_CHECK_INTERVAL_SECONDS: "60"
      ALERT_COOLDOWN_MINUTES: "15"
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
    deploy:
      resources:
        limits: { cpus: "0.25", memory: 256M }
    restart: unless-stopped

  # ── F19: Data Export Hub ────────────────────────────────────────────────
  data-export-hub:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      SERVICE_NAME: data-export-hub
      EXPORT_S3_BUCKET: ${EXPORT_S3_BUCKET:-pos54link-exports}
      MAX_EXPORT_ROWS: "1000000"
    volumes:
      - export-data:/var/exports
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1G }
    restart: unless-stopped

  # ── F20: Platform Health & Observability ────────────────────────────────
  platform-health:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      SERVICE_NAME: platform-health
      HEALTH_CHECK_INTERVAL: "30"
      INCIDENT_AUTO_RESOLVE_HOURS: "24"
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
    deploy:
      resources:
        limits: { cpus: "0.25", memory: 256M }
    restart: unless-stopped

volumes:
  backup-data:
    driver: local
  export-data:
    driver: local

networks:
  default:
    name: pos54link-sprint50
    driver: bridge
