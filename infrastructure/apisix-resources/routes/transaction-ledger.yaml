# transaction-ledger | port 9337
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-transaction-ledger-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /ledger/*
      backends:
        - serviceName: transaction-ledger
          servicePort: 9337
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/ledger/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
