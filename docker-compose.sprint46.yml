# Sprint 46: Production Features — Docker Compose Extension
# Usage: docker compose -f docker-compose.yml -f docker-compose.sprint46.yml up -d

version: "3.9"

services:
  # ─── Payment Notification Service ─────────────────────────────────────────
  notification-worker:
    image: node:22-alpine
    container_name: pos-notification-worker
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMS_PROVIDER=africastalking
      - SMS_API_KEY=${AFRICASTALKING_API_KEY:-sandbox_key}
      - PUSH_PROVIDER=firebase
    command: ["node", "scripts/notification-worker.mjs"]
    depends_on:
      - redis
      - kafka
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Payment Reconciliation Worker ────────────────────────────────────────
  reconciliation-worker:
    image: node:22-alpine
    container_name: pos-reconciliation-worker
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/pos_shell}
      - PAYSTACK_SECRET_KEY=${PAYSTACK_SECRET_KEY:-sk_test_xxx}
      - FLUTTERWAVE_SECRET_KEY=${FLUTTERWAVE_SECRET_KEY:-FLWSECK_TEST-xxx}
    command: ["node", "scripts/reconciliation-worker.mjs"]
    depends_on:
      - postgres
    restart: unless-stopped

  # ─── Bulk Payment Processor ───────────────────────────────────────────────
  bulk-payment-worker:
    image: node:22-alpine
    container_name: pos-bulk-payment-worker
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/pos_shell}
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
      - MAX_BATCH_SIZE=1000
      - CONCURRENT_PAYMENTS=50
    command: ["node", "scripts/bulk-payment-worker.mjs"]
    depends_on:
      - redis
      - kafka
      - postgres
    restart: unless-stopped

  # ─── Compliance Report Generator ──────────────────────────────────────────
  compliance-cron:
    image: node:22-alpine
    container_name: pos-compliance-cron
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/pos_shell}
      - CBN_REPORTING_URL=${CBN_REPORTING_URL:-https://cbn-sandbox.ng/api/v1}
      - NDPR_ENDPOINT=${NDPR_ENDPOINT:-https://ndpr-sandbox.ng/api/v1}
    command: ["sh", "-c", "while true; do node scripts/compliance-report-generator.mjs; sleep 86400; done"]
    depends_on:
      - postgres
    restart: unless-stopped

  # ─── Dispute Workflow Engine ──────────────────────────────────────────────
  dispute-worker:
    image: node:22-alpine
    container_name: pos-dispute-worker
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/pos_shell}
      - TEMPORAL_ADDRESS=temporal:7233
      - REDIS_URL=redis://redis:6379
      - SLA_HOURS=48
      - ESCALATION_HOURS=24
    command: ["node", "scripts/dispute-worker.mjs"]
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  # ─── Platform Health Monitor ──────────────────────────────────────────────
  health-monitor:
    image: node:22-alpine
    container_name: pos-health-monitor
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - CHECK_INTERVAL_MS=30000
      - ALERT_THRESHOLD_CPU=85
      - ALERT_THRESHOLD_MEMORY=90
      - ALERT_THRESHOLD_DISK=80
      - PAGERDUTY_KEY=${PAGERDUTY_KEY:-}
      - SLACK_WEBHOOK=${SLACK_WEBHOOK:-}
    command: ["node", "scripts/health-monitor.mjs"]
    depends_on:
      - redis
    restart: unless-stopped

  # ─── Webhook Delivery Service ─────────────────────────────────────────────
  webhook-delivery:
    image: node:22-alpine
    container_name: pos-webhook-delivery
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
      - MAX_RETRIES=5
      - RETRY_BACKOFF_MS=1000
      - WEBHOOK_TIMEOUT_MS=30000
      - HMAC_SECRET=${WEBHOOK_HMAC_SECRET:-default-hmac-secret}
    command: ["node", "scripts/webhook-delivery-worker.mjs"]
    depends_on:
      - redis
      - kafka
    restart: unless-stopped

  # ─── Exchange Rate Updater ────────────────────────────────────────────────
  exchange-rate-updater:
    image: node:22-alpine
    container_name: pos-exchange-rate-updater
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - EXCHANGE_RATE_API_KEY=${EXCHANGE_RATE_API_KEY:-}
      - UPDATE_INTERVAL_MS=300000
      - CBN_RATE_URL=https://www.cbn.gov.ng/rates/ExchRateByCurrency.asp
    command: ["sh", "-c", "while true; do node scripts/exchange-rate-updater.mjs; sleep 300; done"]
    depends_on:
      - redis
    restart: unless-stopped

  # ─── MailHog (Email Testing) ──────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: pos-mailhog
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped

  # ── Sprint 47: Sidecar Services ──────────────────────────────────────────

  rust-middleware-bridge:
    build:
      context: ./rust-middleware-bridge
      dockerfile: Dockerfile
    image: 54link/pos-rust-bridge:1.0.0
    container_name: pos-rust-bridge
    ports:
      - "9100:9100"
    environment:
      - RUST_LOG=info
      - RUST_BRIDGE_PORT=9100
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - pos-network

  go-ledger-sync:
    build:
      context: ./go-ledger-sync
      dockerfile: Dockerfile
    image: 54link/pos-go-ledger:1.0.0
    container_name: pos-go-ledger
    ports:
      - "9200:9200"
    environment:
      - GO_LEDGER_PORT=9200
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - pos-network

  python-ml-engine:
    build:
      context: ./python-ml-engine
      dockerfile: Dockerfile
    image: 54link/pos-python-ml:1.0.0
    container_name: pos-python-ml
    ports:
      - "9300:9300"
    environment:
      - PYTHON_ML_PORT=9300
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9300/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - pos-network
