name: Build Chart Of Accounts

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'services/chart-of-accounts/**'
      - '.github/workflows/chart-of-accounts.yaml'

env:
  TAG: "0.0.7"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: docker
          password: ${{ secrets.DO_API_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./services/chart-of-accounts
          file: ./services/chart-of-accounts/Dockerfile
          push: true
          tags: registry.digitalocean.com/talentgraph-auth/54agent-chart-of-accounts:${{ env.TAG }}
