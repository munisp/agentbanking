global:
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alerts@remittance-platform.com'
  smtp_auth_username: 'alerts@remittance-platform.com'
  smtp_auth_password: 'your-smtp-password'
  slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'

# Templates for alert notifications
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route tree for alert routing
route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default-receiver'
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 0s
      repeat_interval: 5m
      routes:
        # Service down alerts
        - match_re:
            alertname: '.*ServiceDown'
          receiver: 'service-down-alerts'
        # Payment system alerts
        - match:
            category: payment
          receiver: 'payment-critical-alerts'
        # Fraud detection alerts
        - match:
            category: fraud
          receiver: 'fraud-critical-alerts'
        # Database alerts
        - match:
            category: database
          receiver: 'database-critical-alerts'

    # Warning alerts - less frequent notifications
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 30s
      repeat_interval: 2h
      routes:
        # Performance warnings
        - match_re:
            alertname: 'High.*'
          receiver: 'performance-warnings'
        # Business metric warnings
        - match:
            category: business
          receiver: 'business-warnings'
        # Device warnings
        - match:
            category: device
          receiver: 'device-warnings'

    # Maintenance and info alerts
    - match:
        severity: info
      receiver: 'info-alerts'
      group_wait: 5m
      repeat_interval: 12h

# Inhibition rules to prevent alert spam
inhibit_rules:
  # Inhibit warning alerts when critical alerts are firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service', 'instance']

  # Inhibit service-specific alerts when service is down
  - source_match_re:
      alertname: '.*ServiceDown'
    target_match_re:
      alertname: '.*'
    equal: ['service']

# Alert receivers and notification configurations
receivers:
  # Default receiver
  - name: 'default-receiver'
    email_configs:
      - to: 'ops-team@remittance-platform.com'
        subject: '[POS Alert] {{ .GroupLabels.alertname }}'
        body: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Labels: {{ range .Labels.SortedPairs }}{{ .Name }}={{ .Value }} {{ end }}
          {{ end }}

  # Critical alerts receiver
  - name: 'critical-alerts'
    email_configs:
      - to: 'critical-alerts@remittance-platform.com'
        subject: '[CRITICAL] POS System Alert - {{ .GroupLabels.alertname }}'
        body: |
          🚨 CRITICAL ALERT 🚨
          
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Service: {{ .Labels.service }}
          Severity: {{ .Labels.severity }}
          Time: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          
          Labels: {{ range .Labels.SortedPairs }}{{ .Name }}={{ .Value }} {{ end }}
          {{ end }}
        headers:
          Priority: 'high'
    slack_configs:
      - channel: '#critical-alerts'
        title: '🚨 Critical POS Alert'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Service:* {{ .Labels.service }}
          *Severity:* {{ .Labels.severity }}
          {{ end }}
        color: 'danger'
    pagerduty_configs:
      - service_key: 'your-pagerduty-service-key'
        description: '{{ .GroupLabels.alertname }} - {{ .CommonAnnotations.summary }}'

  # Service down alerts
  - name: 'service-down-alerts'
    email_configs:
      - to: 'service-alerts@remittance-platform.com'
        subject: '[SERVICE DOWN] {{ .GroupLabels.service }} is down'
        body: |
          ⚠️ SERVICE DOWN ALERT ⚠️
          
          Service: {{ .GroupLabels.service }}
          Status: DOWN
          
          {{ range .Alerts }}
          Description: {{ .Annotations.description }}
          Time: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}
          
          Please investigate immediately.
    slack_configs:
      - channel: '#service-alerts'
        title: '⚠️ Service Down Alert'
        text: |
          *Service:* {{ .GroupLabels.service }}
          *Status:* DOWN
          
          {{ range .Alerts }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
        color: 'danger'

  # Payment system critical alerts
  - name: 'payment-critical-alerts'
    email_configs:
      - to: 'payment-team@remittance-platform.com'
        subject: '[PAYMENT CRITICAL] {{ .GroupLabels.alertname }}'
        body: |
          💳 PAYMENT SYSTEM CRITICAL ALERT 💳
          
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Impact: Payment processing may be affected
          Time: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}
    slack_configs:
      - channel: '#payment-alerts'
        title: '💳 Payment System Critical Alert'
        color: 'danger'

  # Fraud detection critical alerts
  - name: 'fraud-critical-alerts'
    email_configs:
      - to: 'fraud-team@remittance-platform.com'
        subject: '[FRAUD CRITICAL] {{ .GroupLabels.alertname }}'
        body: |
          🛡️ FRAUD DETECTION CRITICAL ALERT 🛡️
          
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Impact: Fraud detection may be compromised
          Time: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}
    slack_configs:
      - channel: '#fraud-alerts'
        title: '🛡️ Fraud Detection Critical Alert'
        color: 'danger'

  # Database critical alerts
  - name: 'database-critical-alerts'
    email_configs:
      - to: 'database-team@remittance-platform.com'
        subject: '[DATABASE CRITICAL] {{ .GroupLabels.alertname }}'
        body: |
          🗄️ DATABASE CRITICAL ALERT 🗄️
          
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Impact: Data persistence may be affected
          Time: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}
    slack_configs:
      - channel: '#database-alerts'
        title: '🗄️ Database Critical Alert'
        color: 'danger'

  # Warning alerts receiver
  - name: 'warning-alerts'
    email_configs:
      - to: 'warnings@remittance-platform.com'
        subject: '[WARNING] POS System - {{ .GroupLabels.alertname }}'
        body: |
          ⚠️ WARNING ALERT ⚠️
          
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Service: {{ .Labels.service }}
          Time: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}

  # Performance warnings
  - name: 'performance-warnings'
    slack_configs:
      - channel: '#performance-alerts'
        title: '📊 Performance Warning'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Service:* {{ .Labels.service }}
          {{ end }}
        color: 'warning'

  # Business warnings
  - name: 'business-warnings'
    email_configs:
      - to: 'business-team@remittance-platform.com'
        subject: '[BUSINESS WARNING] {{ .GroupLabels.alertname }}'
        body: |
          📈 BUSINESS METRIC WARNING 📈
          
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Category: {{ .Labels.category }}
          Time: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}

  # Device warnings
  - name: 'device-warnings'
    email_configs:
      - to: 'device-team@remittance-platform.com'
        subject: '[DEVICE WARNING] {{ .GroupLabels.alertname }}'
        body: |
          🖥️ DEVICE WARNING 🖥️
          
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Device: {{ .Labels.device_id }}
          Time: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}

  # Info alerts receiver
  - name: 'info-alerts'
    email_configs:
      - to: 'info@remittance-platform.com'
        subject: '[INFO] POS System - {{ .GroupLabels.alertname }}'
        body: |
          ℹ️ INFORMATION ALERT ℹ️
          
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Time: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}
