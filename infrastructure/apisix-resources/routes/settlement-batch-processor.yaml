# settlement-batch-processor
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-settlement-batch-processor-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /settlement-batch-processor/*
      backends:
        - serviceName: dispute-settlement
          servicePort: 9404
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/settlement-batch-processor/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
