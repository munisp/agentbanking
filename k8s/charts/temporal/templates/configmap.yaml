apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "temporal.fullname" . }}-config
  labels:
    app.kubernetes.io/name: {{ include "temporal.name" . }}
    helm.sh/chart: {{ include "temporal.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  DB: {{ .Values.env.DB | quote }}
  DB_PORT: {{ .Values.env.DB_PORT | quote }}
  USER: {{ .Values.env.USER | quote }}
  POSTGRES_USER: {{ .Values.env.POSTGRES_USER | quote }}
  POSTGRES_PWD: {{ .Values.env.POSTGRES_PWD | quote }}
  POSTGRES_SEEDS: {{ .Values.env.POSTGRES_SEEDS | quote }}
