# connectivity-sim — 20 services | ports 9291-9310
# SIM/connectivity — carrier management, network ops, satellite, multi-SIM failover
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-connectivity-sim-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /airtime-provider-gateway/*
      backends:
        - serviceName: connectivity-sim
          servicePort: 9291
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/airtime-provider-gateway/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-2
      priority: 10
