# ios-native
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-ios-native-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /ios-native/*
      backends:
        - serviceName: agent-pos
          servicePort: 9128
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/ios-native/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
