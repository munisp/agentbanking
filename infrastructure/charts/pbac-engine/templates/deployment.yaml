apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pbac-engine.fullname" . }}
  labels:
    {{- include "pbac-engine.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "pbac-engine.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        dapr.io/app-id: "{{ .Values.dapr.appId }}"
        dapr.io/app-port: "{{ .Values.dapr.appPort }}"
        dapr.io/enable-metrics: "{{ .Values.dapr.enableMetrics }}"
        dapr.io/enabled: "{{ .Values.dapr.enabled }}"
        dapr.io/metrics-port: "{{ .Values.dapr.metricsPort }}"
        dapr.io/sidecar-listen-addresses: "{{ .Values.dapr.sidecarListenAddresses }}"
        dapr.io/log-level: "info"
        dapr.io/sidecar-cpu-request:    '{{ index .Values.dapr "cpu-request" }}'
        dapr.io/sidecar-cpu-limit:      '{{ index .Values.dapr "cpu-limit" }}'
        dapr.io/sidecar-memory-request: '{{ index .Values.dapr "memory-request" }}'
        dapr.io/sidecar-memory-limit:   '{{ index .Values.dapr "memory-limit" }}'
      labels:
        {{- include "pbac-engine.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "pbac-engine.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: 54agent-shared-database-svc-secret
            - secretRef:
                name: 54agent-shared-redis-svc-secret
            - secretRef:
                name: 54agent-shared-kafka-svc-secret
            - secretRef:
                name: 54agent-shared-keycloak-svc-secret
            - secretRef:
                name: 54agent-shared-dapr-svc-secret
            - secretRef:
                name: 54agent-shared-temporal-svc-secret
            - secretRef:
                name: 54agent-shared-tigerbeetle-svc-secret
            - secretRef:
                name: 54agent-shared-infrastructure-svc-secret
            - secretRef:
                name: 54agent-shared-app-svc-secret
            - secretRef:
                name: {{ include "pbac-engine.fullname" . }}-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
