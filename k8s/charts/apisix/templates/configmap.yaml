apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "apisix.fullname" . }}-config
  labels:
    app.kubernetes.io/name: {{ include "apisix.name" . }}
    helm.sh/chart: {{ include "apisix.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  config.yaml: |
    apisix:
      node_listen: 9080
      enable_ipv6: false
      enable_control: true
      control:
        ip: "0.0.0.0"
        port: 9180
    etcd:
      host:
        - "http://{{ .Release.Name }}-etcd:2379"
      prefix: "/apisix"
      timeout: 30
    plugins:
      - limit-req
      - limit-count
      - limit-conn
      - key-auth
      - basic-auth
      - jwt-auth
      - prometheus
