version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workflow_orchestrator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  workflow-orchestrator:
    build: .
    ports:
      - "8080:8080"
    environment:
      WORKFLOW_DATABASE_HOST: postgres
      WORKFLOW_DATABASE_PORT: 5432
      WORKFLOW_DATABASE_USER: postgres
      WORKFLOW_DATABASE_PASSWORD: postgres
      WORKFLOW_DATABASE_DATABASE: workflow_orchestrator
      WORKFLOW_REDIS_ADDR: redis:6379
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:

