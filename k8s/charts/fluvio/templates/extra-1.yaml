apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fluvio.fullname" . }}-sc
  labels:
    app.kubernetes.io/name: {{ include "fluvio.name" . }}
    helm.sh/chart: {{ include "fluvio.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: sc
spec:
  replicas: {{ .Values.sc.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "fluvio.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: sc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "fluvio.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: sc
    spec:
      serviceAccountName: {{ include "fluvio.serviceAccountName" . }}
      containers:
        - name: sc
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/fluvio"]
          args: ["run", "sc"]
          ports:
            - name: sc
              containerPort: {{ .Values.service.scPort }}
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: sc
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: sc
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
