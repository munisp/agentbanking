# ==============================================================================
# PostgreSQL 16 — High-Throughput Configuration (Millions of TPS)
# Target: 64 vCPU / 256 GB RAM / NVMe RAID-10
# Layers: PgBouncer (connection pooling) -> PostgreSQL -> Citus (horizontal sharding)
# ==============================================================================

# ── Connection Management ────────────────────────────────────────────────────
max_connections = 500                   # PgBouncer pools 10K+ connections to 500
superuser_reserved_connections = 5
tcp_keepalives_idle = 300
tcp_keepalives_interval = 30
tcp_keepalives_count = 3

# ── Memory (256 GB RAM) ─────────────────────────────────────────────────────
shared_buffers = '64GB'                 # 25% of RAM
effective_cache_size = '192GB'          # 75% of RAM
work_mem = '128MB'                      # Per-sort: 500 conn * 128MB = 64GB worst case
maintenance_work_mem = '4GB'            # Fast VACUUM / CREATE INDEX
huge_pages = on                         # Always use huge pages at this scale
temp_buffers = '64MB'
hash_mem_multiplier = 2.0               # Allow hash joins to use 2x work_mem

# ── WAL — Optimized for Write-Heavy Financial Workloads ──────────────────────
wal_level = replica
max_wal_size = '16GB'                   # Reduce checkpoint frequency
min_wal_size = '4GB'
checkpoint_completion_target = 0.9
wal_compression = zstd                  # Better compression than lz4 for WAL
wal_buffers = '256MB'                   # Larger WAL buffer for batch commits
wal_writer_delay = '10ms'               # Flush WAL every 10ms (batch commits)
wal_writer_flush_after = '4MB'          # Flush after 4MB accumulated
commit_delay = 100                      # Microseconds — batch concurrent commits
commit_siblings = 10                    # Batch when 10+ concurrent commits
synchronous_commit = off                # Async commit for non-financial tables
full_page_writes = on
wal_keep_size = '8GB'
max_wal_senders = 10
max_replication_slots = 10
wal_sender_timeout = '60s'

# ── Parallel Query (64 vCPU) ────────────────────────────────────────────────
max_parallel_workers_per_gather = 8     # 8 workers per parallel scan
max_parallel_workers = 32               # Total parallel workers
max_parallel_maintenance_workers = 8    # Parallel index/vacuum
max_worker_processes = 64               # Background workers
parallel_tuple_cost = 0.001             # Favor parallelism
parallel_setup_cost = 100               # Lower threshold for parallel scans
min_parallel_table_scan_size = '1MB'    # Parallel scan small tables too
min_parallel_index_scan_size = '256kB'

# ── Query Planner — NVMe Optimized ──────────────────────────────────────────
random_page_cost = 1.0                  # NVMe: random = sequential
seq_page_cost = 1.0
effective_io_concurrency = 500          # NVMe RAID-10 concurrent I/O
maintenance_io_concurrency = 500
default_statistics_target = 1000        # More accurate planner stats
jit = on
jit_above_cost = 50000                  # JIT for moderately expensive queries

# ── VACUUM — Aggressive for High-Write Financial Tables ──────────────────────
autovacuum = on
autovacuum_max_workers = 8              # More workers for 100+ tables
autovacuum_naptime = '15s'              # Check every 15s
autovacuum_vacuum_threshold = 25        # Vacuum after 25 dead tuples
autovacuum_vacuum_scale_factor = 0.01   # 1% of table triggers vacuum
autovacuum_analyze_threshold = 25
autovacuum_analyze_scale_factor = 0.005 # 0.5% triggers analyze
autovacuum_vacuum_cost_delay = '0'      # No throttling on NVMe
autovacuum_vacuum_cost_limit = 10000    # Max speed vacuum

# ── Partitioning ─────────────────────────────────────────────────────────────
enable_partition_pruning = on           # Prune partitions at query time
enable_partitionwise_join = on          # Join across partitions in parallel
enable_partitionwise_aggregate = on     # Aggregate across partitions in parallel

# ── Logging & Monitoring ────────────────────────────────────────────────────
shared_preload_libraries = 'pg_stat_statements,auto_explain,pg_cron,pg_partman_bgw'
log_min_duration_statement = 200        # Log queries > 200ms
log_checkpoints = on
log_lock_waits = on
deadlock_timeout = '500ms'              # Faster deadlock detection
log_autovacuum_min_duration = '100ms'
track_io_timing = on
track_wal_io_timing = on
track_functions = all

# pg_stat_statements
pg_stat_statements.max = 20000
pg_stat_statements.track = all

# auto_explain
auto_explain.log_min_duration = '500ms'
auto_explain.log_analyze = on
auto_explain.log_buffers = on

# ── Connection Pooling (PgBouncer companion config) ──────────────────────────
# PgBouncer should sit in front with:
#   pool_mode = transaction
#   max_client_conn = 10000
#   default_pool_size = 100
#   reserve_pool_size = 25
#   server_idle_timeout = 30
#   server_lifetime = 3600

# ── Security ────────────────────────────────────────────────────────────────
ssl = on
ssl_min_protocol_version = 'TLSv1.3'
password_encryption = scram-sha-256
row_security = on

# ── Locale ───────────────────────────────────────────────────────────────────
timezone = 'Africa/Lagos'
lc_messages = 'en_US.UTF-8'
