name: Build Core Accounts Consolidated Service

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'services/account-service/**'
      - 'services/beneficiary-service/**'
      - 'services/multi-currency-accounts/**'
      - 'services/multi-currency-engine/**'
      - 'services/multi-currency-wallet/**'
      - 'services/onboarding-service/**'
      - 'services/open-banking/**'
      - 'services/open-banking-api/**'
      - 'services/settings-service/**'
      - 'services/user-onboarding-enhanced/**'
      - 'docker/Dockerfile.consolidated'
      - 'docker/build-services.sh'
      - '.github/workflows/core-accounts.yaml'

env:
  TAG: "0.0.3"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: docker
          password: ${{ secrets.DO_API_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.consolidated
          push: true
          build-args: |
            SERVICES=account-service,beneficiary-service,multi-currency-accounts,multi-currency-engine,multi-currency-wallet,onboarding-service,open-banking,open-banking-api,settings-service,user-onboarding-enhanced
            PORT_BASE=9313
          tags: registry.digitalocean.com/talentgraph-auth/54agent-core-accounts:${{ env.TAG }}
