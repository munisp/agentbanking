# vlm-document-service
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-vlm-document-service-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /vlm-document/*
      backends:
        - serviceName: kyc-aml
          servicePort: 9518
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/vlm-document/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
