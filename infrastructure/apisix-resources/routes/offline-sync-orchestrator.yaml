# offline-sync-orchestrator
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-offline-sync-orchestrator-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /offline-sync-orchestrator/*
      backends:
        - serviceName: infra-messaging
          servicePort: 9453
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/offline-sync-orchestrator/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
