# 54Link POS Shell — Kubernetes Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: posshell-app
  namespace: posshell
  labels:
    app: posshell
    tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: posshell
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: posshell
        tier: frontend
    spec:
      serviceAccountName: posshell-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: posshell
          image: ghcr.io/54link/pos-shell:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posshell-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: posshell-secrets
                  key: jwt-secret
            - name: REDIS_URL
              value: "redis://redis-svc:6379"
            - name: QDRANT_URL
              value: "http://qdrant-svc:6333"
            - name: FALKORDB_URL
              value: "redis://falkordb-svc:6379"
            - name: KAFKA_BROKERS
              value: "kafka-svc:9092"
            - name: NIFI_API_URL
              value: "http://nifi-svc:8443/nifi-api"
            - name: AIRFLOW_API_URL
              value: "http://airflow-svc:8080/api/v1"
            - name: OLLAMA_URL
              value: "http://ollama-svc:11434"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: posshell-svc
  namespace: posshell
spec:
  selector:
    app: posshell
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: posshell-ingress
  namespace: posshell
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - pos.54link.ng
      secretName: posshell-tls
  rules:
    - host: pos.54link.ng
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: posshell-svc
                port:
                  number: 80
---
apiVersion: v1
kind: Secret
metadata:
  name: posshell-secrets
  namespace: posshell
type: Opaque
stringData:
  database-url: "postgresql://posshell:posshell@postgres-svc:5432/posshell"
  jwt-secret: "change-me-in-production-use-256-bit-key"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: posshell-hpa
  namespace: posshell
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: posshell-app
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: posshell-pdb
  namespace: posshell
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: posshell
