# goaml-integration-go
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-goaml-integration-go-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /goaml-integration/*
      backends:
        - serviceName: cbn-regulatory
          servicePort: 9235
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/goaml-integration/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
