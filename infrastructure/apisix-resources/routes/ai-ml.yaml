# ai-ml — 12 services | ports 9148-9159
# AI/ML — models, inference, forecasting, GNN, revenue, credit scoring
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-ai-ml-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /ai-credit-scoring/*
      backends:
        - serviceName: ai-ml
          servicePort: 9148
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/ai-credit-scoring/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-2
      priority: 10
