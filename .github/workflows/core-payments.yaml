name: Build Core Payments Consolidated Service

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'services/bill-payment-gateway/**'
      - 'services/biller-integration/**'
      - 'services/cips-integration/**'
      - 'services/cross-border/**'
      - 'services/currency-conversion/**'
      - 'services/education-payments/**'
      - 'services/fps-integration/**'
      - 'services/global-payment-gateway/**'
      - 'services/instant-reversal-engine/**'
      - 'services/mojaloop-connector/**'
      - 'services/mojaloop-connector-pos/**'
      - 'services/nfc-qr-payments/**'
      - 'services/nfc-tap-to-pay/**'
      - 'services/nibss-integration/**'
      - 'services/papss-integration/**'
      - 'services/payment-corridors-service/**'
      - 'services/payment-gateway-service/**'
      - 'services/payment-hub/**'
      - 'services/payment-processing-service/**'
      - 'services/payment-rails-connectors/**'
      - 'services/payment-split-engine/**'
      - 'services/payout-service/**'
      - 'services/qr-code-service/**'
      - 'services/qr-ticket-verification/**'
      - 'services/sepa-instant/**'
      - 'services/swift-integration/**'
      - 'services/upi-connector/**'
      - 'services/upi-integration/**'
      - 'services/wearable-payments/**'
      - 'services/wise-integration/**'
      - 'docker/Dockerfile.consolidated'
      - 'docker/build-services.sh'
      - '.github/workflows/core-payments.yaml'

env:
  TAG: "0.0.4"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: docker
          password: ${{ secrets.DO_API_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.consolidated
          push: true
          build-args: |
            SERVICES=bill-payment-gateway,biller-integration,cips-integration,cross-border,currency-conversion,education-payments,fps-integration,global-payment-gateway,instant-reversal-engine,mojaloop-connector,mojaloop-connector-pos,nfc-qr-payments,nfc-tap-to-pay,nibss-integration,papss-integration,payment-corridors-service,payment-gateway-service,payment-hub,payment-processing-service,payment-rails-connectors,payment-split-engine,payout-service,qr-code-service,qr-ticket-verification,sepa-instant,swift-integration,upi-connector,upi-integration,wearable-payments,wise-integration
            PORT_BASE=9339
          tags: registry.digitalocean.com/talentgraph-auth/54agent-core-payments:${{ env.TAG }}
