          enable: true
          config:
            regex_uri:
              - "^/ransomware-guard/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-3
      priority: 10
