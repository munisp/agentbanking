# face-matching
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-face-matching-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /face-matching/*
      backends:
        - serviceName: face-matching
          servicePort: 8000
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/face-matching/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
