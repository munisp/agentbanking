# storefront-advertising
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-storefront-advertising-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /storefront-advertising/*
      backends:
        - serviceName: ecommerce-marketplace
          servicePort: 9427
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/storefront-advertising/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
    - name: rule-2
      priority: 11
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /storefront/storefront/*
      backends:
        - serviceName: ecommerce-marketplace
          servicePort: 9427
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/storefront/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
    - name: rule-3
      priority: 12
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /storefront/*
      backends:
        - serviceName: ecommerce-marketplace
          servicePort: 9411
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/storefront/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
