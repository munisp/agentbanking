# platform-tenant — 5 services | ports 9541-9545
# Platform & tenant — config, tenant management, enterprise, super-app
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-platform-tenant-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /config-service/*
      backends:
        - serviceName: platform-tenant
          servicePort: 9541
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/config-service/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-2
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /enhanced-platform/*
      backends:
        - serviceName: platform-tenant
          servicePort: 9542
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/enhanced-platform/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-3
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /enterprise-services/*
      backends:
        - serviceName: platform-tenant
          servicePort: 9543
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/enterprise-services/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-4
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /super-app-framework/*
      backends:
        - serviceName: platform-tenant
          servicePort: 9544
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/super-app-framework/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-5
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /tenant-management/*
      backends:
        - serviceName: platform-tenant
          servicePort: 9545
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/tenant-management/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
