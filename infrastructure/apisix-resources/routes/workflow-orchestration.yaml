# workflow-orchestration — 12 services | ports 9601-9612
# Workflow & orchestration — Temporal, sagas, schedulers, integration layer
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-workflow-orchestration-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /compensating-actions/*
      backends:
        - serviceName: workflow-orchestration
          servicePort: 9601
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/compensating-actions/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-2
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
