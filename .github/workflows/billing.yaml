name: Build Billing Consolidated Service

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'services/billing-aggregator/**'
      - 'services/billing-analytics-pipeline/**'
      - 'services/billing-anomaly-detector/**'
      - 'services/billing-event-processor/**'
      - 'services/billing-provisioning-workflow/**'
      - 'services/billing-reconciliation-engine/**'
      - 'services/billing-sla-monitor/**'
      - 'services/billing-stream-processor/**'
      - 'services/billing-webhook-dispatcher/**'
      - 'services/fee-splitter-realtime/**'
      - 'services/financial-services/**'
      - 'services/invoice-generator/**'
      - 'services/nigeria-vat-service/**'
      - 'services/payroll-disbursement/**'
      - 'services/revenue-reconciler/**'
      - 'services/sla-billing-reporter/**'
      - 'services/tb-commission-sidecar/**'
      - 'services/tb-sidecar/**'
      - 'docker/Dockerfile.consolidated'
      - 'docker/build-services.sh'
      - '.github/workflows/billing.yaml'

env:
  TAG: "0.0.8"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: docker
          password: ${{ secrets.DO_API_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.consolidated
          push: true
          build-args: |
            SERVICES=billing-aggregator,billing-analytics-pipeline,billing-anomaly-detector,billing-event-processor,billing-provisioning-workflow,billing-reconciliation-engine,billing-sla-monitor,billing-stream-processor,billing-webhook-dispatcher,fee-splitter-realtime,financial-services,invoice-generator,nigeria-vat-service,payroll-disbursement,revenue-reconciler,sla-billing-reporter,tb-commission-sidecar,tb-sidecar
            PORT_BASE=9204
          tags: registry.digitalocean.com/talentgraph-auth/54agent-billing:${{ env.TAG }}
