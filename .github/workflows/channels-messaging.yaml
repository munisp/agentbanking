name: Build Channels Messaging Consolidated Service

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'services/communication-gateway/**'
      - 'services/communication-hub/**'
      - 'services/communication-service/**'
      - 'services/communication-shared/**'
      - 'services/messaging-service/**'
      - 'services/multilingual-integration-service/**'
      - 'services/notification-service/**'
      - 'services/omnichannel-middleware/**'
      - 'services/push-notification-service/**'
      - 'services/realtime-notification-service/**'
      - 'services/realtime-translation/**'
      - 'services/sms-gateway/**'
      - 'services/sms-service/**'
      - 'services/sms-transaction-bridge/**'
      - 'services/translation-service/**'
      - 'services/unified-communication-hub/**'
      - 'services/unified-communication-service/**'
      - 'docker/Dockerfile.consolidated'
      - 'docker/entrypoint.sh'
      - 'docker/build-services.sh'
      - '.github/workflows/channels-messaging.yaml'

env:
  TAG: "0.0.5"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v4
        with:
          registry: registry.digitalocean.com
          username: docker
          password: ${{ secrets.DO_API_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.consolidated
          push: true
          build-args: |
            SERVICES=communication-gateway,communication-hub,communication-service,communication-shared,messaging-service,multilingual-integration-service,notification-service,omnichannel-middleware,push-notification-service,realtime-notification-service,realtime-translation,sms-gateway,sms-service,sms-transaction-bridge,translation-service,unified-communication-hub,unified-communication-service
            PORT_BASE=9256
          tags: registry.digitalocean.com/talentgraph-auth/54agent-channels-messaging:${{ env.TAG }}
