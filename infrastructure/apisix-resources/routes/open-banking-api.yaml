# open-banking-api — 11 services | ports 9528-9538
# API platform — gateway, APISIX, developer portal, open banking, white-label
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-open-banking-api-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /admin-service/*
      backends:
        - serviceName: open-banking-api
          servicePort: 9528
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/admin-service/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-2
      priority: 10
