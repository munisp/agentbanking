name: Build Infra Observability Consolidated Service

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'services/chaos-engineering/**'
      - 'services/distributed-tracing/**'
      - 'services/logging-service/**'
      - 'services/metrics-service/**'
      - 'services/monitoring/**'
      - 'services/monitoring-dashboard/**'
      - 'services/telemetry-aggregator/**'
      - 'services/telemetry-api-gateway/**'
      - 'services/telemetry-collector/**'
      - 'services/telemetry-ingestion/**'
      - 'docker/Dockerfile.consolidated'
      - 'docker/entrypoint.sh'
      - 'docker/build-services.sh'
      - '.github/workflows/infra-observability.yaml'

env:
  TAG: "0.0.2"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: docker
          password: ${{ secrets.DO_API_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile.consolidated
          push: true
          build-args: |
            SERVICES=chaos-engineering,distributed-tracing,logging-service,metrics-service,monitoring,monitoring-dashboard,telemetry-aggregator,telemetry-api-gateway,telemetry-collector,telemetry-ingestion
            PORT_BASE=9481
          tags: registry.digitalocean.com/talentgraph-auth/54agent-infra-observability:${{ env.TAG }}
