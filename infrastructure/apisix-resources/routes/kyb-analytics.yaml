# kyb-analytics
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-kyb-analytics-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /kyb-analytics/*
      backends:
        - serviceName: kyc-aml
          servicePort: 9501
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/kyb-analytics/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
