# ussd-menu-builder
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-ussd-menu-builder-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /ussd-menu-builder/*
      backends:
        - serviceName: channels-ussd-voice
          servicePort: 9280
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/ussd-menu-builder/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
