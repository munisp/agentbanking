# ai-orchestration
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-ai-orchestration-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /ai-orchestration/*
      backends:
        - serviceName: ai-ml
          servicePort: 9151
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/ai-orchestration/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
