# recurring-payments
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-recurring-payments-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /recurring-payments/*
      backends:
        - serviceName: dispute-settlement
          servicePort: 9402
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/recurring-payments/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
