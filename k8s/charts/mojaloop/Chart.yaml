apiVersion: v2
name: mojaloop
description: A Helm chart for Mojaloop components (central-ledger, ml-api-adapter, account-lookup, quoting-service)
type: application
version: 1.0.0
appVersion: "1.0.0"
dependencies:
  - name: mysql
    version: 9.4.6
    repository: https://charts.bitnami.com/bitnami
    condition: mysql.enabled
  - name: kafka
    version: 26.4.2
    repository: https://charts.bitnami.com/bitnami
    condition: kafka.enabled
