name: Build Customer Engagement Consolidated Service

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'services/coalition-loyalty/**'
      - 'services/customer-service/**'
      - 'services/gamification/**'
      - 'services/knowledge-base/**'
      - 'services/loyalty-service/**'
      - 'services/promotion-service/**'
      - 'services/rewards-service/**'
      - 'services/shareable-links/**'
      - 'services/support-comms-service/**'
      - 'services/support-crm/**'
      - 'services/support-service/**'
      - 'docker/Dockerfile.consolidated'
      - 'docker/build-services.sh'
      - '.github/workflows/customer-engagement.yaml'

env:
  TAG: "0.0.2"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: docker
          password: ${{ secrets.DO_API_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.consolidated
          push: true
          build-args: |
            SERVICES=coalition-loyalty,customer-service,gamification,knowledge-base,loyalty-service,promotion-service,rewards-service,shareable-links,support-comms-service,support-crm,support-service
            PORT_BASE=9371
          tags: registry.digitalocean.com/talentgraph-auth/54agent-customer-engagement:${{ env.TAG }}
