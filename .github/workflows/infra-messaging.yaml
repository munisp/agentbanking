name: Build Infra Messaging Consolidated Service

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'services/dapr-sidecar/**'
      - 'services/fluvio-consumer/**'
      - 'services/fluvio-producer/**'
      - 'services/fluvio-smartmodule/**'
      - 'services/fluvio-streaming/**'
      - 'services/offline-sync/**'
      - 'services/offline-sync-orchestrator/**'
      - 'services/realtime-services/**'
      - 'services/unified-streaming/**'
      - 'services/websocket-service/**'
      - 'docker/Dockerfile.consolidated'
      - 'docker/entrypoint.sh'
      - 'docker/build-services.sh'
      - '.github/workflows/infra-messaging.yaml'

env:
  TAG: "0.0.1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: docker
          password: ${{ secrets.DO_API_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile.consolidated
          push: true
          build-args: |
            SERVICES=dapr-sidecar,fluvio-consumer,fluvio-producer,fluvio-smartmodule,fluvio-streaming,offline-sync,offline-sync-orchestrator,realtime-services,unified-streaming,websocket-service
            PORT_BASE=9446
          tags: registry.digitalocean.com/talentgraph-auth/54agent-infra-messaging:${{ env.TAG }}
