name: Build Connectivity Sim Consolidated Service

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'services/airtime-provider-gateway/**'
      - 'services/carrier-billing/**'
      - 'services/carrier-cost-engine/**'
      - 'services/carrier-failover-proxy/**'
      - 'services/carrier-live-api/**'
      - 'services/carrier-performance-reporter/**'
      - 'services/carrier-ranking-engine/**'
      - 'services/carrier-recommendation/**'
      - 'services/carrier-signal-monitor/**'
      - 'services/carrier-sla-monitor/**'
      - 'services/geospatial-service/**'
      - 'services/multi-sim-failover/**'
      - 'services/network-coverage-export/**'
      - 'services/network-diagnostic/**'
      - 'services/network-ml-trainer/**'
      - 'services/network-operations/**'
      - 'services/network-quality-predictor/**'
      - 'services/satellite-connectivity/**'
      - 'services/telco-integration/**'
      - 'docker/Dockerfile.consolidated'
      - 'docker/entrypoint.sh'
      - 'docker/build-services.sh'
      - '.github/workflows/connectivity-sim.yaml'

env:
  TAG: "0.0.2"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v4
        with:
          registry: registry.digitalocean.com
          username: docker
          password: ${{ secrets.DO_API_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.consolidated
          push: true
          build-args: |
            SERVICES=airtime-provider-gateway,carrier-billing,carrier-cost-engine,carrier-failover-proxy,carrier-live-api,carrier-performance-reporter,carrier-ranking-engine,carrier-recommendation,carrier-signal-monitor,carrier-sla-monitor,geospatial-service,multi-sim-failover,network-coverage-export,network-diagnostic,network-ml-trainer,network-operations,network-quality-predictor,satellite-connectivity,telco-integration
            PORT_BASE=9291
          tags: registry.digitalocean.com/talentgraph-auth/54agent-connectivity-sim:${{ env.TAG }}
