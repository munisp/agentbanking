# fluvio-smartmodule
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-fluvio-smartmodule-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /fluvio-smartmodule/*
      backends:
        - serviceName: infra-messaging
          servicePort: 9449
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/fluvio-smartmodule/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
