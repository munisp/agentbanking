# ═══════════════════════════════════════════════════════════════════════════════
# Sprint 80 — Billing Engine Kubernetes Deployments
# 10 microservices: 3 Go, 3 Rust, 4 Python
# All services connect to: Kafka, Redis, PostgreSQL, TigerBeetle, OpenSearch
# RBAC enforced via Permify sidecar, audit via Kafka billing.audit.* topics
# ═══════════════════════════════════════════════════════════════════════════════
---
apiVersion: v1
kind: Namespace
metadata:
  name: billing
  labels:
    app.kubernetes.io/part-of: 54link
    istio-injection: enabled
---
# ═══════════════════════════════════════════════════════════════════════════════
# ConfigMap: Shared billing service configuration
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: billing-config
  namespace: billing
data:
  KAFKA_BROKERS: "kafka-headless.kafka.svc.cluster.local:9092"
  REDIS_URL: "redis://redis-master.redis.svc.cluster.local:6379/3"
  POSTGRES_HOST: "postgresql-primary.postgresql.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "pos54link"
  TIGERBEETLE_ADDRESSES: "tigerbeetle-0.tigerbeetle.tigerbeetle.svc.cluster.local:3001,tigerbeetle-1.tigerbeetle.tigerbeetle.svc.cluster.local:3001,tigerbeetle-2.tigerbeetle.tigerbeetle.svc.cluster.local:3001"
  OPENSEARCH_URL: "https://opensearch-cluster.opensearch.svc.cluster.local:9200"
  TEMPORAL_ADDRESS: "temporal-frontend.temporal.svc.cluster.local:7233"
  PERMIFY_URL: "http://permify.permify.svc.cluster.local:3476"
  DAPR_HTTP_PORT: "3500"
  DAPR_GRPC_PORT: "50001"
  FLUVIO_ENDPOINT: "fluvio-sc.fluvio.svc.cluster.local:9003"
  LAKEHOUSE_S3_ENDPOINT: "http://minio.lakehouse.svc.cluster.local:9000"
  LAKEHOUSE_CATALOG_URL: "http://iceberg-rest.lakehouse.svc.cluster.local:8181"
  MOJALOOP_HUB_URL: "http://central-ledger.mojaloop.svc.cluster.local:3001"
  APISIX_ADMIN_URL: "http://apisix-admin.apisix.svc.cluster.local:9180"
  KEYCLOAK_URL: "http://keycloak.keycloak.svc.cluster.local:8080"
  OPENAPPSEC_AGENT_URL: "http://openappsec-agent.security.svc.cluster.local:8090"
  LOG_LEVEL: "info"
  BILLING_AUDIT_TOPIC: "billing.audit.events"
  BILLING_LEDGER_TOPIC: "billing.ledger.splits"
  BILLING_RECONCILIATION_TOPIC: "billing.reconciliation.results"
---
apiVersion: v1
kind: Secret
metadata:
  name: billing-secrets
  namespace: billing
type: Opaque
stringData:
  POSTGRES_USER: "posadmin"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
  REDIS_PASSWORD: "${REDIS_PASSWORD}"
  OPENSEARCH_USER: "billing-svc"
  OPENSEARCH_PASSWORD: "${OPENSEARCH_PASSWORD}"
  PERMIFY_API_KEY: "${PERMIFY_API_KEY}"
  KEYCLOAK_CLIENT_SECRET: "${KC_BILLING_SECRET}"
  TIGERBEETLE_CLUSTER_ID: "0"
---
# ═══════════════════════════════════════════════════════════════════════════════
# Go Service 1: billing-aggregator
# Aggregates transaction fees into billing ledger entries
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-aggregator
  namespace: billing
  labels:
    app: billing-aggregator
    language: go
    sprint: "80"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: billing-aggregator
  template:
    metadata:
      labels:
        app: billing-aggregator
        language: go
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "billing-aggregator"
        dapr.io/app-port: "8080"
        dapr.io/config: "billing-dapr-config"
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: billing-svc
      containers:
        - name: billing-aggregator
          image: registry.54link.io/billing/billing-aggregator:latest
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: metrics
          envFrom:
            - configMapRef:
                name: billing-config
            - secretRef:
                name: billing-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: billing-tls
              mountPath: /etc/tls
              readOnly: true
      volumes:
        - name: billing-tls
          secret:
            secretName: billing-tls-cert
---
apiVersion: v1
kind: Service
metadata:
  name: billing-aggregator
  namespace: billing
spec:
  selector:
    app: billing-aggregator
  ports:
    - port: 8080
      targetPort: 8080
      name: http
    - port: 9090
      targetPort: 9090
      name: metrics
---
