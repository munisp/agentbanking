name: Build Supply Chain Govt Consolidated Service

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'services/agritech-payments/**'
      - 'services/government-integration/**'
      - 'services/i18n-currency/**'
      - 'services/inventory-management/**'
      - 'services/inventory-service/**'
      - 'services/supply-chain/**'
      - 'services/supply-chain-go/**'
      - 'docker/Dockerfile.consolidated'
      - 'docker/entrypoint.sh'
      - 'docker/build-services.sh'
      - '.github/workflows/supply-chain-govt.yaml'

env:
  TAG: "0.0.4"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: docker
          password: ${{ secrets.DO_API_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile.consolidated
          push: true
          build-args: |
            SERVICES=agritech-payments,government-integration,i18n-currency,inventory-management,inventory-service,supply-chain,supply-chain-go
            PORT_BASE=9585
          tags: registry.digitalocean.com/talentgraph-auth/54agent-supply-chain-govt:${{ env.TAG }}
