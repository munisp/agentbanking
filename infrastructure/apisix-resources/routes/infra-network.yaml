# infra-network — 20 services | ports 9459-9478
# Network infra — circuit breaker, load balancer, gRPC, compression, resilience
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-infra-network-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /adaptive-compression/*
      backends:
        - serviceName: infra-network
          servicePort: 9459
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/adaptive-compression/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-2
      priority: 10
