# =============================================================================
#  54Link POS Shell — Production Docker Compose
#  Services: Main App + 12 microservices + monitoring stack
#  Health checks and depends_on chains are fully wired.
#  Usage:
#    docker compose up -d                      # core services only
#    docker compose --profile dev up -d        # + Mailhog SMTP UI
#    docker compose --profile monitoring up -d # + Prometheus/Grafana
# =============================================================================
version: "3.9"

x-common-env: &common-env
  DATABASE_URL: ${DATABASE_URL}
  JWT_SECRET: ${JWT_SECRET}
  NODE_ENV: production

x-python-healthcheck: &python-healthcheck
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

services:
  # ── Main Node.js / tRPC Application ────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      <<: *common-env
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@54link.ng}
      FRAUD_SERVICE_URL: http://fraud-detection:8101
      KYC_SERVICE_URL: http://kyc-service:8090
      AGENT_PERF_URL: http://agent-performance:8091
      CREDIT_SCORING_URL: http://credit-scoring:8082
      ANALYTICS_URL: http://analytics-service:8087
      LOYALTY_SERVICE_URL: http://loyalty-service:8092
      WORKFLOW_URL: http://workflow-orchestrator:8080
      USER_MGMT_URL: http://user-management:8082
      OTA_SERVICE_URL: http://ota-service:8081
      FIDO2_SERVICE_URL: http://fido2-service:8083
      I18N_SERVICE_URL: http://i18n-currency:8084
      MDM_SERVICE_URL: http://mdm-compliance-engine:8095
      REDIS_URL: redis://redis:6379
    depends_on:
      fraud-detection:
        condition: service_healthy
      kyc-service:
        condition: service_healthy
      credit-scoring:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      workflow-orchestrator:
        condition: service_healthy
      redis:
        condition: service_healthy
      ota-service:
        condition: service_started
      fido2-service:
        condition: service_started
      i18n-currency:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - 54link-network

  # ── Python: Fraud Detection & Scoring ──────────────────────────────────────
  fraud-detection:
    build:
      context: ./services/python/fraud-detection
      dockerfile: Dockerfile
    ports:
      - "8101:8101"
    environment:
      PORT: "8101"
      DATABASE_URL: ${DATABASE_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8101/health"]
      <<: *python-healthcheck
    networks:
      - 54link-network

  # ── Python: KYC Verification Service ───────────────────────────────────────
  kyc-service:
    build:
      context: ./services/python/kyc-service
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
      DATABASE_URL: ${DATABASE_URL}
      SMILE_ID_API_KEY: ${SMILE_ID_API_KEY:-}
      SMILE_ID_PARTNER_ID: ${SMILE_ID_PARTNER_ID:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      <<: *python-healthcheck
    networks:
      - 54link-network

  # ── Python: Agent Performance Analytics ────────────────────────────────────
  agent-performance:
    build:
      context: ./services/python/agent-performance
      dockerfile: Dockerfile
    ports:
      - "8091:8091"
    environment:
      PORT: "8091"
      DATABASE_URL: ${DATABASE_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8091/health"]
      <<: *python-healthcheck
    networks:
      - 54link-network

  # ── Python: Credit Scoring Engine ──────────────────────────────────────────
  credit-scoring:
    build:
      context: ./services/python/credit-scoring
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      PORT: "8082"
      DATABASE_URL: ${DATABASE_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      <<: *python-healthcheck
    networks:
      - 54link-network

  # ── Python: Loyalty & Rewards Service ──────────────────────────────────────
  loyalty-service:
    build:
      context: ./services/python/loyalty-service
      dockerfile: Dockerfile
    ports:
      - "8092:8092"
    environment:
      PORT: "8092"
      DATABASE_URL: ${DATABASE_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8092/health"]
      <<: *python-healthcheck
    networks:
      - 54link-network

  # ── Python: Analytics & Reporting ──────────────────────────────────────────
  analytics-service:
    build:
      context: ./services/python/analytics-service
      dockerfile: Dockerfile
    ports:
      - "8087:8087"
    environment:
      PORT: "8087"
      DATABASE_URL: ${DATABASE_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8087/health"]
      <<: *python-healthcheck
    networks:
      - 54link-network

  # ── Go: Workflow Orchestrator ───────────────────────────────────────────────
  workflow-orchestrator:
    build:
      context: ./services/go/workflow-orchestrator
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: ${DATABASE_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - 54link-network

  # ── Go: User Management Service ─────────────────────────────────────────────
  user-management:
    build:
      context: ./services/go/user-management
      dockerfile: Dockerfile
    ports:
      - "8093:8082"
    environment:
      PORT: "8082"
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - 54link-network

  # ── Go: MDM Compliance Engine ────────────────────────────────────────────────
  mdm-compliance-engine:
    build:
      context: ./services/go/mdm-compliance-engine
      dockerfile: Dockerfile
    ports:
      - "8095:8095"
    environment:
      PORT: "8095"
      DATABASE_URL: ${DATABASE_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8095/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - 54link-network

  # ── Go: OTA Firmware Service ─────────────────────────────────────────────────
  ota-service:
    build:
      context: ./server/ota-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-54link-firmware}
    restart: unless-stopped
    networks:
      - 54link-network

  # ── Go: FIDO2 Authentication Service ────────────────────────────────────────
  fido2-service:
    build:
      context: ./server/fido2-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      PORT: "8083"
      FIDO2_RP_ID: ${FIDO2_RP_ID:-54link.ng}
      FIDO2_RP_NAME: ${FIDO2_RP_NAME:-54Link POS}
      FIDO2_ORIGIN: ${FIDO2_ORIGIN:-https://54link.ng}
      DATABASE_URL: ${DATABASE_URL}
    restart: unless-stopped
    networks:
      - 54link-network

  # ── Rust: i18n / Multi-Currency Service ─────────────────────────────────────
  i18n-currency:
    build:
      context: ./services/rust/i18n-currency
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      PORT: "8084"
    restart: unless-stopped
    networks:
      - 54link-network

  # ── Redis — Session cache & rate-limit counters ───────────────────────────────
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - 54link-network

  # ── Mailhog — SMTP testing (dev profile only) ────────────────────────────────
  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    restart: unless-stopped
    profiles:
      - dev
    networks:
      - 54link-network

  # ── Prometheus — Metrics collection (monitoring profile) ─────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    profiles:
      - monitoring
    networks:
      - 54link-network

  # ── Grafana — Dashboards (monitoring profile) ────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-54link-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles:
      - monitoring
    networks:
      - 54link-network

  # ── PostgreSQL Database ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: 54link-postgres
    ports:
      - "${PG_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: pos54link
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - 54link-network

  # ── Keycloak Identity Provider ────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: 54link-keycloak
    command: start-dev --import-realm
    ports:
      - "${KC_PORT:-8085}:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/pos54link
      KC_DB_USERNAME: ${PG_USER:-postgres}
      KC_DB_PASSWORD: ${PG_PASSWORD:-postgres}
      KEYCLOAK_ADMIN: ${KC_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - 54link-network

  # ── Mosquitto MQTT Broker ─────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: 54link-mosquitto
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    restart: unless-stopped
    networks:
      - 54link-network

  # ── Temporal Workflow Engine ──────────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:1.24
    container_name: 54link-temporal
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PWD: ${PG_PASSWORD:-postgres}
      POSTGRES_SEEDS: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - 54link-network

  # ── Temporal Web UI ───────────────────────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:2.26.2
    container_name: 54link-temporal-ui
    ports:
      - "${TEMPORAL_UI_PORT:-8233}:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal
    restart: unless-stopped
    networks:
      - 54link-network

  # ── Qdrant (Vector Search) ──────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: 54link-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped
    networks:
      - 54link-network

  # ── FalkorDB (Graph Database) ──────────────────────────────────────────────
  falkordb:
    image: falkordb/falkordb:latest
    container_name: 54link-falkordb
    ports:
      - "6380:6379"
    volumes:
      - falkordb-data:/data
    restart: unless-stopped
    networks:
      - 54link-network

  # ── Apache Kafka (Event Streaming) ─────────────────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    container_name: 54link-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/bitnami/kafka
    restart: unless-stopped
    networks:
      - 54link-network

  # ── Apache NiFi (Data Flow) ────────────────────────────────────────────────
  nifi:
    image: apache/nifi:2.0.0
    container_name: 54link-nifi
    ports:
      - "8443:8443"
    environment:
      NIFI_WEB_HTTPS_PORT: 8443
      SINGLE_USER_CREDENTIALS_USERNAME: admin
      SINGLE_USER_CREDENTIALS_PASSWORD: admin123456789
    volumes:
      - nifi-data:/opt/nifi/nifi-current/conf
    restart: unless-stopped
    networks:
      - 54link-network

  # ── Apache Airflow Webserver ───────────────────────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.9.0
    container_name: 54link-airflow-web
    command: webserver
    ports:
      - "8180:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${PG_USER:-postgres}:${PG_PASSWORD:-postgres}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "change-me-fernet-key-base64-encoded-32-bytes"
      AIRFLOW__WEBSERVER__SECRET_KEY: "change-me-secret-key"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - airflow-dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - 54link-network

  # ── Apache Airflow Scheduler ───────────────────────────────────────────────
  airflow-scheduler:
    image: apache/airflow:2.9.0
    container_name: 54link-airflow-sched
    command: scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${PG_USER:-postgres}:${PG_PASSWORD:-postgres}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "change-me-fernet-key-base64-encoded-32-bytes"
    volumes:
      - airflow-dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - 54link-network

  # ── Ollama (Local LLM) ────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: 54link-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - 54link-network

  # ── dbt (Data Build Tool) ─────────────────────────────────────────────────
  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.7.0
    container_name: 54link-dbt
    volumes:
      - ./infrastructure/dbt:/usr/app
    environment:
      DBT_PROFILES_DIR: /usr/app
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev
    networks:
      - 54link-network

  # ── APISIX (API Gateway) ──────────────────────────────────────────────────
  apisix:
    image: apache/apisix:3.9.0-debian
    container_name: 54link-apisix
    ports:
      - "9080:9080"
      - "9443:9443"
    volumes:
      - ./infrastructure/apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
    restart: unless-stopped
    networks:
      - 54link-network

  # ── pgAdmin (dev profile only) ───────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: 54link-pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@54link.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    depends_on:
      - postgres
    profiles:
      - dev
    restart: unless-stopped
    networks:
      - 54link-network

  # ── E-Commerce Microservices ─────────────────────────────────────────────────
  ecommerce-catalog:
    build:
      context: ./server/ecommerce-catalog-go
      dockerfile: Dockerfile
    ports:
      - "8100:8100"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CATALOG_PORT: "8100"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - 54link-network

  ecommerce-cart:
    build:
      context: ./server/ecommerce-cart-rust
      dockerfile: Dockerfile
    ports:
      - "8102:8102"
    environment:
      CART_PORT: "8102"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8102/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - 54link-network

  ecommerce-intelligence:
    build:
      context: ./server/ecommerce-intelligence-py
      dockerfile: Dockerfile
    ports:
      - "8103:8103"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      INTELLIGENCE_PORT: "8103"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8103/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - 54link-network

  # ─── Supply Chain Service (Go) ───────────────────────────────────────────
  supply-chain:
    build:
      context: ./server/supply-chain-go
      dockerfile: Dockerfile
    container_name: 54link-supply-chain
    ports:
      - "8200:8200"
    environment:
      - PORT=8200
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8200/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - 54link-network

  # ─── Marketplace Integrations Service (Go) ─────────────────────────────
  marketplace-integrations:
    build:
      context: ./server/marketplace-integrations-go
      dockerfile: Dockerfile
    container_name: 54link-marketplace
    ports:
      - "8201:8201"
    environment:
      - PORT=8201
      - JUMIA_API_KEY=${JUMIA_API_KEY:-}
      - KONGA_API_KEY=${KONGA_API_KEY:-}
      - AMAZON_SP_CLIENT_ID=${AMAZON_SP_CLIENT_ID:-}
      - EBAY_APP_ID=${EBAY_APP_ID:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8201/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - 54link-network

  # ─── Demand Forecasting Service (Python) ───────────────────────────────
  demand-forecasting:
    build:
      context: ./server/demand-forecasting-py
      dockerfile: Dockerfile
    container_name: 54link-demand-forecasting
    ports:
      - "8202:8202"
    environment:
      - PORT=8202
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8202/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - 54link-network

networks:
  54link-network:
    name: 54link-network
    driver: bridge

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  redis-data:
    driver: local
  pg-data:
    driver: local
  mosquitto-data:
    driver: local
  qdrant-data:
    driver: local
  falkordb-data:
    driver: local
  kafka-data:
    driver: local
  nifi-data:
    driver: local
  airflow-dags:
    driver: local
  airflow-logs:
    driver: local
  ollama-data:
    driver: local
