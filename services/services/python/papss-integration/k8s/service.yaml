apiVersion: v1
kind: Service
metadata:
  name: papss-integration
  namespace: remittance-platform
  labels:
    app: papss-integration
    tier: backend
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
spec:
  type: ClusterIP
  selector:
    app: papss-integration
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: metrics
    port: 8081
    targetPort: 8081
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
---
apiVersion: v1
kind: Service
metadata:
  name: papss-integration-headless
  namespace: remittance-platform
  labels:
    app: papss-integration
    tier: backend
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: papss-integration
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP

