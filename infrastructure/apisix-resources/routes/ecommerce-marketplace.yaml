# ecommerce-marketplace — 18 services | ports 9410-9427
# E-commerce & marketplace — Amazon, eBay, Jumia, Konga, storefronts
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-ecommerce-marketplace-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /agent-commerce-integration/*
      backends:
        - serviceName: ecommerce-marketplace
          servicePort: 9410
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/agent-commerce-integration/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-2
      priority: 10
