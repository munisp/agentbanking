name: Build Transaction Ledger Consolidated Service

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'services/transaction-ledger/**'
      - 'docker/Dockerfile.consolidated'
      - 'docker/entrypoint.sh'
      - 'docker/build-services.sh'
      - '.github/workflows/transaction-ledger.yaml'

env:
  TAG: "0.0.2"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v4
        with:
          registry: registry.digitalocean.com
          username: docker
          password: ${{ secrets.DO_API_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.consolidated
          push: true
          build-args: |
            SERVICES=transaction-ledger
            PORT_BASE=9337
          tags: registry.digitalocean.com/talentgraph-auth/54agent-transaction-ledger:${{ env.TAG }}
