# agent-training
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-agent-training-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /agent-training/*
      backends:
        - serviceName: agent-core
          servicePort: 9111
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/agent-training/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
    - name: rule-2
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /training/*
      backends:
        - serviceName: agent-core
          servicePort: 9112
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/training/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"
