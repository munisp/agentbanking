# billing — 18 services | ports 9204-9221
# Billing — invoicing, commissions, tax, SLA, revenue reconciliation
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-billing-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /billing-aggregator/*
      backends:
        - serviceName: billing
          servicePort: 9204
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/billing-aggregator/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-2
