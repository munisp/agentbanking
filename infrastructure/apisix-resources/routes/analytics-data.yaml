# analytics-data — 19 services | ports 9162-9180
# Analytics & data — dashboards, reporting, OpenSearch, CDP, KGQA
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: 54agent-analytics-data-route
  namespace: 54agent
spec:
  ingressClassName: apisix
  http:
    - name: rule-1
      priority: 10
      match:
        hosts:
          - 54agent.upi.dev
        paths:
          - /analytics/*
      backends:
        - serviceName: analytics-data
          servicePort: 9162
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - "^/analytics/(.*)"
              - "/$1"
        - name: cors
          enable: true
          config:
            allow_origins: "*"
            allow_methods: "*"
            allow_headers: "*"
            expose_headers: "*"

    - name: rule-2
